syntax = "proto3";

package recommend.v1;

option go_package = "shop/recommend/api/gen/go/recommend/v1;recommendv1";

import "google/protobuf/timestamp.proto";

// 缓存公共元信息
message CacheMeta {
  string schema_version = 1;  // 结构版本
  string scene = 2;  // 推荐场景
  int32 actor_type = 3;  // 主体类型
  int64 actor_id = 4;  // 主体编号
  google.protobuf.Timestamp updated_at = 5;  // 更新时间
  google.protobuf.Timestamp expire_at = 6;  // 过期时间
}

// 推荐候选商品项
message RecommendCandidateItem {
  int64 goods_id = 1;  // 商品编号
  double score = 2;  // 当前得分
  repeated string recall_sources = 3;  // 召回来源
  int64 category_id = 4;  // 分类编号
  string trace = 5;  // 调试追踪文本
}

// 通用候选池
message RecommendCandidatePool {
  CacheMeta meta = 1;  // 元信息
  repeated RecommendCandidateItem items = 2;  // 候选商品列表
}

// 商品相关推荐池
message RecommendRelatedGoodsPool {
  CacheMeta meta = 1;  // 元信息
  int64 source_goods_id = 2;  // 源商品编号
  repeated RecommendCandidateItem items = 3;  // 关联商品列表
}

// 用户候选池
message RecommendUserCandidatePool {
  CacheMeta meta = 1;  // 元信息
  int64 user_id = 2;  // 用户编号
  repeated RecommendCandidateItem items = 3;  // 用户候选列表
}

// 相似用户候选池
message RecommendUserNeighborPool {
  CacheMeta meta = 1;  // 元信息
  int64 user_id = 2;  // 用户编号
  repeated int64 neighbor_user_ids = 3;  // 相似用户编号列表
}

// 协同过滤结果池
message RecommendCollaborativePool {
  CacheMeta meta = 1;  // 元信息
  int64 user_id = 2;  // 用户编号
  repeated RecommendCandidateItem items = 3;  // 协同过滤候选列表
}

// 外部召回结果池
message RecommendExternalPool {
  CacheMeta meta = 1;  // 元信息
  string strategy = 2;  // 外部策略名
  repeated RecommendCandidateItem items = 3;  // 外部召回候选列表
}

// 会话运行态
message RecommendSessionState {
  CacheMeta meta = 1;  // 元信息
  repeated int64 recent_view_goods_ids = 2;  // 最近浏览商品
  repeated int64 recent_click_goods_ids = 3;  // 最近点击商品
  repeated int64 recent_cart_goods_ids = 4;  // 最近购物车商品
}

// 惩罚运行态
message RecommendPenaltyState {
  CacheMeta meta = 1;  // 元信息
  map<int64, double> exposure_penalty = 2;  // 商品曝光惩罚
  map<int64, double> repeat_penalty = 3;  // 商品重复购买惩罚
}

// 评分明细
message RecommendScoreDetail {
  int64 goods_id = 1;  // 商品编号
  double final_score = 2;  // 最终得分
  double relation_score = 3;  // 商品关联得分
  double user_goods_score = 4;  // 用户商品偏好得分
  double category_score = 5;  // 用户类目偏好得分
  double scene_hot_score = 6;  // 场景热度得分
  double global_hot_score = 7;  // 全站热度得分
  double freshness_score = 8;  // 新鲜度得分
  double exposure_penalty = 9;  // 曝光惩罚
  double repeat_penalty = 10;  // 重复购买惩罚
  repeated string recall_sources = 11;  // 召回来源
}

// 推荐追踪步骤
message RecommendTraceStep {
  string stage = 1;  // 阶段名称
  string reason = 2;  // 阶段说明
  repeated int64 goods_ids = 3;  // 阶段关联商品
}

// 推荐追踪详情
message RecommendTraceDetail {
  CacheMeta meta = 1;  // 元信息
  string request_id = 2;  // 请求编号
  string scene = 3;  // 推荐场景
  repeated RecommendTraceStep steps = 4;  // 推荐追踪步骤
  repeated RecommendScoreDetail score_details = 5;  // 评分明细
  repeated int64 result_goods_ids = 6;  // 最终结果商品列表
}
