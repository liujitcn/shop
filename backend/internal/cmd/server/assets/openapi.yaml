components:
    schemas:
        base.v1.AiAction:
            type: object
            properties:
                flow:
                    type: string
                    description: 流程标识
                step:
                    type: string
                    description: 流程步骤
                type:
                    type: string
                    description: 动作类型
                payload_json:
                    type: string
                    description: 动作负载JSON
                source_message_id:
                    type: string
                    description: 动作来源消息ID
                action_id:
                    type: string
                    description: 动作唯一ID
