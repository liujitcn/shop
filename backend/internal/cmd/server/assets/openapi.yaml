                    type: string
                    description: 流程状态版本
            description: AI 助手动作
        base.v1.AiAttachment:
            type: object
            properties:
                id:
                    type: string
                    description: 附件ID
                name:
                    type: string
                    description: 附件名称
                size:
                    type: string
                    description: 附件大小
                url:
                    type: string
                    description: 附件地址
                mime_type:
                    type: string
                    description: 附件 MIME 类型
            description: AI 助手附件
        base.v1.AiInputContent:
            type: object
            properties:
                kind:
                    type: string
                    description: 内容类型
                content:
                    type: string
                    description: 内容正文
            description: AI 助手输入内容
        base.v1.AiMessage:
            type: object
            properties:
                id:
                    type: string
                    description: 消息ID
                input_content:
                    $ref: '#/components/schemas/base.v1.AiInputContent'
                output_content:
                    $ref: '#/components/schemas/base.v1.AiOutputContent'
                attachments:
                    type: array
                    items:
                        $ref: '#/components/schemas/base.v1.AiAttachment'
                    description: 附件列表
                created_at:
                    type: string
                    description: 创建时间
                    format: date-time
                status:
                    enum:
                        - UNKNOWN_AAMS
                        - GENERATING_AAMS
                        - SUCCESS_AAMS
                        - FAILED_AAMS
                    type: string
                    description: 消息生成状态：枚举【AiMessageStatus】
                    format: enum
                token:
                    $ref: '#/components/schemas/base.v1.AiToken'
                tools:
                    type: array
                    items:
                        $ref: '#/components/schemas/base.v1.AiToolCall'
                    description: 本次消息使用的工具调用记录
                first_token_ms:
                    type: integer
                    description: 首 Token 耗时毫秒
                    format: int32
                duration_ms:
                    type: integer
                    description: 总耗时毫秒
                    format: int32
            description: AI 助手消息
        base.v1.AiOutputContent:
            type: object
            properties:
                kind:
                    type: string
                    description: 内容类型
                content:
                    type: string
                    description: 内容正文
                reply_source:
                    type: string
                    description: 回复来源：llm/fallback
                model:
                    type: string
                    description: 回复使用的模型名称
                fallback:
                    type: boolean
                    description: 是否为降级回复
                fallback_reason:
                    type: string
                    description: 降级原因
                flow:
                    type: string
                    description: 流程标识
                step:
                    type: string
                    description: 流程步骤
                blocks_json:
                    type: string
                    description: 移动端结构化内容JSON
            description: AI 助手输出内容
        base.v1.AiSession:
