                    type: array
                    items:
                        type: string
                    description: 营业执照
                addressName:
                    type: array
                    items:
                        type: string
                    description: 省市区
            description: 用户门店表单
        WechatLoginRequest:
            type: object
            properties:
                code:
                    type: string
                    description: 用户登录凭据
            description: 微信登录请求参数
        WechatLoginResponse:
            type: object
            properties:
                accessToken:
                    type: string
                    description: 访问令牌，必选项。授权服务器颁发的访问令牌字符串。
                refreshToken:
                    type: string
                    description: 更新令牌，用来获取下一次的访问令牌，可选项。如果访问令牌将过期，则返回刷新令牌很有用，应用程序可以使用该刷新令牌来获取另一个访问令牌。但是，通过隐式授予颁发的令牌不能颁发刷新令牌。
                tokenType:
                    type: string
                    default: Bearer
                    description: 令牌的类型，该值大小写不敏感，必选项，可以是bearer类型或mac类型，通常只是字符串“Bearer”。
                expiresIn:
                    type: string
                    description: 令牌有效时间，单位为秒。如果访问令牌过期，服务器应回复授予访问令牌的持续时间。如果省略该参数，必须其他方式设置过期时间。
            description: 微信登录响应
        WorkspacePendingComment:
            type: object
            properties:
                id:
                    type: string
                    description: 评论ID
                goodsId:
                    type: string
                    description: 商品ID
                goodsName:
                    type: string
                    description: 商品名称
                userName:
                    type: string
                    description: 用户昵称
                goodsScore:
                    type: integer
                    description: 商品评分
                    format: int32
                content:
                    type: string
                    description: 评论摘要
                createdAt:
                    type: string
                    description: 评价时间
            description: 工作台待审核评价
        WorkspaceReputationTag:
            type: object
            properties:
                name:
                    type: string
                    description: 标签名称
                mentionCount:
                    type: string
                    description: 提及次数
            description: 工作台口碑高频标签
