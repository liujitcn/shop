authn:
  jwt:
    secret: Shop@Server
    access_token_expires: 3600s
    refresh_token_expires: 2592000s
    white_list:
      prefix:
      regex:
      path:
      match:
        - "/base.v1.ConfigService/GetConfig"
        - "/base.v1.LoginService/Captcha"
        - "/base.v1.LoginService/VerifyCaptcha"
        - "/base.v1.LoginService/PasswordPublicKey"
        - "/base.v1.LoginService/RefreshToken"
        - "/base.v1.LoginService/Login"
        - "/base.v1.OauthService/ListOauthProviders"
        - "/base.v1.OauthService/CreateOauthAuthorization"
        - "/base.v1.OauthService/HandleOauthCallback"
        - "/base.v1.OauthService/ExchangeOauthTicket"
        - "/base.v1.OauthService/CreateOauthSession"
        - "/base.v1.OauthService/HandleOauthBindingCallback"
        - "/base.v1.SseService/SubscribeSse"
        - "/app.v1.GoodsCategoryService/ListGoodsCategories"
        - "/app.v1.ShopBannerService/ListShopBanners"
        - "/app.v1.ShopHotService/ListShopHots"
        - "/app.v1.ShopHotService/ListShopHotItems"
        - "/app.v1.ShopServiceService/ListShopServices"
        - "/app.v1.ShopHotService/PageShopHotGoods"
        - "/app.v1.PayService/PayNotify"
    optional_auth:
      prefix:
      regex:
      path:
      match:
        - "/app.v1.CommentService/GoodsCommentOverview"
        - "/app.v1.CommentService/GoodsCommentTags"
        - "/app.v1.CommentService/PageGoodsComment"
        - "/app.v1.CommentService/PageCommentDiscussion"
        - "/app.v1.GoodsInfoService/PageGoodsInfo"
        - "/app.v1.GoodsInfoService/GetGoodsInfo"
        - "/app.v1.RecommendService/RecommendAnonymousActor"
        - "/app.v1.RecommendService/RecommendGoods"
        - "/app.v1.RecommendService/RecommendEventReport"
        - "/app.v1.UserCollectService/GetIsCollect"
