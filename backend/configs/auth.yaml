authn:
  jwt:
    secret: Shop@Server
    accessTokenExpires: 3600000s
    refreshTokenExpires: 36000s
    whiteList:
      prefix:
      regex:
      path:
      match:
        - "/base.ConfigService/GetConfig"
        - "/base.LoginService/Captcha"
        - "/base.LoginService/Login"
        - "/app.AuthService/WechatLogin"
        - "/app.GoodsCategoryService/ListGoodsCategory"
        - "/app.GoodsInfoService/PageGoodsInfo"
        - "/app.GoodsInfoService/GetGoodsInfo"
        - "/app.ShopBannerService/ListShopBanner"
        - "/app.ShopHotService/ListShopHot"
        - "/app.ShopHotService/ListShopHotItem"
        - "/app.ShopServiceService/ListShopService"
        - "/app.ShopHotService/PageShopHotGoods"
        - "/app.PayService/PayNotify"
    optionalAuth:
      prefix:
      regex:
      path:
      match:
        - "/app.RecommendService/RecommendAnonymousActor"
        - "/app.RecommendService/RecommendGoods"
        - "/app.RecommendService/RecommendExposureReport"
        - "/app.RecommendService/RecommendGoodsActionReport"
