client:
  llm:
    # 默认不配置密钥和模型，配置有效密钥和模型后自动启用。
    baseUrl: https://api.openai.com/v1
    apiKey: ''
    model: ''
    maxOutputTokens: 1024
    temperature: 0.2
    topP: 0
    seed: 0
    frequencyPenalty: 0
    presencePenalty: 0
    stopSequences: []
    reasoningEffort: high
    # OpenAI 兼容接口新增字段或中转层自定义字段可放这里，provider 会透传到请求体。
    extraFields: {}
