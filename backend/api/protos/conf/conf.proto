syntax = "proto3";

package conf;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";

// 商城配置
message ShopConfigWrapper {
  ShopConfig shop = 1 [
    (gnostic.openapi.v3.property) = {description: "商城配置"}
  ]; // 商城配置
}

// ShopConfig
message ShopConfig {
  WxMiniApp wxMiniApp = 1 [
    (gnostic.openapi.v3.property) = {description: "小程序登录参数"}
  ]; // 小程序登录参数
  WxPay wxPay = 2 [
    (gnostic.openapi.v3.property) = {description: "微信支付参数"}
  ]; // 微信支付参数
  GoodsRecommendConfig recommend = 3 [
    (gnostic.openapi.v3.property) = {description: "推荐配置"}
  ]; // 推荐配置
}

// WxMiniApp
message WxMiniApp {
  string appid = 1 [
    (gnostic.openapi.v3.property) = {description: "小程序 AppID"}
  ]; // 小程序 AppID
  string secret = 2 [
    (gnostic.openapi.v3.property) = {description: "小程序密钥"}
  ]; // 小程序密钥
}

// WxPay
message WxPay {
  string appid = 1 [
    (gnostic.openapi.v3.property) = {description: "微信支付 AppID"}
  ]; // 微信支付 AppID
  string mchId = 2 [
    (gnostic.openapi.v3.property) = {description: "商户id"}
  ]; // 商户id
  string notifyUrl = 3 [
    (gnostic.openapi.v3.property) = {description: "通知地址"}
  ]; // 通知地址

  string mchCertSn = 80 [
    (gnostic.openapi.v3.property) = {description: "商户证书序列号"}
  ]; // 商户证书序列号
  string mchCertPath = 81 [
    (gnostic.openapi.v3.property) = {description: "商户证书路径"}
  ]; // 商户证书路径
  string mchAPIv3Key = 82 [
    (gnostic.openapi.v3.property) = {description: "api 密钥"}
  ]; // api 密钥
}

// GoodsRecommendConfig
message GoodsRecommendConfig {
  GoodsStatScoreConfig goodsStatScore = 1 [
    (gnostic.openapi.v3.property) = {description: "商品热度分权重配置"}
  ]; // 商品热度分权重配置
  GoodsRecommendPersonalizedRankWeightConfig personalizedRank = 2 [
    (gnostic.openapi.v3.property) = {description: "登录态排序权重"}
  ]; // 登录态排序权重
  GoodsRecommendAnonymousRankWeightConfig anonymousRank = 3 [
    (gnostic.openapi.v3.property) = {description: "匿名态排序权重"}
  ]; // 匿名态排序权重
  RecommendEventWeightConfig eventWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "用户偏好行为权重配置"}
  ]; // 用户偏好行为权重配置
  RecommendRelationWeightConfig relationWeight = 5 [
    (gnostic.openapi.v3.property) = {description: "商品关联行为权重配置"}
  ]; // 商品关联行为权重配置
  RecommendRankConfig rank = 6 [
    (gnostic.openapi.v3.property) = {description: "推荐排序参数配置"}
  ]; // 推荐排序参数配置
  optional int32 aggregateWindowDays = 7 [
    (gnostic.openapi.v3.property) = {description: "推荐聚合窗口天数"}
  ]; // 推荐聚合窗口天数
  RecommendRecallConfig recall = 8 [
    (gnostic.openapi.v3.property) = {description: "推荐召回参数配置"}
  ]; // 推荐召回参数配置
  RecommendActorExposurePenaltyConfig actorExposurePenalty = 9 [
    (gnostic.openapi.v3.property) = {description: "主体曝光惩罚配置"}
  ]; // 主体曝光惩罚配置
}

// GoodsStatScoreConfig
message GoodsStatScoreConfig {
  optional double viewWeight = 1 [
    (gnostic.openapi.v3.property) = {description: "浏览次数权重"}
  ]; // 浏览次数权重
  optional double collectWeight = 2 [
    (gnostic.openapi.v3.property) = {description: "收藏次数权重"}
  ]; // 收藏次数权重
  optional double cartWeight = 3 [
    (gnostic.openapi.v3.property) = {description: "加购件数权重"}
  ]; // 加购件数权重
  optional double orderWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "下单次数权重"}
  ]; // 下单次数权重
  optional double payWeight = 5 [
    (gnostic.openapi.v3.property) = {description: "支付次数权重"}
  ]; // 支付次数权重
  optional double payGoodsNumWeight = 6 [
    (gnostic.openapi.v3.property) = {description: "支付件数权重"}
  ]; // 支付件数权重
  optional double payAmountWeight = 7 [
    (gnostic.openapi.v3.property) = {description: "支付金额权重"}
  ]; // 支付金额权重
}

// GoodsRecommendPersonalizedRankWeightConfig
message GoodsRecommendPersonalizedRankWeightConfig {
  optional double relationWeight = 1 [
    (gnostic.openapi.v3.property) = {description: "商品关联分权重"}
  ]; // 商品关联分权重
  optional double userGoodsWeight = 2 [
    (gnostic.openapi.v3.property) = {description: "用户商品偏好权重"}
  ]; // 用户商品偏好权重
  optional double similarUserWeight = 3 [
    (gnostic.openapi.v3.property) = {description: "相似用户偏好权重"}
  ]; // 相似用户偏好权重
  optional double profileWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "类目画像权重"}
  ]; // 类目画像权重
  optional double scenePopularityWeight = 5 [
    (gnostic.openapi.v3.property) = {description: "场景热度权重"}
  ]; // 场景热度权重
  optional double globalPopularityWeight = 6 [
    (gnostic.openapi.v3.property) = {description: "全站热度权重"}
  ]; // 全站热度权重
  optional double freshnessWeight = 7 [
    (gnostic.openapi.v3.property) = {description: "新鲜度权重"}
  ]; // 新鲜度权重
  optional double exposurePenaltyWeight = 8 [
    (gnostic.openapi.v3.property) = {description: "场景曝光惩罚权重"}
  ]; // 场景曝光惩罚权重
  optional double actorExposurePenaltyWeight = 9 [
    (gnostic.openapi.v3.property) = {description: "主体曝光惩罚权重"}
  ]; // 主体曝光惩罚权重
  optional double repeatPenaltyWeight = 10 [
    (gnostic.openapi.v3.property) = {description: "重复购买惩罚权重"}
  ]; // 重复购买惩罚权重
}

// GoodsRecommendAnonymousRankWeightConfig
message GoodsRecommendAnonymousRankWeightConfig {
  optional double relationWeight = 1 [
    (gnostic.openapi.v3.property) = {description: "商品关联分权重"}
  ]; // 商品关联分权重
  optional double scenePopularityWeight = 2 [
    (gnostic.openapi.v3.property) = {description: "场景热度权重"}
  ]; // 场景热度权重
  optional double globalPopularityWeight = 3 [
    (gnostic.openapi.v3.property) = {description: "全站热度权重"}
  ]; // 全站热度权重
  optional double freshnessWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "新鲜度权重"}
  ]; // 新鲜度权重
  optional double exposurePenaltyWeight = 5 [
    (gnostic.openapi.v3.property) = {description: "场景曝光惩罚权重"}
  ]; // 场景曝光惩罚权重
  optional double actorExposurePenaltyWeight = 6 [
    (gnostic.openapi.v3.property) = {description: "主体曝光惩罚权重"}
  ]; // 主体曝光惩罚权重
}

// RecommendEventWeightConfig
message RecommendEventWeightConfig {
  optional double clickWeight = 1 [
    (gnostic.openapi.v3.property) = {description: "点击权重"}
  ]; // 点击权重
  optional double viewWeight = 2 [
    (gnostic.openapi.v3.property) = {description: "浏览权重"}
  ]; // 浏览权重
  optional double collectWeight = 3 [
    (gnostic.openapi.v3.property) = {description: "收藏权重"}
  ]; // 收藏权重
  optional double addCartWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "加购权重"}
  ]; // 加购权重
  optional double orderCreateWeight = 5 [
    (gnostic.openapi.v3.property) = {description: "下单权重"}
  ]; // 下单权重
  optional double orderPayWeight = 6 [
    (gnostic.openapi.v3.property) = {description: "支付权重"}
  ]; // 支付权重
}

// RecommendRelationWeightConfig
message RecommendRelationWeightConfig {
  optional double clickWeight = 1 [
    (gnostic.openapi.v3.property) = {description: "点击权重"}
  ]; // 点击权重
  optional double viewWeight = 2 [
    (gnostic.openapi.v3.property) = {description: "浏览权重"}
  ]; // 浏览权重
  optional double orderCreateWeight = 3 [
    (gnostic.openapi.v3.property) = {description: "下单权重"}
  ]; // 下单权重
  optional double orderPayWeight = 4 [
    (gnostic.openapi.v3.property) = {description: "支付权重"}
  ]; // 支付权重
}

// RecommendRankConfig
message RecommendRankConfig {
  optional double freshnessWindowDays = 1 [
    (gnostic.openapi.v3.property) = {description: "新鲜度窗口天数"}
  ]; // 新鲜度窗口天数
  optional int32 highExposureThreshold = 2 [
    (gnostic.openapi.v3.property) = {description: "高曝光阈值"}
  ]; // 高曝光阈值
  optional double noClickPenalty = 3 [
    (gnostic.openapi.v3.property) = {description: "高曝光零点击惩罚"}
  ]; // 高曝光零点击惩罚
  optional double lowCtrPenalty = 4 [
    (gnostic.openapi.v3.property) = {description: "低点击率强惩罚"}
  ]; // 低点击率强惩罚
  optional double mediumCtrPenalty = 5 [
    (gnostic.openapi.v3.property) = {description: "低点击率中惩罚"}
  ]; // 低点击率中惩罚
  optional double lowCtrThreshold = 6 [
    (gnostic.openapi.v3.property) = {description: "低点击率阈值"}
  ]; // 低点击率阈值
  optional double mediumCtrThreshold = 7 [
    (gnostic.openapi.v3.property) = {description: "中点击率阈值"}
  ]; // 中点击率阈值
  optional double dayDecayFactor = 8 [
    (gnostic.openapi.v3.property) = {description: "按天衰减系数"}
  ]; // 按天衰减系数
}

// RecommendRecallConfig
message RecommendRecallConfig {
  optional int32 poolMultiplier = 1 [
    (gnostic.openapi.v3.property) = {description: "候选池倍率"}
  ]; // 候选池倍率
  optional int32 poolMin = 2 [
    (gnostic.openapi.v3.property) = {description: "候选池最小数量"}
  ]; // 候选池最小数量
  optional int32 poolMax = 3 [
    (gnostic.openapi.v3.property) = {description: "候选池最大数量"}
  ]; // 候选池最大数量
  optional int32 maxPerCategory = 4 [
    (gnostic.openapi.v3.property) = {description: "单类目优先保留数量"}
  ]; // 单类目优先保留数量
  optional int32 anonymousRecallDays = 5 [
    (gnostic.openapi.v3.property) = {description: "匿名召回回看天数"}
  ]; // 匿名召回回看天数
  optional int32 statLookbackDays = 6 [
    (gnostic.openapi.v3.property) = {description: "热度统计回看天数"}
  ]; // 热度统计回看天数
  optional int32 recentPayPenaltyDays = 7 [
    (gnostic.openapi.v3.property) = {description: "近期支付惩罚回看天数"}
  ]; // 近期支付惩罚回看天数
  optional int32 actorExposureLookbackDays = 8 [
    (gnostic.openapi.v3.property) = {description: "主体曝光回看天数"}
  ]; // 主体曝光回看天数
}

// RecommendActorExposurePenaltyConfig
message RecommendActorExposurePenaltyConfig {
  optional int32 noClickExposureThreshold = 1 [
    (gnostic.openapi.v3.property) = {description: "零点击惩罚曝光阈值"}
  ]; // 零点击惩罚曝光阈值
  optional double noClickPenalty = 2 [
    (gnostic.openapi.v3.property) = {description: "零点击惩罚分"}
  ]; // 零点击惩罚分
  optional int32 lowCtrExposureThreshold = 3 [
    (gnostic.openapi.v3.property) = {description: "低点击率惩罚曝光阈值"}
  ]; // 低点击率惩罚曝光阈值
  optional double lowCtrPenalty = 4 [
    (gnostic.openapi.v3.property) = {description: "低点击率惩罚分"}
  ]; // 低点击率惩罚分
  optional double lowCtrThreshold = 5 [
    (gnostic.openapi.v3.property) = {description: "低点击率阈值"}
  ]; // 低点击率阈值
}
