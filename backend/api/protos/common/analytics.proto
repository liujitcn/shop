syntax = "proto3";

package common;

import "gnostic/openapi/v3/annotations.proto";

enum AnalyticsTimeType {
  WEEK = 0;
  MONTH = 1;
  YEAR = 2;
}

enum AnalyticsSeriesType {
  BAR = 0;
  LINE = 1;
}

message AnalyticsTimeRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ];
}

message AnalyticsTrendSeries {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "系列名称"}];
  AnalyticsSeriesType type = 2 [(gnostic.openapi.v3.property) = {description: "图表类型"}];
  repeated int64 data = 3 [(gnostic.openapi.v3.property) = {description: "数据数组"}];
  int32 yAxisIndex = 4 [(gnostic.openapi.v3.property) = {description: "Y轴索引"}];
}

message AnalyticsTrendResponse {
  repeated string axis = 1 [(gnostic.openapi.v3.property) = {description: "坐标轴数据"}];
  repeated AnalyticsTrendSeries series = 2 [(gnostic.openapi.v3.property) = {description: "系列列表"}];
  repeated string yAxisNames = 3 [(gnostic.openapi.v3.property) = {description: "Y轴名称列表"}];
}

message AnalyticsRankItem {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "名称"}];
  int64 value = 2 [(gnostic.openapi.v3.property) = {description: "值"}];
}

message AnalyticsRankResponse {
  repeated AnalyticsRankItem items = 1 [(gnostic.openapi.v3.property) = {description: "排行列表"}];
}

message AnalyticsPieItem {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "名称"}];
  int64 value = 2 [(gnostic.openapi.v3.property) = {description: "值"}];
}

message AnalyticsPieResponse {
  repeated AnalyticsPieItem items = 1 [(gnostic.openapi.v3.property) = {description: "饼图数据"}];
}
