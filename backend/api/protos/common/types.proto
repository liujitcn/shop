syntax = "proto3";

package common;

import "gnostic/openapi/v3/annotations.proto";

// `double` 类型数组包装消息。
//
// `DoubleValues` 的 JSON 表示为数字数组。
message DoubleValues {
  // 值列表。
  repeated double value = 1 [
    (gnostic.openapi.v3.property) = {description: "值"}
  ]; // 值
}

