syntax = "proto3";

package common.v1;

import "gnostic/openapi/v3/annotations.proto";

// double 类型数组包装消息。
message DoubleValues {
  // 值列表。
  repeated double value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// float 类型数组包装消息。
message FloatValues {
  // 值列表。
  repeated float value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// int64 类型数组包装消息。
message Int64Values {
  // 值列表。
  repeated int64 value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// uint64 类型数组包装消息。
message UInt64Values {
  // 值列表。
  repeated uint64 value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// int32 类型数组包装消息。
message Int32Values {
  // 值列表。
  repeated int32 value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// uint32 类型数组包装消息。
message UInt32Values {
  // 值列表。
  repeated uint32 value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// bool 类型数组包装消息。
message BoolValues {
  // 值列表。
  repeated bool value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// string 类型数组包装消息。
message StringValues {
  // 值列表。
  repeated string value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// bytes 类型数组包装消息。
message BytesValues {
  // 值列表。
  repeated bytes value = 1 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}

// 密码密文。
message PasswordCrypto {
  string key_id = 1 [(gnostic.openapi.v3.property) = {description: "临时密钥ID"}]; // 临时密钥ID

  string nonce = 2 [(gnostic.openapi.v3.property) = {description: "随机值"}]; // 随机值

  string algorithm = 3 [(gnostic.openapi.v3.property) = {description: "加密算法"}]; // 加密算法

  string encrypted_key = 4 [(gnostic.openapi.v3.property) = {description: "加密后的对称密钥"}]; // 加密后的对称密钥

  string iv = 5 [(gnostic.openapi.v3.property) = {description: "初始化向量"}]; // 初始化向量

  string ciphertext = 6 [(gnostic.openapi.v3.property) = {description: "密码加密数据"}]; // 密码加密数据
}
