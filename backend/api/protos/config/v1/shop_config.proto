syntax = "proto3";

package config.v1;

import "gnostic/openapi/v3/annotations.proto";

// 商城配置
message ShopConfigWrapper {
  ShopConfig shop = 1 [(gnostic.openapi.v3.property) = {description: "商城配置"}]; // 商城配置
}

// 商城业务配置。
message ShopConfig {
  WxMiniApp wx_mini_app = 1 [(gnostic.openapi.v3.property) = {description: "小程序登录参数"}]; // 小程序登录参数
  WxPay wx_pay = 2 [(gnostic.openapi.v3.property) = {description: "微信支付参数"}]; // 微信支付参数
  Recommend recommend = 3 [(gnostic.openapi.v3.property) = {description: "推荐配置"}]; // 推荐配置
  Prompt prompt = 4 [(gnostic.openapi.v3.property) = {description: "提示词配置"}]; // 提示词配置
}

// 微信小程序配置。
message WxMiniApp {
  string appid = 1 [(gnostic.openapi.v3.property) = {description: "小程序 AppID"}]; // 小程序 AppID
  string secret = 2 [(gnostic.openapi.v3.property) = {description: "小程序密钥"}]; // 小程序密钥
}

// 微信支付配置。
message WxPay {
  string appid = 1 [(gnostic.openapi.v3.property) = {description: "微信支付 AppID"}]; // 微信支付 AppID
  string mch_id = 2 [(gnostic.openapi.v3.property) = {description: "商户id"}]; // 商户id
  string notify_url = 3 [(gnostic.openapi.v3.property) = {description: "通知地址"}]; // 通知地址

  string mch_cert_sn = 80 [(gnostic.openapi.v3.property) = {description: "商户证书序列号"}]; // 商户证书序列号
  string mch_cert_path = 81 [(gnostic.openapi.v3.property) = {description: "商户证书路径"}]; // 商户证书路径
  string mch_api_v3_key = 82 [
    json_name = "mchAPIv3Key",
    (gnostic.openapi.v3.property) = {description: "api 密钥"}
  ]; // api 密钥
}

// 推荐服务配置。
message Recommend {
  string entry_point = 1 [(gnostic.openapi.v3.property) = {description: "请求地址"}]; // 请求地址
  string api_key = 2 [(gnostic.openapi.v3.property) = {description: "api 密钥"}]; // api 密钥
}


// Prompt 提示词
message Prompt {
  string comment_review = 1 [(gnostic.openapi.v3.property) = {description: "AI评论提示词"}]; // AI评论提示词

  string comment_ai = 2 [(gnostic.openapi.v3.property) = {description: "AI汇总提示词"}]; // AI汇总提示词
}
