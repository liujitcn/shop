syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin远程推荐服务
service RecommendRemoteService {
  // 查询远程推荐概览
  rpc GetRecommendRemoteOverview (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/overview"
    };
  }

  // 查询远程推荐任务状态
  rpc GetRecommendRemoteTasks (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/tasks"
    };
  }

  // 查询远程推荐分类
  rpc GetRecommendRemoteCategories (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/categories"
    };
  }

  // 查询远程推荐时间序列
  rpc GetRecommendRemoteTimeseries (RecommendRemoteNameRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/timeseries/{name}"
    };
  }

  // 查询远程推荐仪表盘推荐商品
  rpc GetRecommendRemoteDashboardItems (RecommendRemoteDashboardItemsRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/dashboard"
    };
  }

  // 查询远程推荐结果
  rpc GetRecommendRemoteRecommendations (RecommendRemoteRecommendRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/recommendations"
    };
  }

  // 查询远程相似内容
  rpc GetRecommendRemoteNeighbors (RecommendRemoteNeighborRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/neighbors"
    };
  }

  // 查询远程推荐反馈列表
  rpc PageRecommendRemoteFeedback (RecommendRemoteFeedbackRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/feedback"
    };
  }

  // 写入远程推荐反馈
  rpc ImportRecommendRemoteFeedback (RecommendRemoteJsonRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/recommend/remote/feedback"
      body: "*"
    };
  }

  // 删除远程推荐反馈
  rpc DeleteRecommendRemoteFeedback (RecommendRemoteFeedbackDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/recommend/remote/feedback"
    };
  }

  // 查询远程推荐用户列表
  rpc PageRecommendRemoteUsers (RecommendRemoteCursorRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/users"
    };
  }

  // 查询远程推荐用户
  rpc GetRecommendRemoteUser (RecommendRemoteIdRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/users/{id}"
    };
  }

  // 删除远程推荐用户
  rpc DeleteRecommendRemoteUser (RecommendRemoteIdRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/recommend/remote/users/{id}"
    };
  }

  // 查询远程推荐商品列表
  rpc PageRecommendRemoteItems (RecommendRemoteCursorRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/items"
    };
  }

  // 查询远程推荐商品
  rpc GetRecommendRemoteItem (RecommendRemoteIdRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/items/{id}"
    };
  }

  // 删除远程推荐商品
  rpc DeleteRecommendRemoteItem (RecommendRemoteIdRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/recommend/remote/items/{id}"
    };
  }

  // 导出远程推荐数据
  rpc ExportRecommendRemoteData (RecommendRemoteDataRequest) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/advance/export"
    };
  }

  // 导入远程推荐数据
  rpc ImportRecommendRemoteData (RecommendRemoteImportRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/recommend/remote/advance/import"
      body: "*"
    };
  }

  // 清空远程推荐数据
  rpc PurgeRecommendRemoteData (RecommendRemotePurgeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/recommend/remote/advance/purge"
      body: "*"
    };
  }

  // 查询推荐编排配置
  rpc GetRecommendRemoteFlowConfig (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/flow/config"
    };
  }

  // 保存推荐编排配置
  rpc SaveRecommendRemoteFlowConfig (RecommendRemoteJsonRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/recommend/remote/flow/config"
      body: "*"
    };
  }

  // 重置推荐编排配置
  rpc ResetRecommendRemoteFlowConfig (google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/recommend/remote/flow/config"
    };
  }

  // 查询推荐编排配置结构
  rpc GetRecommendRemoteFlowSchema (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/flow/schema"
    };
  }

  // 查询远程推荐配置
  rpc GetRecommendRemoteConfig (google.protobuf.Empty) returns (RecommendRemoteJsonResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/remote/config"
    };
  }
}

// 远程推荐游标查询条件
message RecommendRemoteCursorRequest {
  string cursor = 1 [
    (gnostic.openapi.v3.property) = {
      description: "游标",
    }
  ]; // 游标

  int64 n = 2 [
    (gnostic.openapi.v3.property) = {
      description: "返回数量",
      default: {number: 20}
    }
  ]; // 返回数量

  string id = 3 [
    (gnostic.openapi.v3.property) = {
      description: "编号关键字",
    }
  ]; // 编号关键字
}

// 远程推荐编号查询条件
message RecommendRemoteIdRequest {
  string id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "编号",
    }
  ]; // 编号
}

// 远程推荐名称查询条件
message RecommendRemoteNameRequest {
  string name = 1 [
    (gnostic.openapi.v3.property) = {
      description: "名称",
    }
  ]; // 名称

  string begin = 2 [
    (gnostic.openapi.v3.property) = {
      description: "开始时间",
    }
  ]; // 开始时间

  string end = 3 [
    (gnostic.openapi.v3.property) = {
      description: "结束时间",
    }
  ]; // 结束时间
}

// 远程推荐仪表盘推荐商品查询条件
message RecommendRemoteDashboardItemsRequest {
  string recommender = 1 [
    (gnostic.openapi.v3.property) = {
      description: "推荐器名称",
      default: {string: "latest"}
    }
  ]; // 推荐器名称

  string category = 2 [
    (gnostic.openapi.v3.property) = {
      description: "分类",
    }
  ]; // 分类

  int64 end = 3 [
    (gnostic.openapi.v3.property) = {
      description: "结束位置",
      default: {number: 100}
    }
  ]; // 结束位置
}

// 远程推荐查询条件
message RecommendRemoteRecommendRequest {
  string type = 1 [
    (gnostic.openapi.v3.property) = {
      description: "推荐类型",
      default: {string: "recommend"}
    }
  ]; // 推荐类型

  string id = 2 [
    (gnostic.openapi.v3.property) = {
      description: "主体编号",
    }
  ]; // 主体编号

  string category = 3 [
    (gnostic.openapi.v3.property) = {
      description: "分类",
    }
  ]; // 分类

  int64 n = 4 [
    (gnostic.openapi.v3.property) = {
      description: "返回数量",
      default: {number: 20}
    }
  ]; // 返回数量

  int64 offset = 5 [
    (gnostic.openapi.v3.property) = {
      description: "偏移量",
    }
  ]; // 偏移量

  string write_back_type = 6 [
    (gnostic.openapi.v3.property) = {
      description: "写回反馈类型",
    }
  ]; // 写回反馈类型

  string candidates = 7 [
    (gnostic.openapi.v3.property) = {
      description: "候选商品编号，逗号分隔",
    }
  ]; // 候选商品编号，逗号分隔
}

// 远程相似内容查询条件
message RecommendRemoteNeighborRequest {
  string type = 1 [
    (gnostic.openapi.v3.property) = {
      description: "相似类型",
      default: {string: "item"}
    }
  ]; // 相似类型

  string id = 2 [
    (gnostic.openapi.v3.property) = {
      description: "主体编号",
    }
  ]; // 主体编号

  string category = 3 [
    (gnostic.openapi.v3.property) = {
      description: "分类",
    }
  ]; // 分类

  int64 n = 4 [
    (gnostic.openapi.v3.property) = {
      description: "返回数量",
      default: {number: 20}
    }
  ]; // 返回数量

  int64 offset = 5 [
    (gnostic.openapi.v3.property) = {
      description: "偏移量",
    }
  ]; // 偏移量
}

// 远程推荐反馈查询条件
message RecommendRemoteFeedbackRequest {
  string cursor = 1 [
    (gnostic.openapi.v3.property) = {
      description: "游标",
    }
  ]; // 游标

  int64 n = 2 [
    (gnostic.openapi.v3.property) = {
      description: "返回数量",
      default: {number: 20}
    }
  ]; // 返回数量

  string feedback_type = 3 [
    (gnostic.openapi.v3.property) = {
      description: "反馈类型",
    }
  ]; // 反馈类型

  string user_id = 4 [
    (gnostic.openapi.v3.property) = {
      description: "用户编号",
    }
  ]; // 用户编号

  string item_id = 5 [
    (gnostic.openapi.v3.property) = {
      description: "商品编号",
    }
  ]; // 商品编号
}

// 远程推荐反馈删除条件
message RecommendRemoteFeedbackDeleteRequest {
  string feedback_type = 1 [
    (gnostic.openapi.v3.property) = {
      description: "反馈类型",
    }
  ]; // 反馈类型

  string user_id = 2 [
    (gnostic.openapi.v3.property) = {
      description: "用户编号",
    }
  ]; // 用户编号

  string item_id = 3 [
    (gnostic.openapi.v3.property) = {
      description: "商品编号",
    }
  ]; // 商品编号
}

// 远程推荐数据查询条件
message RecommendRemoteDataRequest {
  string type = 1 [
    (gnostic.openapi.v3.property) = {
      description: "数据类型",
      default: {string: "users"}
    }
  ]; // 数据类型

  string cursor = 2 [
    (gnostic.openapi.v3.property) = {
      description: "游标",
    }
  ]; // 游标

  int64 n = 3 [
    (gnostic.openapi.v3.property) = {
      description: "返回数量",
      default: {number: 100}
    }
  ]; // 返回数量
}

// 远程推荐导入内容
message RecommendRemoteImportRequest {
  string type = 1 [
    (gnostic.openapi.v3.property) = {
      description: "数据类型",
      default: {string: "users"}
    }
  ]; // 数据类型

  string json = 2 [
    (gnostic.openapi.v3.property) = {
      description: "JSON内容",
    }
  ]; // JSON内容
}

// 远程推荐清空数据条件
message RecommendRemotePurgeRequest {
  repeated string check_list = 1 [
    (gnostic.openapi.v3.property) = {
      description: "确认清空项",
    }
  ]; // 确认清空项
}

// 远程推荐JSON请求
message RecommendRemoteJsonRequest {
  string json = 1 [
    (gnostic.openapi.v3.property) = {
      description: "JSON内容",
    }
  ]; // JSON内容
}

// 远程推荐JSON响应
message RecommendRemoteJsonResponse {
  string json = 1 [
    (gnostic.openapi.v3.property) = {
      description: "JSON内容",
    }
  ]; // JSON内容

  string last_modified = 2 [
    (gnostic.openapi.v3.property) = {
      description: "最后更新时间",
    }
  ]; // 最后更新时间
}
