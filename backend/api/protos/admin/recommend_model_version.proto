syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

import "common/enum.proto";

// Admin 推荐版本管理服务
service RecommendModelVersionService {
  // 查询推荐版本分页列表
  rpc PageRecommendModelVersion (PageRecommendModelVersionRequest) returns (PageRecommendModelVersionResponse) {
    option (google.api.http) = {
      get: "/api/admin/recommend/model-version"
    };
  }

  // 发布推荐版本
  rpc PublishRecommendModelVersion (UpdateRecommendModelVersionPublishRequest) returns (UpdateRecommendModelVersionPublishResponse) {
    option (google.api.http) = {
      put: "/api/admin/recommend/model-version/{id}/publish"
      body: "*"
    };
  }
}

// 推荐版本发布动作
enum RecommendModelVersionPublishAction {
  RECOMMEND_MODEL_VERSION_PUBLISH_ACTION_UNKNOWN = 0; // 未指定动作，默认正式发布所选版本
  RECOMMEND_MODEL_VERSION_PUBLISH_ACTION_PUBLISH = 1; // 正式发布所选版本
  RECOMMEND_MODEL_VERSION_PUBLISH_ACTION_SET_ROLLBACK = 2; // 将所选版本设为当前启用版本的回滚版本
  RECOMMEND_MODEL_VERSION_PUBLISH_ACTION_CLEAR_ROLLBACK = 3; // 清空当前启用版本的回滚版本
}

// 推荐版本分页查询条件
message PageRecommendModelVersionRequest {
  string modelName = 2 [
    (gnostic.openapi.v3.property) = {
      description: "模型名称"
    }
  ]; // 模型名称

  string modelType = 3 [
    (gnostic.openapi.v3.property) = {
      description: "模型类型"
    }
  ]; // 模型类型

  string version = 4 [
    (gnostic.openapi.v3.property) = {
      description: "版本号"
    }
  ]; // 版本号

  optional common.RecommendScene scene = 100 [
    (gnostic.openapi.v3.property) = {
      description: "推荐场景"
    }
  ]; // 推荐场景

  optional common.Status status = 101 [
    (gnostic.openapi.v3.property) = {
      description: "状态"
    }
  ]; // 状态

  int64 pageNum = 201 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ]; // 当前页码

  int64 pageSize = 202 [
    (gnostic.openapi.v3.property) = {
      description: "每页条数",
      default: {number: 10}
    }
  ]; // 每页条数
}

// 推荐版本分页响应
message PageRecommendModelVersionResponse {
  repeated RecommendModelVersion list = 1 [
    (gnostic.openapi.v3.property) = {
      description: "分页数据"
    }
  ]; // 分页数据

  int32 total = 2 [
    (gnostic.openapi.v3.property) = {
      description: "总数"
    }
  ]; // 总数
}

// 推荐版本发布配置
message RecommendModelVersionPublishConfig {
  string cacheVersion = 1 [
    (gnostic.openapi.v3.property) = {
      description: "缓存版本"
    }
  ]; // 缓存版本

  string rollbackVersion = 2 [
    (gnostic.openapi.v3.property) = {
      description: "回滚版本"
    }
  ]; // 回滚版本

  double grayRatio = 3 [
    (gnostic.openapi.v3.property) = {
      description: "灰度比例"
    }
  ]; // 灰度比例

  string publishedBy = 4 [
    (gnostic.openapi.v3.property) = {
      description: "发布人"
    }
  ]; // 发布人

  string publishedReason = 5 [
    (gnostic.openapi.v3.property) = {
      description: "发布说明"
    }
  ]; // 发布说明

  string publishedAt = 6 [
    (gnostic.openapi.v3.property) = {
      description: "最近发布时间"
    }
  ]; // 最近发布时间
}

// 最近一次真实训练摘要
message RecommendModelVersionTuneLatestSummary {
  string task = 1 [
    (gnostic.openapi.v3.property) = {
      description: "训练任务名"
    }
  ]; // 训练任务名

  string modelType = 2 [
    (gnostic.openapi.v3.property) = {
      description: "模型类型"
    }
  ]; // 模型类型

  string backend = 3 [
    (gnostic.openapi.v3.property) = {
      description: "训练后端"
    }
  ]; // 训练后端

  string artifactDir = 4 [
    (gnostic.openapi.v3.property) = {
      description: "训练产物目录"
    }
  ]; // 训练产物目录

  string trainedAt = 5 [
    (gnostic.openapi.v3.property) = {
      description: "训练完成时间"
    }
  ]; // 训练完成时间

  string version = 6 [
    (gnostic.openapi.v3.property) = {
      description: "单版本训练对应版本号"
    }
  ]; // 单版本训练对应版本号

  repeated string versions = 7 [
    (gnostic.openapi.v3.property) = {
      description: "多版本训练对应版本列表"
    }
  ]; // 多版本训练对应版本列表

  double bestValue = 8 [
    (gnostic.openapi.v3.property) = {
      description: "最优目标值"
    }
  ]; // 最优目标值

  map<string, double> score = 9 [
    (gnostic.openapi.v3.property) = {
      description: "训练指标"
    }
  ]; // 训练指标
}

// 最近一次评估日报摘要
message RecommendModelVersionTuneLatestEvalSummary {
  string reportDate = 1 [
    (gnostic.openapi.v3.property) = {
      description: "评估日期"
    }
  ]; // 评估日期

  string strategyName = 2 [
    (gnostic.openapi.v3.property) = {
      description: "策略名称"
    }
  ]; // 策略名称

  int64 sampleSize = 3 [
    (gnostic.openapi.v3.property) = {
      description: "样本量"
    }
  ]; // 样本量

  int64 requestCount = 4 [
    (gnostic.openapi.v3.property) = {
      description: "请求数"
    }
  ]; // 请求数

  int64 exposureCount = 5 [
    (gnostic.openapi.v3.property) = {
      description: "曝光数"
    }
  ]; // 曝光数

  int64 clickCount = 6 [
    (gnostic.openapi.v3.property) = {
      description: "点击数"
    }
  ]; // 点击数

  int64 orderCount = 7 [
    (gnostic.openapi.v3.property) = {
      description: "下单数"
    }
  ]; // 下单数

  int64 payCount = 8 [
    (gnostic.openapi.v3.property) = {
      description: "支付数"
    }
  ]; // 支付数

  double ctr = 9 [
    (gnostic.openapi.v3.property) = {
      description: "点击率"
    }
  ]; // 点击率

  double cvr = 10 [
    (gnostic.openapi.v3.property) = {
      description: "转化率"
    }
  ]; // 转化率

  double ndcg = 11 [
    (gnostic.openapi.v3.property) = {
      description: "NDCG"
    }
  ]; // NDCG

  double precision = 12 [
    (gnostic.openapi.v3.property) = {
      description: "Precision"
    }
  ]; // Precision

  double recall = 13 [
    (gnostic.openapi.v3.property) = {
      description: "Recall"
    }
  ]; // Recall
}

// 推荐版本调参配置
message RecommendModelVersionTuneConfig {
  bool enabled = 1 [
    (gnostic.openapi.v3.property) = {
      description: "是否启用自动调参"
    }
  ]; // 是否启用自动调参

  string targetMetric = 2 [
    (gnostic.openapi.v3.property) = {
      description: "目标指标"
    }
  ]; // 目标指标

  int32 trialCount = 3 [
    (gnostic.openapi.v3.property) = {
      description: "调参次数"
    }
  ]; // 调参次数

  RecommendModelVersionTuneLatestSummary latest = 4 [
    (gnostic.openapi.v3.property) = {
      description: "最近一次真实训练摘要"
    }
  ]; // 最近一次真实训练摘要

  RecommendModelVersionTuneLatestEvalSummary latestEval = 5 [
    (gnostic.openapi.v3.property) = {
      description: "最近一次评估日报摘要"
    }
  ]; // 最近一次评估日报摘要
}

// 推荐版本分页项
message RecommendModelVersion {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "主键ID"
    }
  ]; // 主键ID

  string modelName = 2 [
    (gnostic.openapi.v3.property) = {
      description: "模型名称"
    }
  ]; // 模型名称

  string modelType = 3 [
    (gnostic.openapi.v3.property) = {
      description: "模型类型"
    }
  ]; // 模型类型

  string version = 4 [
    (gnostic.openapi.v3.property) = {
      description: "版本号"
    }
  ]; // 版本号

  common.RecommendScene scene = 5 [
    (gnostic.openapi.v3.property) = {
      description: "推荐场景"
    }
  ]; // 推荐场景

  common.Status status = 6 [
    (gnostic.openapi.v3.property) = {
      description: "状态"
    }
  ]; // 状态

  string effectiveVersion = 7 [
    (gnostic.openapi.v3.property) = {
      description: "当前生效缓存版本"
    }
  ]; // 当前生效缓存版本

  string configJson = 8 [
    (gnostic.openapi.v3.property) = {
      description: "原始配置JSON"
    }
  ]; // 原始配置JSON

  RecommendModelVersionPublishConfig publish = 9 [
    (gnostic.openapi.v3.property) = {
      description: "发布配置"
    }
  ]; // 发布配置

  RecommendModelVersionTuneConfig tune = 10 [
    (gnostic.openapi.v3.property) = {
      description: "调参配置"
    }
  ]; // 调参配置

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {
      description: "创建时间"
    }
  ]; // 创建时间

  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {
      description: "更新时间"
    }
  ]; // 更新时间
}

// 推荐版本发布动作请求
message UpdateRecommendModelVersionPublishRequest {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "推荐版本ID"
    }
  ]; // 推荐版本ID

  RecommendModelVersionPublishAction action = 2 [
    (gnostic.openapi.v3.property) = {
      description: "发布动作"
    }
  ]; // 发布动作

  string cacheVersion = 3 [
    (gnostic.openapi.v3.property) = {
      description: "缓存版本，留空时沿用动作默认行为"
    }
  ]; // 缓存版本，留空时沿用动作默认行为

  string rollbackVersion = 4 [
    (gnostic.openapi.v3.property) = {
      description: "回滚版本，设置回滚动作时留空会默认使用当前选中版本"
    }
  ]; // 回滚版本，设置回滚动作时留空会默认使用当前选中版本

  optional double grayRatio = 5 [
    (gnostic.openapi.v3.property) = {
      description: "灰度比例"
    }
  ]; // 灰度比例

  string publishedBy = 6 [
    (gnostic.openapi.v3.property) = {
      description: "发布人"
    }
  ]; // 发布人

  string publishedReason = 7 [
    (gnostic.openapi.v3.property) = {
      description: "发布说明"
    }
  ]; // 发布说明
}

// 推荐版本发布动作响应
message UpdateRecommendModelVersionPublishResponse {
  repeated string summary = 1 [
    (gnostic.openapi.v3.property) = {
      description: "执行摘要"
    }
  ]; // 执行摘要
}
