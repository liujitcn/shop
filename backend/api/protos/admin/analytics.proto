syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

// Admin 数据分析服务
service AnalyticsService {
  // 查询汇总数据（用户）
  rpc AnalyticsCountUser (AnalyticsCountRequest) returns (AnalyticsCountResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/count/user"
    };
  }
  // 查询汇总数据（商品）
  rpc AnalyticsCountGoods (AnalyticsCountRequest) returns (AnalyticsCountResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/count/goods"
    };
  }
  // 查询汇总数据（订单）
  rpc AnalyticsCountOrder (AnalyticsCountRequest) returns (AnalyticsCountResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/count/order"
    };
  }
  // 查询汇总数据（销量）
  rpc AnalyticsCountSale (AnalyticsCountRequest) returns (AnalyticsCountResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/count/sale"
    };
  }
  // 查询订单销量（柱状图）
  rpc AnalyticsBarOrder (AnalyticsBarOrderRequest) returns (AnalyticsBarResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/bar/order"
    };
  }
  // 查询商品销量（柱状图）
  rpc AnalyticsBarGoods (AnalyticsBarGoodsRequest) returns (AnalyticsBarResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/bar/goods"
    };
  }
  // 查询商品分类（饼状图）
  rpc AnalyticsPieGoods (AnalyticsPieGoodsRequest) returns (AnalyticsPieResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/pie/goods"
    };
  }
  // 查询商品订单销量状态（雷达图）
  rpc AnalyticsRadarOrder (AnalyticsRadarOrderRequest) returns (AnalyticsRadarResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/radar/order"
    };
  }
}

// 时间类型
enum AnalyticsTimeType{
  DAY  = 0; // 日
  WEEK  = 1; // 周
  MONTH = 2; // 月
}

// 汇总数据请求参数
message AnalyticsCountRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ]; // 时间类型
}

// 汇总数据返回结果
message AnalyticsCountResponse {
  int64 newNum = 1 [
    (gnostic.openapi.v3.property) = {
      description: "新增数量",
    }
  ]; // 新增数量
  int64 totalNum = 11 [
    (gnostic.openapi.v3.property) = {
      description: "总数量",
    }
  ]; // 总数量
}

// 订单销量（柱状图）请求参数
message AnalyticsBarOrderRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ]; // 时间类型
}

// 商品销量（柱状图）请求参数
message AnalyticsBarGoodsRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ]; // 时间类型
  int64 top = 2 [
    (gnostic.openapi.v3.property) = {
      description: "top",
    }
  ]; // top
}

// 商品分类（饼状图）请求参数
message AnalyticsPieGoodsRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ]; // 时间类型
}

// 商品订单销量状态（雷达图）请求参数
message AnalyticsRadarOrderRequest {
  AnalyticsTimeType timeType = 1 [
    (gnostic.openapi.v3.property) = {
      description: "时间类型",
    }
  ]; // 时间类型
}

//（柱状图）请求参数
message AnalyticsBarResponse {
  message SeriesData {
    repeated int64 value = 1 [
      (gnostic.openapi.v3.property) = {
        description: "数量",
      }
    ]; // 数量
  }

  repeated string axisData = 1 [
    (gnostic.openapi.v3.property) = {
      description: "X,Y 轴数据数组",
    }
  ]; // 图例的数据数组

  repeated SeriesData seriesData = 2 [
    (gnostic.openapi.v3.property) = {
      description: "数据内容数组",
    }
  ]; // 数据内容数组
}

//（饼状图）返回结果
message AnalyticsPieResponse {
  message SeriesData {
    int64 value = 1 [
      (gnostic.openapi.v3.property) = {
        description: "数值",
      }
    ]; // 数值
    string name = 2 [
      (gnostic.openapi.v3.property) = {
        description: "系列名称",
      }
    ]; // 系列名称
  }

  repeated SeriesData seriesData = 1 [
    (gnostic.openapi.v3.property) = {
      description: "数据内容数组",
    }
  ]; // 数据内容数组
}

// （雷达图）返回结果
message AnalyticsRadarResponse {
  message RadarIndicator {
    string name = 1 [
      (gnostic.openapi.v3.property) = {
        description: "指示器名称",
      }
    ]; // 指示器名称
  }
  message SeriesData {
    string name = 1 [
      (gnostic.openapi.v3.property) = {
        description: "数据项名称",
      }
    ]; // 数据项名称
    repeated int64 value = 2 [
      (gnostic.openapi.v3.property) = {
        description: "单个数据项的数值",
      }
    ]; // 单个数据项的数值
  }

  repeated string legendData = 1 [
    (gnostic.openapi.v3.property) = {
      description: "图例的数据数组",
    }
  ]; // 图例的数据数组
  repeated RadarIndicator radarIndicator = 2 [
    (gnostic.openapi.v3.property) = {
      description: "指示器",
    }
  ]; // 指示器
  repeated SeriesData seriesData = 3 [
    (gnostic.openapi.v3.property) = {
      description: "数据",
    }
  ]; // 数据
}
