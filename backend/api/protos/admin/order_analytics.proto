syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

import "common/analytics.proto";

// Admin订单分析服务
service OrderAnalyticsService {
  // 查询订单摘要指标
  rpc GetOrderAnalyticsSummary (common.AnalyticsTimeRequest) returns (OrderAnalyticsSummaryResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/order/summary"
    };
  }

  // 查询订单趋势
  rpc GetOrderAnalyticsTrend (common.AnalyticsTimeRequest) returns (common.AnalyticsTrendResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/order/trend"
    };
  }

  // 查询订单状态分布
  rpc GetOrderAnalyticsPie (common.AnalyticsTimeRequest) returns (common.AnalyticsPieResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/order/pie"
    };
  }
}

// 订单分析汇总响应
message OrderAnalyticsSummaryResponse {
  int64 newOrderCount = 1 [
    (gnostic.openapi.v3.property) = {description: "新增订单数"}
  ]; // 新增订单数
  int64 newOrderGrowthRate = 2 [
    (gnostic.openapi.v3.property) = {description: "新增订单增长率"}
  ]; // 新增订单增长率
  int64 saleAmount = 3 [
    (gnostic.openapi.v3.property) = {description: "销售额"}
  ]; // 销售额
  int64 averageOrderAmount = 4 [
    (gnostic.openapi.v3.property) = {description: "客单价"}
  ]; // 客单价
  int64 orderUserCount = 5 [
    (gnostic.openapi.v3.property) = {description: "下单用户数"}
  ]; // 下单用户数
  int64 repurchaseRate = 6 [
    (gnostic.openapi.v3.property) = {description: "复购率"}
  ]; // 复购率
}
