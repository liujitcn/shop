syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

import "common/analytics.proto";

// Admin商品分析服务
service GoodsAnalyticsService {
  // 查询商品摘要指标
  rpc GetGoodsAnalyticsSummary (common.AnalyticsTimeRequest) returns (GoodsAnalyticsSummaryResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/goods/summary"
    };
  }

  // 查询商品趋势
  rpc GetGoodsAnalyticsTrend (common.AnalyticsTimeRequest) returns (common.AnalyticsTrendResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/goods/trend"
    };
  }

  // 查询商品分类分布
  rpc GetGoodsAnalyticsPie (common.AnalyticsTimeRequest) returns (common.AnalyticsPieResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/goods/pie"
    };
  }

  // 查询商品支付排行
  rpc GetGoodsAnalyticsRank (common.AnalyticsTimeRequest) returns (common.AnalyticsRankResponse) {
    option (google.api.http) = {
      get: "/api/admin/analytics/goods/rank"
    };
  }
}

// 商品分析汇总响应
message GoodsAnalyticsSummaryResponse {
  int64 newGoodsCount = 1 [
    (gnostic.openapi.v3.property) = {description: "新增商品数"}
  ]; // 新增商品数
  int64 putOnGoodsRate = 2 [
    (gnostic.openapi.v3.property) = {description: "上架商品占比"}
  ]; // 上架商品占比
  int64 activeGoodsCount = 3 [
    (gnostic.openapi.v3.property) = {description: "活跃商品数"}
  ]; // 活跃商品数
  int64 activeGoodsRate = 4 [
    (gnostic.openapi.v3.property) = {description: "活跃商品占比"}
  ]; // 活跃商品占比
  int64 saleCount = 5 [
    (gnostic.openapi.v3.property) = {description: "销售件数"}
  ]; // 销售件数
  int64 saleGrowthRate = 6 [
    (gnostic.openapi.v3.property) = {description: "销售增长率"}
  ]; // 销售增长率
  int64 viewCount = 7 [
    (gnostic.openapi.v3.property) = {description: "浏览次数"}
  ]; // 浏览次数
  int64 collectCount = 8 [
    (gnostic.openapi.v3.property) = {description: "收藏次数"}
  ]; // 收藏次数
  int64 cartCount = 9 [
    (gnostic.openapi.v3.property) = {description: "加购件数"}
  ]; // 加购件数
  int64 orderCount = 10 [
    (gnostic.openapi.v3.property) = {description: "下单次数"}
  ]; // 下单次数
  int64 payCount = 11 [
    (gnostic.openapi.v3.property) = {description: "支付次数"}
  ]; // 支付次数
  int64 payAmount = 12 [
    (gnostic.openapi.v3.property) = {description: "支付金额，单位分"}
  ]; // 支付金额，单位分
  int64 cartConversionRate = 13 [
    (gnostic.openapi.v3.property) = {description: "浏览加购转化率"}
  ]; // 浏览加购转化率
  int64 orderConversionRate = 14 [
    (gnostic.openapi.v3.property) = {description: "加购下单转化率"}
  ]; // 加购下单转化率
  int64 payConversionRate = 15 [
    (gnostic.openapi.v3.property) = {description: "浏览支付转化率"}
  ]; // 浏览支付转化率
  int64 payUnitPrice = 16 [
    (gnostic.openapi.v3.property) = {description: "件均成交价，单位分"}
  ]; // 件均成交价，单位分
}
