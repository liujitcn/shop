syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin Gorse 推荐服务
service RecommendGorseService {
  // 查询 Gorse 推荐时间序列
  rpc GetTimeSeries(GetTimeSeriesRequest) returns (TimeSeriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/timeseries/{name}"
    };
  }

  // 查询 Gorse 推荐分类
  rpc OptionCategories(OptionCategoriesRequest) returns (OptionCategoriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/category/option"
    };
  }

  // 查询 Gorse 推荐仪表盘推荐商品
  rpc ListDashboardItems(ListDashboardItemsRequest) returns (ListDashboardItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/dashboard"
    };
  }

  // 查询 Gorse 推荐任务状态
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/task"
    };
  }

  // 查询 Gorse 推荐用户列表
  rpc PageUsers(PageUsersRequest) returns (PageUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/user"
    };
  }

  // 查询 Gorse 推荐用户
  rpc GetUser(GetUserRequest) returns (UserResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/user/{id}"
    };
  }

  // 删除 Gorse 推荐用户
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/recommend/gorse/user/{id}"
    };
  }

  // 查询 Gorse 推荐相似用户
  rpc GetUserSimilar(GetUserSimilarRequest) returns (UserSimilarResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/user/{id}/similar"
    };
  }

  // 查询 Gorse 推荐用户反馈
  rpc GetUserFeedback(GetUserFeedbackRequest) returns (FeedbackResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/user/{id}/feedback"
    };
  }

  // 查询 Gorse 推荐用户推荐结果
  rpc GetUserRecommend(GetUserRecommendRequest) returns (ItemListResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/user/{id}/recommend"
    };
  }

  // 查询 Gorse 推荐商品列表
  rpc PageItems(PageItemsRequest) returns (PageItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/item"
    };
  }

  // 查询 Gorse 推荐商品
  rpc GetItem(GetItemRequest) returns (Item) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/item/{id}"
    };
  }

  // 删除 Gorse 推荐商品
  rpc DeleteItem(DeleteItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/recommend/gorse/item/{id}"
    };
  }

  // 查询 Gorse 推荐相似商品
  rpc GetItemSimilar(GetItemSimilarRequest) returns (ItemListResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/item/{id}/similar"
    };
  }

  // 导出 Gorse 推荐数据
  rpc ExportData(ExportDataRequest) returns (ExportDataResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/export"
    };
  }

  // 导入 Gorse 推荐数据
  rpc ImportData(ImportDataRequest) returns (ImportDataResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/recommend/gorse/import"
      body: "*"
    };
  }

  // 查询 Gorse 推荐配置
  rpc GetConfig(GetConfigRequest) returns (ConfigResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/recommend/gorse/config"
    };
  }

  // 保存 Gorse 推荐配置
  rpc SaveConfig(SaveConfigRequest) returns (ConfigResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/recommend/gorse/config"
      body: "config"
    };
  }

  // 重置 Gorse 推荐配置
  rpc ResetConfig(ResetConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/recommend/gorse/config"
    };
  }

  // 预览 Gorse 推荐外部推荐脚本
  rpc PreviewExternal(PreviewExternalRequest) returns (PreviewExternalResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/recommend/gorse/external/preview"
      body: "*"
    };
  }

  // 预览 Gorse 推荐排序提示词
  rpc PreviewRankerPrompt(PreviewRankerPromptRequest) returns (PreviewRankerPromptResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/recommend/gorse/ranker/prompt"
      body: "*"
    };
  }
}

// 外部推荐脚本预览请求
message PreviewExternalRequest {
  string user_id = 1 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户编号"}
  ]; // 用户编号

  string script = 2 [(gnostic.openapi.v3.property) = {description: "外部推荐脚本"}]; // 外部推荐脚本
}

// 外部推荐脚本预览响应
message PreviewExternalResponse {
  repeated string items = 1 [(gnostic.openapi.v3.property) = {description: "推荐商品编号列表"}]; // 推荐商品编号列表
}

// 排序提示词预览请求
message PreviewRankerPromptRequest {
  string user_id = 1 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户编号"}
  ]; // 用户编号

  string query_template = 2 [
    json_name = "queryTemplate",
    (gnostic.openapi.v3.property) = {description: "查询模板"}
  ]; // 查询模板

  string document_template = 3 [
    json_name = "documentTemplate",
    (gnostic.openapi.v3.property) = {description: "文档模板"}
  ]; // 文档模板
}

// 排序提示词预览响应
message PreviewRankerPromptResponse {
  string query = 1 [(gnostic.openapi.v3.property) = {description: "查询提示词"}]; // 查询提示词

  repeated string documents = 2 [(gnostic.openapi.v3.property) = {description: "文档提示词列表"}]; // 文档提示词列表
}

// Gorse 推荐导出数据查询条件
message ExportDataRequest {
  .common.v1.AdvanceDataType data_type = 1 [(gnostic.openapi.v3.property) = {description: "数据类型：枚举【AdvanceDataType】"}]; // 数据类型：枚举【AdvanceDataType】
}

// Gorse 推荐导出数据响应
message ExportDataResponse {
  string file_name = 1 [(gnostic.openapi.v3.property) = {description: "文件名"}]; // 文件名

  string content = 2 [(gnostic.openapi.v3.property) = {description: "JSONL文件内容"}]; // JSONL文件内容
}

// Gorse 推荐导入数据请求
message ImportDataRequest {
  .common.v1.AdvanceDataType data_type = 1 [(gnostic.openapi.v3.property) = {description: "数据类型：枚举【AdvanceDataType】"}]; // 数据类型：枚举【AdvanceDataType】

  string file_name = 2 [(gnostic.openapi.v3.property) = {description: "文件名"}]; // 文件名

  string content = 3 [(gnostic.openapi.v3.property) = {description: "JSONL文件内容"}]; // JSONL文件内容
}

// Gorse 推荐导入数据响应
message ImportDataResponse {
  int32 success_count = 1 [(gnostic.openapi.v3.property) = {description: "成功导入数量"}]; // 成功导入数量
}

// Gorse 推荐名称查询条件
message GetTimeSeriesRequest {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "名称"}]; // 名称
  string begin = 2 [(gnostic.openapi.v3.property) = {description: "开始时间"}]; // 开始时间
  string end = 3 [(gnostic.openapi.v3.property) = {description: "结束时间"}]; // 结束时间
}

// Gorse 推荐仪表盘推荐商品查询条件
message ListDashboardItemsRequest {
  string recommender = 1 [(gnostic.openapi.v3.property) = {description: "推荐器名称"}]; // 推荐器名称
  string category = 2 [(gnostic.openapi.v3.property) = {description: "分类"}]; // 分类
  int32 end = 3 [(gnostic.openapi.v3.property) = {description: "结束位置"}]; // 结束位置
}

// Gorse 推荐分类查询条件
message OptionCategoriesRequest {}

// Gorse 推荐分类响应
message OptionCategoriesResponse {
  repeated string categories = 1 [(gnostic.openapi.v3.property) = {description: "分类列表"}]; // 分类列表
}

// Gorse 推荐仪表盘推荐商品响应
message ListDashboardItemsResponse {
  repeated Item items = 1 [
    json_name = "Items",
    (gnostic.openapi.v3.property) = {description: "商品列表"}
  ]; // 商品列表
  string last_modified = 2 [
    json_name = "LastModified",
    (gnostic.openapi.v3.property) = {description: "最后更新时间"}
  ]; // 最后更新时间
}

// Gorse 推荐时间序列响应
message TimeSeriesResponse {
  repeated TimeSeriesPoint points = 1 [
    json_name = "Points",
    (gnostic.openapi.v3.property) = {description: "时间序列点列表"}
  ]; // 时间序列点列表
}

// Gorse 推荐时间序列点
message TimeSeriesPoint {
  string name = 1 [
    json_name = "Name",
    (gnostic.openapi.v3.property) = {description: "名称"}
  ]; // 名称
  string timestamp = 2 [
    json_name = "Timestamp",
    (gnostic.openapi.v3.property) = {description: "时间"}
  ]; // 时间
  double value = 3 [
    json_name = "Value",
    (gnostic.openapi.v3.property) = {description: "数值"}
  ]; // 数值
}

// Gorse 推荐相似用户查询条件
message GetUserSimilarRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户编号"}]; // 用户编号
  string recommender = 2 [(gnostic.openapi.v3.property) = {description: "推荐器名称"}]; // 推荐器名称
  string category = 3 [(gnostic.openapi.v3.property) = {description: "分类"}]; // 分类
}

// Gorse 推荐相似商品查询条件
message GetItemSimilarRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "商品编号"}]; // 商品编号
  string recommender = 2 [(gnostic.openapi.v3.property) = {description: "推荐器名称"}]; // 推荐器名称
  string category = 3 [(gnostic.openapi.v3.property) = {description: "分类"}]; // 分类
}

// Gorse 推荐用户反馈查询条件
message GetUserFeedbackRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户编号"}]; // 用户编号
  string feedback_type = 2 [
    json_name = "feedback_type",
    (gnostic.openapi.v3.property) = {description: "反馈类型"}
  ]; // 反馈类型
  int32 offset = 3 [(gnostic.openapi.v3.property) = {description: "偏移量"}]; // 偏移量
  int32 n = 4 [(gnostic.openapi.v3.property) = {description: "查询数量"}]; // 查询数量
}

// Gorse 推荐用户推荐查询条件
message GetUserRecommendRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户编号"}]; // 用户编号
  string recommender = 2 [(gnostic.openapi.v3.property) = {description: "推荐器名称"}]; // 推荐器名称
  string category = 3 [(gnostic.openapi.v3.property) = {description: "分类"}]; // 分类
  int32 n = 4 [(gnostic.openapi.v3.property) = {description: "查询数量"}]; // 查询数量
}

// Gorse 推荐任务状态查询条件
message ListTasksRequest {}

// Gorse 推荐任务状态响应
message ListTasksResponse {
  repeated Task tasks = 1 [
    json_name = "Tasks",
    (gnostic.openapi.v3.property) = {description: "任务状态列表"}
  ]; // 任务状态列表
}

// Gorse 推荐任务状态
message Task {
  string tracer = 1 [
    json_name = "Tracer",
    (gnostic.openapi.v3.property) = {description: "执行节点"}
  ]; // 执行节点
  string name = 2 [
    json_name = "Name",
    (gnostic.openapi.v3.property) = {description: "任务名称"}
  ]; // 任务名称
  string status = 3 [
    json_name = "Status",
    (gnostic.openapi.v3.property) = {description: "任务状态"}
  ]; // 任务状态
  string error = 4 [
    json_name = "Error",
    (gnostic.openapi.v3.property) = {description: "错误信息"}
  ]; // 错误信息
  int64 count = 5 [
    json_name = "Count",
    (gnostic.openapi.v3.property) = {description: "当前进度"}
  ]; // 当前进度
  int64 total = 6 [
    json_name = "Total",
    (gnostic.openapi.v3.property) = {description: "总进度"}
  ]; // 总进度
  string start_time = 7 [
    json_name = "StartTime",
    (gnostic.openapi.v3.property) = {description: "开始时间"}
  ]; // 开始时间
  string finish_time = 8 [
    json_name = "FinishTime",
    (gnostic.openapi.v3.property) = {description: "结束时间"}
  ]; // 结束时间
}

// Gorse 推荐用户列表查询条件
message PageUsersRequest {
  string cursor = 1 [(gnostic.openapi.v3.property) = {description: "分页游标"}]; // 分页游标
  int32 n = 2 [(gnostic.openapi.v3.property) = {description: "查询数量"}]; // 查询数量
}

// Gorse 推荐用户查询条件
message GetUserRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户编号"}]; // 用户编号
}

// Gorse 推荐用户删除条件
message DeleteUserRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户编号"}]; // 用户编号
}

// Gorse 推荐用户分页响应
message PageUsersResponse {
  string cursor = 1 [
    json_name = "Cursor",
    (gnostic.openapi.v3.property) = {description: "下一页游标"}
  ]; // 下一页游标
  repeated UserResponse users = 2 [
    json_name = "Users",
    (gnostic.openapi.v3.property) = {description: "用户列表"}
  ]; // 用户列表
}

// Gorse 推荐相似用户响应
message UserSimilarResponse {
  repeated UserResponse users = 1 [
    json_name = "Users",
    (gnostic.openapi.v3.property) = {description: "相似用户列表"}
  ]; // 相似用户列表
}

// Gorse 推荐用户
message UserResponse {
  string user_id = 1 [
    json_name = "UserId",
    (gnostic.openapi.v3.property) = {description: "用户编号"}
  ]; // 用户编号
  UserLabel labels = 2 [
    json_name = "Labels",
    (gnostic.openapi.v3.property) = {description: "标签信息"}
  ]; // 标签信息
  string comment = 3 [
    json_name = "Comment",
    (gnostic.openapi.v3.property) = {description: "备注"}
  ]; // 备注
  string last_active_time = 4 [
    json_name = "LastActiveTime",
    (gnostic.openapi.v3.property) = {description: "最后活跃时间"}
  ]; // 最后活跃时间
  string last_update_time = 5 [
    json_name = "LastUpdateTime",
    (gnostic.openapi.v3.property) = {description: "最后更新时间"}
  ]; // 最后更新时间
  double score = 6 [
    json_name = "Score",
    (gnostic.openapi.v3.property) = {description: "分数"}
  ]; // 分数
}

// Gorse 推荐用户标签信息
message UserLabel {
  int64 dept_id = 1 [
    json_name = "dept_id",
    (gnostic.openapi.v3.property) = {description: "部门编号"}
  ]; // 部门编号
  int32 gender = 2 [(gnostic.openapi.v3.property) = {description: "性别"}]; // 性别
  int64 role_id = 3 [
    json_name = "role_id",
    (gnostic.openapi.v3.property) = {description: "角色编号"}
  ]; // 角色编号
  int32 status = 4 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// Gorse 推荐商品列表查询条件
message PageItemsRequest {
  string cursor = 1 [(gnostic.openapi.v3.property) = {description: "分页游标"}]; // 分页游标
  int32 n = 2 [(gnostic.openapi.v3.property) = {description: "查询数量"}]; // 查询数量
}

// Gorse 推荐商品查询条件
message GetItemRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "商品编号"}]; // 商品编号
}

// Gorse 推荐商品删除条件
message DeleteItemRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "商品编号"}]; // 商品编号
}

// Gorse 推荐商品分页响应
message PageItemsResponse {
  string cursor = 1 [
    json_name = "Cursor",
    (gnostic.openapi.v3.property) = {description: "下一页游标"}
  ]; // 下一页游标
  repeated Item items = 2 [
    json_name = "Items",
    (gnostic.openapi.v3.property) = {description: "商品列表"}
  ]; // 商品列表
}

// Gorse 推荐商品列表响应
message ItemListResponse {
  repeated Item items = 1 [
    json_name = "Items",
    (gnostic.openapi.v3.property) = {description: "商品列表"}
  ]; // 商品列表
}

// Gorse 推荐商品
message Item {
  string item_id = 1 [
    json_name = "ItemId",
    (gnostic.openapi.v3.property) = {description: "商品编号"}
  ]; // 商品编号
  bool is_hidden = 2 [
    json_name = "IsHidden",
    (gnostic.openapi.v3.property) = {description: "是否隐藏"}
  ]; // 是否隐藏
  repeated string categories = 3 [
    json_name = "Categories",
    (gnostic.openapi.v3.property) = {description: "分类列表"}
  ]; // 分类列表
  string timestamp = 4 [
    json_name = "Timestamp",
    (gnostic.openapi.v3.property) = {description: "时间"}
  ]; // 时间
  ItemLabel labels = 5 [
    json_name = "Labels",
    (gnostic.openapi.v3.property) = {description: "标签信息"}
  ]; // 标签信息
  string comment = 6 [
    json_name = "Comment",
    (gnostic.openapi.v3.property) = {description: "备注"}
  ]; // 备注
  double score = 7 [
    json_name = "Score",
    (gnostic.openapi.v3.property) = {description: "分数"}
  ]; // 分数
}

// Gorse 推荐商品标签信息
message ItemLabel {
  string desc = 1 [
    json_name = "desc",
    (gnostic.openapi.v3.property) = {description: "商品描述"}
  ]; // 商品描述
  int64 discount_price = 2 [
    json_name = "discount_price",
    (gnostic.openapi.v3.property) = {description: "折扣价"}
  ]; // 折扣价
  int64 inventory = 4 [(gnostic.openapi.v3.property) = {description: "库存"}]; // 库存
  int64 price = 5 [(gnostic.openapi.v3.property) = {description: "原价"}]; // 原价
  int32 status = 6 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// Gorse 推荐反馈响应
message FeedbackResponse {
  repeated Feedback feedback = 1 [
    json_name = "Feedback",
    (gnostic.openapi.v3.property) = {description: "反馈列表"}
  ]; // 反馈列表
}

// Gorse 推荐反馈
message Feedback {
  string feedback_type = 1 [
    json_name = "FeedbackType",
    (gnostic.openapi.v3.property) = {description: "反馈类型"}
  ]; // 反馈类型
  string user_id = 2 [
    json_name = "UserId",
    (gnostic.openapi.v3.property) = {description: "用户编号"}
  ]; // 用户编号
  Item item = 3 [
    json_name = "Item",
    (gnostic.openapi.v3.property) = {description: "反馈商品"}
  ]; // 反馈商品
  double value = 4 [
    json_name = "Value",
    (gnostic.openapi.v3.property) = {description: "反馈值"}
  ]; // 反馈值
  string timestamp = 5 [
    json_name = "Timestamp",
    (gnostic.openapi.v3.property) = {description: "时间"}
  ]; // 时间
  string comment = 6 [
    json_name = "Comment",
    (gnostic.openapi.v3.property) = {description: "备注"}
  ]; // 备注
}

// Gorse 推荐配置查询条件
message GetConfigRequest {}

// Gorse 推荐配置保存条件
message SaveConfigRequest {
  ConfigResponse config = 1 [(gnostic.openapi.v3.property) = {description: "Gorse 推荐配置"}]; // Gorse 推荐配置
}

// Gorse 推荐配置重置条件
message ResetConfigRequest {}

// Gorse 推荐配置响应
message ConfigResponse {
  Database database = 1 [(gnostic.openapi.v3.property) = {description: "数据库配置"}]; // 数据库配置
  Master master = 2 [(gnostic.openapi.v3.property) = {description: "主节点配置"}]; // 主节点配置
  Server server = 3 [(gnostic.openapi.v3.property) = {description: "服务配置"}]; // 服务配置
  Recommend recommend = 4 [(gnostic.openapi.v3.property) = {description: "推荐配置"}]; // 推荐配置
  Blob blob = 5 [(gnostic.openapi.v3.property) = {description: "Blob存储配置"}]; // Blob存储配置
  Tracing tracing = 6 [(gnostic.openapi.v3.property) = {description: "链路追踪配置"}]; // 链路追踪配置
  Oidc oidc = 7 [
    json_name = "oidc",
    (gnostic.openapi.v3.property) = {description: "OIDC认证配置"}
  ]; // OIDC认证配置
  Openai openai = 8 [
    json_name = "openai",
    (gnostic.openapi.v3.property) = {description: "OpenAI配置"}
  ]; // OpenAI配置

  // Gorse 推荐数据库配置
  message Database {
    string data_store = 1 [
