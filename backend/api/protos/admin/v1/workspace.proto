syntax = "proto3";

package admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Admin工作台服务
service WorkspaceService {
  // 查询工作台顶部指标
  rpc SummaryWorkspaceMetrics(SummaryWorkspaceMetricsRequest) returns (SummaryWorkspaceMetricsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/workspace/metrics/summary"
    };
  }

  // 查询工作台待处理事项
  rpc SummaryWorkspaceTodo(SummaryWorkspaceTodoRequest) returns (SummaryWorkspaceTodoResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/workspace/todo/summary"
    };
  }

  // 查询工作台风险提醒
  rpc SummaryWorkspaceRisk(SummaryWorkspaceRiskRequest) returns (SummaryWorkspaceRiskResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/workspace/risk/summary"
    };
  }

  // 查询工作台口碑洞察
  rpc SummaryWorkspaceReputation(SummaryWorkspaceReputationRequest) returns (SummaryWorkspaceReputationResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/workspace/reputation/summary"
    };
  }

  // 查询工作台待审核评价
  rpc ListWorkspacePendingComments(ListWorkspacePendingCommentsRequest) returns (ListWorkspacePendingCommentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/workspace/comment/pending"
    };
  }
}

// 工作台指标查询条件
message SummaryWorkspaceMetricsRequest {}

// 工作台指标响应
message SummaryWorkspaceMetricsResponse {
  int64 today_order_count = 1 [(gnostic.openapi.v3.property) = {description: "今日订单数"}]; // 今日订单数
  int64 today_order_growth_rate = 2 [(gnostic.openapi.v3.property) = {description: "今日订单较昨日增长率，百分比整数"}]; // 今日订单较昨日增长率，百分比整数
  int64 today_sale_amount = 3 [(gnostic.openapi.v3.property) = {description: "今日成交额，单位分"}]; // 今日成交额，单位分
  int64 average_order_amount = 4 [(gnostic.openapi.v3.property) = {description: "客单价，单位分"}]; // 客单价，单位分
  int64 pay_conversion_rate = 5 [(gnostic.openapi.v3.property) = {description: "支付转化率，千分比"}]; // 支付转化率，千分比
  int64 today_order_user_count = 6 [(gnostic.openapi.v3.property) = {description: "今日下单用户数"}]; // 今日下单用户数
  int64 repurchase_rate = 7 [(gnostic.openapi.v3.property) = {description: "复购占比，千分比"}]; // 复购占比，千分比
  int64 today_new_user_count = 8 [(gnostic.openapi.v3.property) = {description: "今日新增用户数"}]; // 今日新增用户数
  int64 today_sale_count = 9 [(gnostic.openapi.v3.property) = {description: "今日商品销量"}]; // 今日商品销量
  int64 active_goods_count = 10 [(gnostic.openapi.v3.property) = {description: "今日动销商品数"}]; // 今日动销商品数
  int64 today_new_goods_count = 11 [(gnostic.openapi.v3.property) = {description: "今日新增商品数"}]; // 今日新增商品数
  int64 today_sale_growth_rate = 12 [(gnostic.openapi.v3.property) = {description: "今日成交额较昨日增长率，百分比整数"}]; // 今日成交额较昨日增长率，百分比整数

  int64 today_comment_count = 13 [(gnostic.openapi.v3.property) = {description: "今日评价数"}]; // 今日评价数

  int64 average_comment_score = 14 [(gnostic.openapi.v3.property) = {description: "近7日平均评分，十分位，46表示4.6分"}]; // 近7日平均评分，十分位，46表示4.6分
}

// 工作台待办查询条件
message SummaryWorkspaceTodoRequest {}

// 工作台待办响应
message SummaryWorkspaceTodoResponse {
  int64 pending_pay_order_count = 1 [(gnostic.openapi.v3.property) = {description: "待支付订单数"}]; // 待支付订单数
  int64 pending_shipped_order_count = 2 [(gnostic.openapi.v3.property) = {description: "待发货订单数"}]; // 待发货订单数
  int64 low_inventory_sku_count = 3 [(gnostic.openapi.v3.property) = {description: "低库存SKU数"}]; // 低库存SKU数
  int64 pending_put_on_goods_count = 4 [(gnostic.openapi.v3.property) = {description: "待上架商品数"}]; // 待上架商品数

  int64 pending_comment_count = 5 [(gnostic.openapi.v3.property) = {description: "待审核评论数"}]; // 待审核评论数

  int64 pending_comment_discussion_count = 6 [(gnostic.openapi.v3.property) = {description: "待审核评论讨论数"}]; // 待审核评论讨论数
}

// 工作台风险提醒查询条件
message SummaryWorkspaceRiskRequest {}

// 工作台风险提醒响应
message SummaryWorkspaceRiskResponse {
  int64 abnormal_pay_bill_count = 1 [(gnostic.openapi.v3.property) = {description: "对账单异常数"}]; // 对账单异常数
  int64 zero_inventory_put_on_sku_count = 2 [(gnostic.openapi.v3.property) = {description: "零库存仍上架SKU数"}]; // 零库存仍上架SKU数
  int64 abnormal_price_sku_count = 3 [(gnostic.openapi.v3.property) = {description: "价格配置异常SKU数"}]; // 价格配置异常SKU数

  int64 low_score_comment_count = 4 [(gnostic.openapi.v3.property) = {description: "近7日低分评价数"}]; // 近7日低分评价数
}

// 工作台待审核评价查询条件
message ListWorkspacePendingCommentsRequest {
  int64 limit = 1 [(gnostic.openapi.v3.property) = {description: "返回数量，默认5，最大10"}]; // 返回数量，默认5，最大10
}

// 工作台待审核评价响应
message ListWorkspacePendingCommentsResponse {
  repeated WorkspacePendingComment pending_comments = 1 [(gnostic.openapi.v3.property) = {description: "待审核评价"}]; // 待审核评价
}

// 工作台待审核评价
message WorkspacePendingComment {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "评论ID"}]; // 评论ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  string goods_name = 3 [(gnostic.openapi.v3.property) = {description: "商品名称"}]; // 商品名称

  string user_name = 4 [(gnostic.openapi.v3.property) = {description: "用户昵称"}]; // 用户昵称

  int32 goods_score = 5 [(gnostic.openapi.v3.property) = {description: "商品评分"}]; // 商品评分

  string content = 6 [(gnostic.openapi.v3.property) = {description: "评论摘要"}]; // 评论摘要

  string created_at = 7 [(gnostic.openapi.v3.property) = {description: "评价时间"}]; // 评价时间
}

// 工作台口碑洞察查询条件
message SummaryWorkspaceReputationRequest {}

// 工作台口碑洞察响应
message SummaryWorkspaceReputationResponse {
  int64 average_comment_score = 1 [(gnostic.openapi.v3.property) = {description: "近7日平均评分，十分位，46表示4.6分"}]; // 近7日平均评分，十分位，46表示4.6分

  repeated WorkspaceReputationTag hot_tags = 2 [(gnostic.openapi.v3.property) = {description: "高频评价标签"}]; // 高频评价标签

  string ai_summary = 3 [(gnostic.openapi.v3.property) = {description: "AI评价摘要"}]; // AI评价摘要
}

// 工作台口碑高频标签
message WorkspaceReputationTag {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "标签名称"}]; // 标签名称

  int64 mention_count = 2 [(gnostic.openapi.v3.property) = {description: "提及次数"}]; // 提及次数
}
