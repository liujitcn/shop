syntax = "proto3";

package admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin商品SKU服务
service GoodsSkuService {
  // 查询商品SKU列表
  rpc PageGoodsSkus(PageGoodsSkusRequest) returns (PageGoodsSkusResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/sku"
    };
  }

  // 查询商品SKU
  rpc GetGoodsSku(GetGoodsSkuRequest) returns (GoodsSku) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/sku/{id}"
    };
  }

  // 更新商品SKU
  rpc UpdateGoodsSku(UpdateGoodsSkuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/goods/sku/{id}"
      body: "goods_sku"
    };
  }
}

// 商品SKU列表查询条件
message PageGoodsSkusRequest {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id

  string sku_code = 5 [(gnostic.openapi.v3.property) = {description: "商品SKU编号"}]; // 商品SKU编号

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 商品SKU列表响应
message PageGoodsSkusResponse {
  repeated GoodsSku goods_skus = 1 [(gnostic.openapi.v3.property) = {description: "商品SKU列表"}]; // 商品SKU列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 商品SKU详情查询条件
message GetGoodsSkuRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品SKUID"}]; // 商品SKUID
}

// 商品SKU更新条件
message UpdateGoodsSkuRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品SKUID"}]; // 商品SKUID

  GoodsSku goods_sku = 2 [(gnostic.openapi.v3.property) = {description: "商品SKU"}]; // 商品SKU
}

// 商品SKU
message GoodsSku {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品SKUID"}]; // 商品SKUID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id

  string picture = 3 [(gnostic.openapi.v3.property) = {description: "商品图片"}]; // 商品图片

  repeated string spec_item = 4 [(gnostic.openapi.v3.property) = {description: "SKU组成，需要与商品规格数组顺序对应"}]; // SKU组成，需要与商品规格数组顺序对应

  string sku_code = 5 [(gnostic.openapi.v3.property) = {description: "SKU编码"}]; // SKU编码

  int64 price = 6 [(gnostic.openapi.v3.property) = {description: "当前价格(分)"}]; // 当前价格(分)

  int64 discount_price = 7 [(gnostic.openapi.v3.property) = {description: "折扣价格（分）"}]; // 折扣价格（分）

  int64 init_sale_num = 8 [(gnostic.openapi.v3.property) = {description: "初始销量"}]; // 初始销量

  int64 real_sale_num = 9 [(gnostic.openapi.v3.property) = {description: "真实销售数量"}]; // 真实销售数量

  int64 inventory = 10 [(gnostic.openapi.v3.property) = {description: "库存数量"}]; // 库存数量
}
