syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin商城服务
service ShopServiceService {
  // 查询商城服务列表
  rpc PageShopServices(PageShopServicesRequest) returns (PageShopServicesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/service"
    };
  }

  // 查询商城服务
  rpc GetShopService(GetShopServiceRequest) returns (ShopServiceForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/service/{id}"
    };
  }

  // 创建商城服务
  rpc CreateShopService(CreateShopServiceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/shop/service"
      body: "shop_service"
    };
  }

  // 更新商城服务
  rpc UpdateShopService(UpdateShopServiceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/service/{id}"
      body: "shop_service"
    };
  }

  // 删除商城服务
  rpc DeleteShopService(DeleteShopServiceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/shop/service/{ids}"
    };
  }

  // 设置状态
  rpc SetShopServiceStatus(SetShopServiceStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/service/{id}/status"
      body: "*"
    };
  }
}

// 商城服务列表查询条件
message PageShopServicesRequest {
  string label = 1 [(gnostic.openapi.v3.property) = {description: "标签"}]; // 标签

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 商城服务列表响应
message PageShopServicesResponse {
  repeated ShopService shop_services = 1 [(gnostic.openapi.v3.property) = {description: "商城服务列表"}]; // 商城服务列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 商城服务详情查询条件
message GetShopServiceRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "服务ID"}]; // 服务ID
}

// 商城服务创建条件
message CreateShopServiceRequest {
  ShopServiceForm shop_service = 1 [(gnostic.openapi.v3.property) = {description: "商城服务表单"}]; // 商城服务表单
}

// 商城服务更新条件
message UpdateShopServiceRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "服务ID"}]; // 服务ID

  ShopServiceForm shop_service = 2 [(gnostic.openapi.v3.property) = {description: "商城服务表单"}]; // 商城服务表单
}

// 商城服务删除条件
message DeleteShopServiceRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "服务ID列表，多个用逗号分隔"}]; // 服务ID列表，多个用逗号分隔
}

// 商城服务状态设置条件
message SetShopServiceStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "服务ID"}]; // 服务ID

  .common.v1.Status status = 2 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}

// 商城服务
message ShopService {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "服务ID"}]; // 服务ID

  string label = 2 [(gnostic.openapi.v3.property) = {description: "标签"}]; // 标签

  string value = 3 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值

  int32 sort = 4 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 商城服务表单
message ShopServiceForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "服务ID"}]; // 服务ID

  string label = 2 [(gnostic.openapi.v3.property) = {description: "标签"}]; // 标签

  string value = 3 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值

  int32 sort = 4 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}
