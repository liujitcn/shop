syntax = "proto3";

package admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Admin商品报表服务
service GoodsReportService {
  // 查询商品月报汇总
  rpc SummaryGoodsMonthReport(SummaryGoodsMonthReportRequest) returns (SummaryGoodsMonthReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/goods/month/summary"
    };
  }

  // 查询商品月报名细
  rpc ListGoodsMonthReport(ListGoodsMonthReportRequest) returns (ListGoodsMonthReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/goods/month"
    };
  }

  // 查询商品日报汇总
  rpc SummaryGoodsDayReport(SummaryGoodsDayReportRequest) returns (SummaryGoodsDayReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/goods/day/summary"
    };
  }

  // 查询商品日报明细
  rpc ListGoodsDayReport(ListGoodsDayReportRequest) returns (ListGoodsDayReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/goods/day"
    };
  }
}

// 商品月报汇总查询条件
message SummaryGoodsMonthReportRequest {
  optional int64 tenant_id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
  optional int64 tenant_store_id = 2 [(gnostic.openapi.v3.property) = {description: "租户门店ID"}]; // 租户门店ID
  string start_month = 3 [
    (gnostic.openapi.v3.property) = {description: "开始月份，格式：YYYY-MM"}
  ]; // 开始月份，格式：YYYY-MM
  string end_month = 4 [
    (gnostic.openapi.v3.property) = {description: "结束月份，格式：YYYY-MM"}
  ]; // 结束月份，格式：YYYY-MM
}

// 商品月报列表请求参数
message ListGoodsMonthReportRequest {
  optional int64 tenant_id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
  optional int64 tenant_store_id = 2 [(gnostic.openapi.v3.property) = {description: "租户门店ID"}]; // 租户门店ID
  string start_month = 3 [
    (gnostic.openapi.v3.property) = {description: "开始月份，格式：YYYY-MM"}
  ]; // 开始月份，格式：YYYY-MM
  string end_month = 4 [
    (gnostic.openapi.v3.property) = {description: "结束月份，格式：YYYY-MM"}
  ]; // 结束月份，格式：YYYY-MM
}

// 商品月报汇总响应
message SummaryGoodsMonthReportResponse {
  int64 view_count = 1 [
    (gnostic.openapi.v3.property) = {description: "浏览次数"}
  ]; // 浏览次数
  int64 collect_count = 2 [
    (gnostic.openapi.v3.property) = {description: "收藏次数"}
  ]; // 收藏次数
  int64 cart_count = 3 [
    (gnostic.openapi.v3.property) = {description: "加购件数"}
  ]; // 加购件数
  int64 order_count = 4 [
    (gnostic.openapi.v3.property) = {description: "下单次数"}
  ]; // 下单次数
  int64 pay_count = 5 [
    (gnostic.openapi.v3.property) = {description: "支付次数"}
  ]; // 支付次数
  int64 pay_goods_num = 6 [
    (gnostic.openapi.v3.property) = {description: "支付件数"}
  ]; // 支付件数
  int64 pay_amount = 7 [
    (gnostic.openapi.v3.property) = {description: "支付金额，单位分"}
  ]; // 支付金额，单位分
  int64 cart_conversion_rate = 9 [
    (gnostic.openapi.v3.property) = {description: "浏览加购转化率"}
  ]; // 浏览加购转化率
  int64 order_conversion_rate = 10 [
    (gnostic.openapi.v3.property) = {description: "加购下单转化率"}
  ]; // 加购下单转化率
  int64 pay_conversion_rate = 11 [
    (gnostic.openapi.v3.property) = {description: "浏览支付转化率"}
  ]; // 浏览支付转化率
  int64 pay_unit_price = 12 [
    (gnostic.openapi.v3.property) = {description: "件均成交价，单位分"}
  ]; // 件均成交价，单位分
}

// 商品月报项
message GoodsMonthReportItem {
  string month = 1 [(gnostic.openapi.v3.property) = {description: "月份，格式：YYYY-MM"}]; // 月份，格式：YYYY-MM
  int64 view_count = 2 [
    (gnostic.openapi.v3.property) = {description: "浏览次数"}
  ]; // 浏览次数
  int64 collect_count = 3 [
    (gnostic.openapi.v3.property) = {description: "收藏次数"}
  ]; // 收藏次数
  int64 cart_count = 4 [
    (gnostic.openapi.v3.property) = {description: "加购件数"}
  ]; // 加购件数
  int64 order_count = 5 [
    (gnostic.openapi.v3.property) = {description: "下单次数"}
  ]; // 下单次数
  int64 pay_count = 6 [
    (gnostic.openapi.v3.property) = {description: "支付次数"}
  ]; // 支付次数
  int64 pay_goods_num = 7 [
    (gnostic.openapi.v3.property) = {description: "支付件数"}
  ]; // 支付件数
  int64 pay_amount = 8 [
    (gnostic.openapi.v3.property) = {description: "支付金额，单位分"}
  ]; // 支付金额，单位分
  int64 cart_conversion_rate = 10 [
    (gnostic.openapi.v3.property) = {description: "浏览加购转化率"}
  ]; // 浏览加购转化率
  int64 order_conversion_rate = 11 [
    (gnostic.openapi.v3.property) = {description: "加购下单转化率"}
  ]; // 加购下单转化率
  int64 pay_conversion_rate = 12 [
    (gnostic.openapi.v3.property) = {description: "浏览支付转化率"}
  ]; // 浏览支付转化率
  int64 pay_unit_price = 13 [
    (gnostic.openapi.v3.property) = {description: "件均成交价，单位分"}
  ]; // 件均成交价，单位分
}

// 商品月报列表响应
message ListGoodsMonthReportResponse {
  repeated GoodsMonthReportItem goods_month_reports = 1 [(gnostic.openapi.v3.property) = {description: "商品月报明细"}]; // 商品月报明细
}

