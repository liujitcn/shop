syntax = "proto3";

package admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin角色管理服务
service BaseRoleService {
  // 查询角色下拉选择
  rpc OptionBaseRoles(OptionBaseRolesRequest) returns (.common.v1.SelectOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role/option"
    };
  }

  // 查询角色分页列表
  rpc PageBaseRoles(PageBaseRolesRequest) returns (PageBaseRolesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role"
    };
  }

  // 查询角色
  rpc GetBaseRole(GetBaseRoleRequest) returns (BaseRoleForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role/{id}"
    };
  }

  // 创建角色
  rpc CreateBaseRole(CreateBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/role"
      body: "base_role"
    };
  }

  // 更新角色
  rpc UpdateBaseRole(UpdateBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{base_role.id}"
      body: "base_role"
    };
  }

  // 删除角色
  rpc DeleteBaseRole(DeleteBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/role/{id}"
    };
  }

  // 设置状态
  rpc SetBaseRoleStatus(SetBaseRoleStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{id}/status"
      body: "*"
    };
  }

  // 设置角色菜单权限
  rpc SetBaseRoleMenu(SetBaseRoleMenuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{id}/menu"
      body: "*"
    };
  }
}

// 角色选项查询条件
message OptionBaseRolesRequest {}

// 角色分页查询条件
message PageBaseRolesRequest {
  string name = 2 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string code = 3 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 角色分页响应
message PageBaseRolesResponse {
  repeated BaseRole base_roles = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询角色请求参数
message GetBaseRoleRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID
}

// 创建角色请求参数
message CreateBaseRoleRequest {
  BaseRoleForm base_role = 1 [(gnostic.openapi.v3.property) = {description: "角色表单"}]; // 角色表单
}

// 更新角色请求参数
message UpdateBaseRoleRequest {
  BaseRoleForm base_role = 1 [(gnostic.openapi.v3.property) = {description: "角色表单"}]; // 角色表单
}

// 删除角色请求参数
message DeleteBaseRoleRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID列表"}]; // 角色ID列表
}

// 设置角色状态请求参数
message SetBaseRoleStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 角色
message BaseRole {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string code = 3 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  .common.v1.BaseRoleDataScope data_scope = 4 [(gnostic.openapi.v3.property) = {description: "数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据"}]; // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 5 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}]; // 分配的菜单列表

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 角色表单
message BaseRoleForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string code = 3 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  optional .common.v1.BaseRoleDataScope data_scope = 4 [(gnostic.openapi.v3.property) = {description: "数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据"}]; // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 5 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}]; // 分配的菜单列表

  optional .common.v1.Status status = 51 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注
}

// 设置角色菜单权限请求参数
message SetBaseRoleMenuRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  repeated int64 menus = 2 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}]; // 分配的菜单列表
}
