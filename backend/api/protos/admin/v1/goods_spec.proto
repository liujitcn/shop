syntax = "proto3";

package admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Admin商品规格服务
service GoodsSpecService {
  // 查询商品规格列表
  rpc ListGoodsSpecs(ListGoodsSpecsRequest) returns (ListGoodsSpecsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/spec"
    };
  }
}

// 商品规格列表查询条件
message ListGoodsSpecsRequest {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id
}

// 商品规格列表响应
message ListGoodsSpecsResponse {
  repeated GoodsSpec goods_specs = 1 [(gnostic.openapi.v3.property) = {description: "商品规格列表"}]; // 商品规格列表
}

// 商品规格
message GoodsSpec {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品规格ID"}]; // 商品规格ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id

  string name = 3 [(gnostic.openapi.v3.property) = {description: "商品规格名称"}]; // 商品规格名称

  repeated string item = 4 [(gnostic.openapi.v3.property) = {description: "商品规格内容"}]; // 商品规格内容

  int32 sort = 5 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序
}
