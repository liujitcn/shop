syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin租户门店服务
service TenantStoreService {
  // 查询租户门店下拉选项
  rpc OptionTenantStore(OptionTenantStoreRequest) returns (OptionTenantStoreResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/tenant/store/option"
    };
  }

  // 查询租户门店树形选项
  rpc TreeTenantStore(TreeTenantStoreRequest) returns (TreeTenantStoreResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/tenant/store/tree"
    };
  }

  // 查询租户门店列表
  rpc PageTenantStore(PageTenantStoreRequest) returns (PageTenantStoreResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/tenant/store"
    };
  }

  // 查询租户门店
  rpc GetTenantStore(GetTenantStoreRequest) returns (TenantStoreForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/tenant/store/{id}"
    };
  }

  // 创建租户门店
  rpc CreateTenantStore(CreateTenantStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/tenant/store"
      body: "tenant_store"
    };
  }

  // 更新租户门店
  rpc UpdateTenantStore(UpdateTenantStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/tenant/store/{id}"
      body: "tenant_store"
    };
  }

  // 删除租户门店
  rpc DeleteTenantStore(DeleteTenantStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/tenant/store/{ids}"
    };
  }

  // 审核租户门店
  rpc AuditTenantStore(AuditTenantStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/tenant/store/{id}/audit"
      body: "*"
    };
  }
}

// 租户门店下拉选项查询条件
message OptionTenantStoreRequest {
  string keyword = 1 [(gnostic.openapi.v3.property) = {description: "门店名称关键字"}]; // 门店名称关键字
}

// 租户门店下拉选项响应
message OptionTenantStoreResponse {
  // 租户门店选项
  message Option {
    int64 value = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID

    string label = 2 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称
  }

  repeated Option list = 1 [(gnostic.openapi.v3.property) = {description: "门店选项列表"}]; // 门店选项列表
}

// 租户门店树形选项查询条件
message TreeTenantStoreRequest {
  string keyword = 1 [(gnostic.openapi.v3.property) = {description: "门店名称关键字"}]; // 门店名称关键字
}

// 租户门店树形选项响应
message TreeTenantStoreResponse {
  // 租户门店树形选项
  message Option {
    string value = 1 [(gnostic.openapi.v3.property) = {description: "选项值，tenant:{id} 或 store:{id}"}]; // 选项值，tenant:{id} 或 store:{id}

    string label = 2 [(gnostic.openapi.v3.property) = {description: "选项名称"}]; // 选项名称

    string type = 3 [(gnostic.openapi.v3.property) = {description: "节点类型：tenant 或 store"}]; // 节点类型：tenant 或 store

    int64 id = 4 [(gnostic.openapi.v3.property) = {description: "节点业务ID"}]; // 节点业务ID

    int64 tenant_id = 5 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

    repeated Option children = 101 [(gnostic.openapi.v3.property) = {description: "子节点树"}]; // 子节点树
  }

  repeated Option list = 1 [(gnostic.openapi.v3.property) = {description: "租户门店树形选项列表"}]; // 租户门店树形选项列表
}

// 租户门店列表查询条件
message PageTenantStoreRequest {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称

  optional int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  optional .common.v1.TenantStoreStatus status = 100 [(gnostic.openapi.v3.property) = {
    description: "审核状态：枚举【TenantStoreStatus】"
    default: {number: 0}
  }]; // 审核状态：枚举【TenantStoreStatus】

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 租户门店列表响应
message PageTenantStoreResponse {
  repeated TenantStore tenant_stores = 1 [(gnostic.openapi.v3.property) = {description: "租户门店列表"}]; // 租户门店列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 租户门店详情查询条件
message GetTenantStoreRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID
}

// 租户门店创建条件
message CreateTenantStoreRequest {
  TenantStoreForm tenant_store = 1 [(gnostic.openapi.v3.property) = {description: "租户门店表单"}]; // 租户门店表单
}

// 租户门店更新条件
message UpdateTenantStoreRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID

  TenantStoreForm tenant_store = 2 [(gnostic.openapi.v3.property) = {description: "租户门店表单"}]; // 租户门店表单
}

// 租户门店删除条件
message DeleteTenantStoreRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "门店ID列表，多个用逗号分隔"}]; // 门店ID列表，多个用逗号分隔
}

// 租户门店审核条件
message AuditTenantStoreRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID

  .common.v1.TenantStoreStatus status = 51 [(gnostic.openapi.v3.property) = {description: "审核状态：枚举【TenantStoreStatus】"}]; // 审核状态：枚举【TenantStoreStatus】

  string remark = 52 [(gnostic.openapi.v3.property) = {description: "审核备注"}]; // 审核备注
}

// 租户门店
message TenantStore {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID

  int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  string name = 4 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称

  string logo = 5 [(gnostic.openapi.v3.property) = {description: "门店LOGO"}]; // 门店LOGO

  string cover = 6 [(gnostic.openapi.v3.property) = {description: "门店封面"}]; // 门店封面

  string intro = 7 [(gnostic.openapi.v3.property) = {description: "门店简介"}]; // 门店简介

  string notice = 8 [(gnostic.openapi.v3.property) = {description: "门店公告"}]; // 门店公告

  repeated string business_license = 9 [(gnostic.openapi.v3.property) = {description: "营业执照"}]; // 营业执照

  .common.v1.TenantStoreStatus status = 100 [(gnostic.openapi.v3.property) = {description: "审核状态：枚举【TenantStoreStatus】"}]; // 审核状态：枚举【TenantStoreStatus】

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 租户门店表单
message TenantStoreForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "门店ID"}]; // 门店ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称

  string logo = 3 [(gnostic.openapi.v3.property) = {description: "门店LOGO"}]; // 门店LOGO

  string cover = 4 [(gnostic.openapi.v3.property) = {description: "门店封面"}]; // 门店封面

  string intro = 5 [(gnostic.openapi.v3.property) = {description: "门店简介"}]; // 门店简介

  string notice = 6 [(gnostic.openapi.v3.property) = {description: "门店公告"}]; // 门店公告

  repeated string business_license = 7 [(gnostic.openapi.v3.property) = {description: "营业执照"}]; // 营业执照

  string remark = 8 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注

  optional .common.v1.TenantStoreStatus status = 100 [(gnostic.openapi.v3.property) = {description: "审核状态：枚举【TenantStoreStatus】"}]; // 审核状态：枚举【TenantStoreStatus】
}
