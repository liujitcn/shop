syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin系统配置服务
service BaseConfigService {
  // 刷新缓存
  rpc RefreshBaseConfigCache(RefreshBaseConfigCacheRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/config/cache"
      body: "*"
    };
  }

  // 查询系统配置分页列表
  rpc PageBaseConfigs(PageBaseConfigsRequest) returns (PageBaseConfigsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/config"
    };
  }

  // 查询系统配置
  rpc GetBaseConfig(GetBaseConfigRequest) returns (BaseConfigForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/config/{id}"
    };
  }

  // 创建系统配置
  rpc CreateBaseConfig(CreateBaseConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/config"
      body: "base_config"
    };
  }

  // 更新系统配置
  rpc UpdateBaseConfig(UpdateBaseConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/config/{base_config.id}"
      body: "base_config"
    };
  }

  // 删除系统配置
  rpc DeleteBaseConfig(DeleteBaseConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/config/{id}"
    };
  }

  // 设置状态
  rpc SetBaseConfigStatus(SetBaseConfigStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/config/{id}/status"
      body: "*"
    };
  }
}

// 刷新系统配置缓存请求参数
message RefreshBaseConfigCacheRequest {}

// 系统配置分页查询条件
message PageBaseConfigsRequest {
  optional .common.v1.BaseConfigSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}]; // 位置：枚举【BaseConfigSite】

  optional string name = 3 [(gnostic.openapi.v3.property) = {description: "配置名称"}]; // 配置名称

  optional .common.v1.BaseConfigType type = 4 [(gnostic.openapi.v3.property) = {description: "配置类型：枚举【BaseConfigType】"}]; // 配置类型：枚举【BaseConfigType】

  optional string key = 5 [(gnostic.openapi.v3.property) = {description: "配置key"}]; // 配置key

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 系统配置分页响应
message PageBaseConfigsResponse {
  repeated BaseConfig base_configs = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询系统配置请求参数
message GetBaseConfigRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "配置ID"}]; // 配置ID
}

// 创建系统配置请求参数
message CreateBaseConfigRequest {
  BaseConfigForm base_config = 1 [(gnostic.openapi.v3.property) = {description: "系统配置表单"}]; // 系统配置表单
}

// 更新系统配置请求参数
message UpdateBaseConfigRequest {
  BaseConfigForm base_config = 1 [(gnostic.openapi.v3.property) = {description: "系统配置表单"}]; // 系统配置表单
}

// 删除系统配置请求参数
message DeleteBaseConfigRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "配置ID列表"}]; // 配置ID列表
}

// 设置系统配置状态请求参数
message SetBaseConfigStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "配置ID"}]; // 配置ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 系统配置
message BaseConfig {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "配置ID"}]; // 配置ID

  .common.v1.BaseConfigSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}]; // 位置：枚举【BaseConfigSite】

  string name = 3 [(gnostic.openapi.v3.property) = {description: "配置名称"}]; // 配置名称

  .common.v1.BaseConfigType type = 4 [(gnostic.openapi.v3.property) = {description: "配置类型：枚举【BaseConfigType】"}]; // 配置类型：枚举【BaseConfigType】

  string key = 5 [(gnostic.openapi.v3.property) = {description: "配置key"}]; // 配置key

  string value = 6 [(gnostic.openapi.v3.property) = {description: "配置value"}]; // 配置value

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 系统配置表单
message BaseConfigForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "配置ID"}]; // 配置ID

  optional .common.v1.BaseConfigSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}]; // 位置：枚举【BaseConfigSite】

  string name = 3 [(gnostic.openapi.v3.property) = {description: "配置名称"}]; // 配置名称

  optional .common.v1.BaseConfigType type = 4 [(gnostic.openapi.v3.property) = {description: "配置类型：1、文本，2、图片。3、富文本"}]; // 配置类型：1、文本，2、图片。3、富文本

  string key = 5 [(gnostic.openapi.v3.property) = {description: "配置key"}]; // 配置key

  string value = 6 [(gnostic.openapi.v3.property) = {description: "配置value"}]; // 配置value

  optional .common.v1.Status status = 51 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}
