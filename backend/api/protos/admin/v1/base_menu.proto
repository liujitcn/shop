syntax = "proto3";

package admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin菜单管理服务
service BaseMenuService {
  // 查询菜单树形列表
  rpc TreeBaseMenus(TreeBaseMenusRequest) returns (TreeBaseMenusResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/menu/tree"
    };
  }

  // 查询菜单树形选择
  rpc OptionBaseMenus(OptionBaseMenusRequest) returns (.common.v1.TreeOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/menu/option"
    };
  }

  // 查询菜单
  rpc GetBaseMenu(GetBaseMenuRequest) returns (BaseMenuForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/menu/{id}"
    };
  }

  // 创建菜单
  rpc CreateBaseMenu(CreateBaseMenuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/menu"
      body: "base_menu"
    };
  }

  // 更新菜单
  rpc UpdateBaseMenu(UpdateBaseMenuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/menu/{base_menu.id}"
      body: "base_menu"
    };
  }

  // 删除菜单
  rpc DeleteBaseMenu(DeleteBaseMenuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/menu/{id}"
    };
  }

  // 设置状态
  rpc SetBaseMenuStatus(SetBaseMenuStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/menu/{id}/status"
      body: "*"
    };
  }
}

// 菜单树查询条件
message TreeBaseMenusRequest {}

// 菜单树响应
message TreeBaseMenusResponse {
  repeated BaseMenu base_menus = 1 [(gnostic.openapi.v3.property) = {description: "菜单树"}]; // 菜单树
}

// 菜单选项查询条件
message OptionBaseMenusRequest {
  optional int64 parent_id = 1 [(gnostic.openapi.v3.property) = {description: "父级菜单ID"}]; // 父级菜单ID
}

// 查询菜单请求参数
message GetBaseMenuRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "菜单ID"}]; // 菜单ID
}

// 创建菜单请求参数
message CreateBaseMenuRequest {
  BaseMenuForm base_menu = 1 [(gnostic.openapi.v3.property) = {description: "菜单表单"}]; // 菜单表单
}

// 更新菜单请求参数
message UpdateBaseMenuRequest {
  BaseMenuForm base_menu = 1 [(gnostic.openapi.v3.property) = {description: "菜单表单"}]; // 菜单表单
}

// 删除菜单请求参数
message DeleteBaseMenuRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "菜单ID列表"}]; // 菜单ID列表
}

// 设置菜单状态请求参数
message SetBaseMenuStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "菜单ID"}]; // 菜单ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 菜单
message BaseMenu {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "菜单ID"}]; // 菜单ID

  int64 parent_id = 2 [(gnostic.openapi.v3.property) = {description: "父级菜单ID"}]; // 父级菜单ID

  .common.v1.BaseMenuType type = 3 [(gnostic.openapi.v3.property) = {description: "菜单类型"}]; // 菜单类型

  string path = 4 [(gnostic.openapi.v3.property) = {description: "路由地址"}]; // 路由地址

  string name = 5 [(gnostic.openapi.v3.property) = {description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"}]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  string component = 6 [(gnostic.openapi.v3.property) = {description: "组件路径"}]; // 组件路径

  string redirect = 7 [(gnostic.openapi.v3.property) = {description: "重定向地址"}]; // 重定向地址

  BaseMenuMeta meta = 8 [(gnostic.openapi.v3.property) = {description: "路由元信息"}]; // 路由元信息

  int32 sort = 9 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  repeated BaseMenu children = 300 [(gnostic.openapi.v3.property) = {description: "子菜单"}]; // 子菜单
}

// 菜单表单
message BaseMenuForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "菜单ID"}]; // 菜单ID

  optional int64 parent_id = 2 [(gnostic.openapi.v3.property) = {description: "父级菜单ID"}]; // 父级菜单ID

  optional .common.v1.BaseMenuType type = 3 [(gnostic.openapi.v3.property) = {description: "菜单类型"}]; // 菜单类型

  string path = 4 [(gnostic.openapi.v3.property) = {description: "路由地址"}]; // 路由地址

  string name = 5 [(gnostic.openapi.v3.property) = {description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"}]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  string component = 6 [(gnostic.openapi.v3.property) = {description: "组件路径"}]; // 组件路径

  string redirect = 7 [(gnostic.openapi.v3.property) = {description: "重定向地址"}]; // 重定向地址

  BaseMenuMeta meta = 8 [(gnostic.openapi.v3.property) = {description: "路由元信息"}]; // 路由元信息

  repeated string api = 9 [(gnostic.openapi.v3.property) = {description: "分配的API列表"}]; // 分配的API列表

  int32 sort = 50 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  optional .common.v1.Status status = 101 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 菜单元信息
message BaseMenuMeta {
  string title = 1 [(gnostic.openapi.v3.property) = {description: "菜单标题"}]; // 菜单标题

  optional string icon = 2 [(gnostic.openapi.v3.property) = {description: "菜单图标"}]; // 菜单图标

  optional bool always_show = 4 [(gnostic.openapi.v3.property) = {description: "【目录】只有一个子路由是否始终显示"}]; // 【目录】只有一个子路由是否始终显示

  optional bool hidden = 5 [(gnostic.openapi.v3.property) = {description: "是否隐藏(true-是 false-否)"}]; // 是否隐藏(true-是 false-否)

  optional bool keep_alive = 6 [(gnostic.openapi.v3.property) = {description: "【菜单】是否开启页面缓存"}]; // 【菜单】是否开启页面缓存

  optional bool full = 7 [(gnostic.openapi.v3.property) = {description: "【菜单】是否全屏(示例：数据大屏页面)"}]; // 【菜单】是否全屏(示例：数据大屏页面)

  optional bool affix = 8 [(gnostic.openapi.v3.property) = {description: "【菜单】是否固定在标签页中(首页通常是固定项)"}]; // 【菜单】是否固定在标签页中(首页通常是固定项)

  repeated BaseMenuParams params = 9 [(gnostic.openapi.v3.property) = {description: "参数"}]; // 参数
}

// 菜单参数
message BaseMenuParams {
  string key = 1 [(gnostic.openapi.v3.property) = {description: "参数key"}]; // 参数key

  string value = 2 [(gnostic.openapi.v3.property) = {description: "参数value"}]; // 参数value
}
