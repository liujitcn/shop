syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Admin支付账单服务
service PayBillService {
  // 查询支付账单列表
  rpc PagePayBills(PagePayBillsRequest) returns (PagePayBillsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/pay/bill"
    };
  }
}

// 支付账单列表查询条件
message PagePayBillsRequest {
  string bill_date = 3 [(gnostic.openapi.v3.property) = {description: "账单日期"}]; // 账单日期

  optional .common.v1.PayBillStatus status = 4 [(gnostic.openapi.v3.property) = {description: "对账状态：枚举【PayBillStatus】"}]; // 对账状态：枚举【PayBillStatus】

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 支付账单列表响应
message PagePayBillsResponse {
  repeated PayBill pay_bills = 1 [(gnostic.openapi.v3.property) = {description: "支付账单列表"}]; // 支付账单列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 支付账单
message PayBill {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id

  string bill_date = 2 [(gnostic.openapi.v3.property) = {description: "格式YYYY-MM-DD。仅支持三个月内的账单下载申请"}]; // 格式YYYY-MM-DD。仅支持三个月内的账单下载申请

  string bill_type = 3 [(gnostic.openapi.v3.property) = {description: "账单类型：ALL: 返回当日所有订单信息（不含充值退款订单）SUCCESS:返回当日成功支付的订单（不含充值退款订单）REFUND: 返回当日退款订单（不含充值退款订单）"}]; // 账单类型：ALL: 返回当日所有订单信息（不含充值退款订单）SUCCESS:返回当日成功支付的订单（不含充值退款订单）REFUND: 返回当日退款订单（不含充值退款订单）

  string file_path = 4 [(gnostic.openapi.v3.property) = {description: "文件路径"}]; // 文件路径

  string hash_type = 5 [(gnostic.openapi.v3.property) = {description: "哈希类型，固定为SHA1"}]; // 哈希类型，固定为SHA1

  string hash_value = 6 [(gnostic.openapi.v3.property) = {description: "账单文件的SHA1摘要值，用于商户侧校验文件的一致性。"}]; // 账单文件的SHA1摘要值，用于商户侧校验文件的一致性。

  int64 total_count = 7 [(gnostic.openapi.v3.property) = {description: "总笔数"}]; // 总笔数

  int64 total_amount = 8 [(gnostic.openapi.v3.property) = {description: "总金额,单位：分"}]; // 总金额,单位：分

  int64 third_total_count = 9 [(gnostic.openapi.v3.property) = {description: "对账文件总笔数"}]; // 对账文件总笔数

  int64 third_total_amount = 10 [(gnostic.openapi.v3.property) = {description: "对账文件总金额，单位：分"}]; // 对账文件总金额，单位：分

  .common.v1.PayBillStatus status = 11 [(gnostic.openapi.v3.property) = {description: "对账状态：枚举【PayBillStatus】"}]; // 对账状态：枚举【PayBillStatus】
}
