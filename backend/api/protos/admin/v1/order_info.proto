syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin订单信息服务
service OrderInfoService {
  // 查询订单信息分页列表
  rpc PageOrderInfos(PageOrderInfosRequest) returns (PageOrderInfosResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/order/info"
    };
  }

  // 查询订单信息
  rpc GetOrderInfo(GetOrderInfoRequest) returns (OrderInfoResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/order/info/{id}"
    };
  }

  // 查询订单信息退款信息
  rpc GetOrderInfoRefund(GetOrderInfoRefundRequest) returns (OrderInfoRefundResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/order/info/{id}/refund"
    };
  }

  // 订单信息退款
  rpc RefundOrderInfo(RefundOrderInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/order/info/{order_id}/refund"
      body: "*"
    };
  }

  // 查询订单信息发货信息
  rpc GetOrderInfoShipment(GetOrderInfoShipmentRequest) returns (OrderInfoShipmentForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/order/info/{id}/shipment"
    };
  }

  // 订单信息发货
  rpc ShipOrderInfo(ShipOrderInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/order/info/{order_id}/shipment"
      body: "*"
    };
  }
}

// 订单分页查询条件
message PageOrderInfosRequest {
  string order_no = 2 [(gnostic.openapi.v3.property) = {description: "订单编号"}]; // 订单编号

  int64 user_id = 3 [(gnostic.openapi.v3.property) = {description: "用户id"}]; // 用户id

  optional .common.v1.OrderStatus status = 5 [(gnostic.openapi.v3.property) = {description: "订单状态"}]; // 订单状态
  optional .common.v1.OrderPayType pay_type = 8 [(gnostic.openapi.v3.property) = {description: "支付方式：枚举【OrderPayType】"}]; // 支付方式：枚举【OrderPayType】
  optional .common.v1.OrderPayChannel pay_channel = 9 [(gnostic.openapi.v3.property) = {description: "支付渠道：枚举【OrderPayChannel】"}]; // 支付渠道：枚举【OrderPayChannel】

  repeated string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 订单分页响应
message PageOrderInfosResponse {
  repeated OrderInfo order_infos = 1 [(gnostic.openapi.v3.property) = {description: "订单分页数据"}]; // 订单分页数据
  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 订单详情查询条件
message GetOrderInfoRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID
}

// 订单退款信息查询条件
message GetOrderInfoRefundRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID
}

// 订单发货信息查询条件
message GetOrderInfoShipmentRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID
}

// 订单详情响应
message OrderInfoResponse {
  OrderInfo order = 1 [(gnostic.openapi.v3.property) = {description: "订单信息"}]; // 订单信息

  float countdown = 2 [(gnostic.openapi.v3.property) = {description: "支付倒计时"}]; // 支付倒计时

  OrderAddress address = 100 [(gnostic.openapi.v3.property) = {description: "地址信息"}]; // 地址信息

  OrderCancel cancel = 101 [(gnostic.openapi.v3.property) = {description: "取消信息"}]; // 取消信息

  repeated OrderGoods goods = 102 [(gnostic.openapi.v3.property) = {description: "商品信息"}]; // 商品信息

  OrderLogistics logistics = 103 [(gnostic.openapi.v3.property) = {description: "物流信息"}]; // 物流信息

  OrderPayment payment = 104 [(gnostic.openapi.v3.property) = {description: "支付信息"}]; // 支付信息

  repeated OrderRefund refund = 105 [(gnostic.openapi.v3.property) = {description: "退款信息"}]; // 退款信息
}

// 订单Refund响应
message OrderInfoRefundResponse {
  OrderPayment payment = 104 [(gnostic.openapi.v3.property) = {description: "支付信息"}]; // 支付信息

  repeated OrderRefund refund = 105 [(gnostic.openapi.v3.property) = {description: "退款信息"}]; // 退款信息
}

// 订单退款请求参数
message RefundOrderInfoRequest {
  int64 order_id = 1 [(gnostic.openapi.v3.property) = {description: "订单id"}]; // 订单id
  optional .common.v1.OrderRefundReason reason = 2 [(gnostic.openapi.v3.property) = {description: "退款原因：枚举【OrderRefundReason】"}]; // 退款原因：枚举【OrderRefundReason】
  int64 refund_money = 3 [(gnostic.openapi.v3.property) = {description: "退款金额"}]; // 退款金额
}

// 订单发货表单
message OrderInfoShipmentForm {
  OrderAddress address = 100 [(gnostic.openapi.v3.property) = {description: "地址信息"}]; // 地址信息

  repeated OrderGoods goods = 102 [(gnostic.openapi.v3.property) = {description: "商品信息"}]; // 商品信息

  OrderLogistics logistics = 103 [(gnostic.openapi.v3.property) = {description: "物流信息"}]; // 物流信息
}

// 订单发货请求参数
message ShipOrderInfoRequest {
  int64 order_id = 1 [(gnostic.openapi.v3.property) = {description: "订单id"}]; // 订单id
  string name = 3 [(gnostic.openapi.v3.property) = {description: "物流公司名"}]; // 物流公司名
  string no = 4 [(gnostic.openapi.v3.property) = {description: "物流单号"}]; // 物流单号
  string contact = 5 [(gnostic.openapi.v3.property) = {description: "联系方式"}]; // 联系方式
}

// Order信息
message OrderInfo {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "订单id"}]; // 订单ID
  string order_no = 2 [(gnostic.openapi.v3.property) = {description: "订单编号"}]; // 订单编号
  int64 user_id = 3 [(gnostic.openapi.v3.property) = {description: "用户id"}]; // 用户ID
  int64 pay_money = 4 [(gnostic.openapi.v3.property) = {description: "实际支付金额（单位：分）"}]; // 实际支付金额（单位：分）
  int64 total_money = 5 [(gnostic.openapi.v3.property) = {description: "总价（单位：分）"}]; // 总价（单位：分）
  int64 post_fee = 6 [(gnostic.openapi.v3.property) = {description: "优惠金额（单位：分）"}]; // 优惠金额（单位：分）
  int64 goods_num = 7 [(gnostic.openapi.v3.property) = {description: "商品总数"}]; // 商品总数
  .common.v1.OrderPayType pay_type = 8 [(gnostic.openapi.v3.property) = {description: "支付方式：枚举【OrderPayType】"}]; // 支付方式：枚举【OrderPayType】
  .common.v1.OrderPayChannel pay_channel = 9 [(gnostic.openapi.v3.property) = {description: "支付渠道：枚举【OrderPayChannel】"}]; // 支付渠道：枚举【OrderPayChannel】
  .common.v1.OrderDeliveryTime delivery_time = 10 [(gnostic.openapi.v3.property) = {description: "配送时间：枚举【OrderDeliveryTime】"}]; // 配送时间：枚举【OrderDeliveryTime】
  .common.v1.OrderStatus status = 11 [(gnostic.openapi.v3.property) = {description: "状态：枚举【OrderStatus】"}]; // 状态：枚举【OrderStatus】
  string remark = 12 [(gnostic.openapi.v3.property) = {description: "订单备注"}]; // 订单备注
  string created_at = 13 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间
  string updated_at = 14 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  string nick_name = 52 [(gnostic.openapi.v3.property) = {description: "用户名"}]; // 用户名
}

// 订单地址
message OrderAddress {
  string receiver = 3 [(gnostic.openapi.v3.property) = {description: "联系人"}]; // 联系人
  string contact = 4 [(gnostic.openapi.v3.property) = {description: "联系方式"}]; // 联系方式
  repeated string address = 5 [(gnostic.openapi.v3.property) = {description: "省市区（JSON存储）"}]; // 省市区（JSON存储）
  string detail = 6 [(gnostic.openapi.v3.property) = {description: "详细地址"}]; // 详细地址
}

// 订单取消记录
message OrderCancel {
  .common.v1.OrderCancelReason reason = 3 [(gnostic.openapi.v3.property) = {description: "取消原因：枚举【OrderCancelReason】"}]; // 取消原因：枚举【OrderCancelReason】
  string created_at = 4 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间
}

// 订单商品
message OrderGoods {
  int64 goods_id = 3 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品ID
  string sku_code = 4 [(gnostic.openapi.v3.property) = {description: "规格编号"}]; // 规格编号
  repeated string spec_item = 5 [(gnostic.openapi.v3.property) = {description: "SKU规格组成（需与goods_spec顺序对应，JSON存储）"}]; // SKU规格组成（需与goods_spec顺序对应，JSON存储）
  string picture = 6 [(gnostic.openapi.v3.property) = {description: "商品图片"}]; // 商品图片
  string name = 7 [(gnostic.openapi.v3.property) = {description: "商品名称"}]; // 商品名称
  int64 num = 8 [(gnostic.openapi.v3.property) = {description: "数量"}]; // 数量
  int64 price = 9 [(gnostic.openapi.v3.property) = {description: "当前价格（单位：分）"}]; // 当前价格（单位：分）
  int64 pay_price = 10 [(gnostic.openapi.v3.property) = {description: "支付价格（单位：分）"}]; // 支付价格（单位：分）
  int64 total_price = 11 [(gnostic.openapi.v3.property) = {description: "当前金额汇总"}]; // 当前金额汇总
  int64 total_pay_price = 12 [(gnostic.openapi.v3.property) = {description: "支付金额汇总"}]; // 支付金额汇总
}

// 订单物流
message OrderLogistics {
  // Detail
  message Detail {
    string time = 1 [(gnostic.openapi.v3.property) = {description: "时间"}]; // 时间
    string text = 2 [(gnostic.openapi.v3.property) = {description: "动态"}]; // 动态
  }
  string name = 3 [(gnostic.openapi.v3.property) = {description: "物流公司名"}]; // 物流公司名
  string no = 4 [(gnostic.openapi.v3.property) = {description: "物流单号"}]; // 物流单号
  string contact = 5 [(gnostic.openapi.v3.property) = {description: "联系方式"}]; // 联系方式
  repeated Detail detail = 6 [(gnostic.openapi.v3.property) = {description: "物流详情（JSON存储）"}]; // 物流详情（JSON存储）
  string created_at = 7 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间
}

// 订单支付
message OrderPayment {
  // 支付者信息
  message Payer {
    string openid = 1 [(gnostic.openapi.v3.property) = {description: "【用户标识】用户在商户appid下的唯一标识"}]; // 【用户标识】用户在商户appid下的唯一标识
  }
  // 支付金额信息
  message Amount {
    int64 payer_total = 1 [(gnostic.openapi.v3.property) = {description: "【用户支付金额】用户支付金额，整型，单位为分。（指使用优惠券的情况下，这里等于总金额-优惠券金额）"}]; // 【用户支付金额】用户支付金额，整型，单位为分。（指使用优惠券的情况下，这里等于总金额-优惠券金额）
    int64 total = 2 [(gnostic.openapi.v3.property) = {description: "【总金额】订单总金额，单位为分，整型"}]; // 【总金额】订单总金额，单位为分，整型
    string currency = 3 [(gnostic.openapi.v3.property) = {description: "【货币类型】固定返回：CNY，代表人民币"}]; // 【货币类型】固定返回：CNY，代表人民币
    string payer_currency = 4 [(gnostic.openapi.v3.property) = {description: "【用户支付币种】 固定返回：CNY，代表人民币。"}]; // 【用户支付币种】 固定返回：CNY，代表人民币。
  }
  // 支付场景信息
  message SceneInfo {
    string device_id = 1 [(gnostic.openapi.v3.property) = {description: "【商户端设备号】门店号/收银设备ID"}]; // 【商户端设备号】门店号/收银设备ID
  }
  string order_no = 3 [(gnostic.openapi.v3.property) = {description: "订单编号"}]; // 订单编号
  string third_order_no = 4 [(gnostic.openapi.v3.property) = {description: "三方订单编号"}]; // 三方订单编号
  string trade_type = 5 [(gnostic.openapi.v3.property) = {description: "交易类型（JSAPI：公众号/小程序支付，NATIVE：扫码支付，APP：APP支付，MICROPAY：付款码支付，MWEB：H5支付，FACEPAY：刷脸支付）"}]; // 交易类型
  string trade_state = 6 [(gnostic.openapi.v3.property) = {description: "交易状态（SUCCESS：支付成功，REFUND：转入退款，NOTPAY：未支付，CLOSED：已关闭，REVOKED：已撤销，USERPAYING：支付中，PAYERROR：支付失败）"}]; // 交易状态
  string trade_state_desc = 7 [(gnostic.openapi.v3.property) = {description: "交易状态描述"}]; // 交易状态描述
  string bank_type = 8 [(gnostic.openapi.v3.property) = {description: "银行类型"}]; // 银行类型
  string success_time = 9 [(gnostic.openapi.v3.property) = {description: "支付完成时间"}]; // 支付完成时间
  Payer payer = 10 [(gnostic.openapi.v3.property) = {description: "支付者信息（JSON存储）"}]; // 支付者信息
  Amount amount = 11 [(gnostic.openapi.v3.property) = {description: "订单金额（JSON存储）"}]; // 订单金额
  SceneInfo scene_info = 12 [(gnostic.openapi.v3.property) = {description: "场景信息（JSON存储）"}]; // 场景信息
  .common.v1.OrderBillStatus status = 13 [(gnostic.openapi.v3.property) = {description: "对账状态：枚举【OrderBillStatus】"}]; // 对账状态：枚举【OrderBillStatus】
}

// 订单退款
message OrderRefund {
  // 退款金额信息
  message Amount {
    int64 total = 1 [(gnostic.openapi.v3.property) = {description: "【原订单金额】单位：分"}]; // 【原订单金额】单位：分

    int64 refund = 2 [(gnostic.openapi.v3.property) = {description: "【退款金额】单位：分"}]; // 【退款金额】单位：分

    int64 payer_total = 3 [(gnostic.openapi.v3.property) = {description: "【用户实际支付金额】单位：分"}]; // 【用户实际支付金额】单位：分

    int64 payer_refund = 4 [(gnostic.openapi.v3.property) = {description: "【用户退款金额】单位：分"}]; // 【用户退款金额】单位：分
  }
  string order_no = 1 [(gnostic.openapi.v3.property) = {description: "支付订单编号"}]; // 支付订单编号
  string third_order_no = 2 [(gnostic.openapi.v3.property) = {description: "三方支付订单编号"}]; // 三方支付订单编号
  string refund_no = 3 [(gnostic.openapi.v3.property) = {description: "退款编号"}]; // 退款编号
  .common.v1.OrderRefundReason reason = 4 [(gnostic.openapi.v3.property) = {description: "退款原因：枚举【OrderRefundReason】"}]; // 退款原因：枚举【OrderRefundReason】
  string third_refund_no = 5 [(gnostic.openapi.v3.property) = {description: "三方退款编号"}]; // 三方退款编号
  string channel = 6 [(gnostic.openapi.v3.property) = {description: "退款渠道（ORIGINAL：原路退款，BALANCE：退余额，OTHER_BALANCE：退其他余额账户，OTHER_BANKCARD：退其他银行卡）"}]; // 退款渠道
  string user_received_account = 7 [(gnostic.openapi.v3.property) = {description: "退款入账账户（格式说明见原始注释）"}]; // 退款入账账户
  string create_time = 8 [(gnostic.openapi.v3.property) = {description: "退款创建时间"}]; // 退款创建时间
  string success_time = 9 [(gnostic.openapi.v3.property) = {description: "退款成功时间"}]; // 退款成功时间
  string refund_state = 10 [(gnostic.openapi.v3.property) = {description: "退款状态（SUCCESS：成功，CLOSED：关闭，PROCESSING：处理中，ABNORMAL：异常）"}]; // 退款状态
  string funds_account = 11 [(gnostic.openapi.v3.property) = {description: "资金账户类型（UNSETTLED：未结算，AVAILABLE：可用余额，BASIC：基本账户等）"}]; // 资金账户类型
  Amount amount = 12 [(gnostic.openapi.v3.property) = {description: "金额信息（JSON存储）"}]; // 金额信息
  .common.v1.OrderBillStatus status = 13 [(gnostic.openapi.v3.property) = {description: "对账状态：枚举【OrderBillStatus】"}]; // 对账状态：枚举【OrderBillStatus】
}
