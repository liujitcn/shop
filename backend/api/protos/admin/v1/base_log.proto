syntax = "proto3";

package admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Admin日志服务
service BaseLogService {
  // 查询日志分页列表
  rpc PageBaseLogs(PageBaseLogsRequest) returns (PageBaseLogsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/log"
    };
  }

  // 查询日志
  rpc GetBaseLog(GetBaseLogRequest) returns (BaseLog) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/log/{id}"
    };
  }
}

// 日志分页查询条件
message PageBaseLogsRequest {
  repeated string request_time = 3 [(gnostic.openapi.v3.property) = {description: "请求时间"}]; // 请求时间

  string operation = 5 [(gnostic.openapi.v3.property) = {description: "操作方法"}]; // 操作方法

  optional int32 status_code = 14 [(gnostic.openapi.v3.property) = {description: "状态码"}]; // 状态码

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 日志分页响应
message PageBaseLogsResponse {
  repeated BaseLog base_logs = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询日志请求参数
message GetBaseLogRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "日志ID"}]; // 日志ID
}

// 日志
message BaseLog {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "日志ID"}]; // 日志ID

  string request_id = 2 [(gnostic.openapi.v3.property) = {description: "请求ID"}]; // 请求ID

  string request_time = 3 [(gnostic.openapi.v3.property) = {description: "请求时间"}]; // 请求时间

  string method = 4 [(gnostic.openapi.v3.property) = {description: "请求方法"}]; // 请求方法

  string operation = 5 [(gnostic.openapi.v3.property) = {description: "操作方法"}]; // 操作方法

  string path = 6 [(gnostic.openapi.v3.property) = {description: "请求路径"}]; // 请求路径

  string referer = 7 [(gnostic.openapi.v3.property) = {description: "请求源"}]; // 请求源

  string request_uri = 8 [(gnostic.openapi.v3.property) = {description: "请求URI"}]; // 请求URI

  string request_header = 9 [(gnostic.openapi.v3.property) = {description: "请求头"}]; // 请求头

  string request_body = 10 [(gnostic.openapi.v3.property) = {description: "请求体"}]; // 请求体

  string response = 11 [(gnostic.openapi.v3.property) = {description: "响应信息"}]; // 响应信息

  string cost_time = 12 [(gnostic.openapi.v3.property) = {description: "操作耗时"}]; // 操作耗时

  bool success = 13 [(gnostic.openapi.v3.property) = {description: "操作是否成功"}]; // 操作是否成功

  int32 status_code = 14 [(gnostic.openapi.v3.property) = {description: "状态码"}]; // 状态码

  string reason = 15 [(gnostic.openapi.v3.property) = {description: "操作失败原因"}]; // 操作失败原因

  string location = 16 [(gnostic.openapi.v3.property) = {description: "操作地理位置"}]; // 操作地理位置

  int64 user_id = 100 [(gnostic.openapi.v3.property) = {description: "操作者用户ID"}]; // 操作者用户ID

  string user_name = 101 [(gnostic.openapi.v3.property) = {description: "操作者账号名"}]; // 操作者账号名

  string client_ip = 102 [(gnostic.openapi.v3.property) = {description: "操作者IP"}]; // 操作者IP

  string user_agent = 200 [(gnostic.openapi.v3.property) = {description: "浏览器的用户代理信息"}]; // 浏览器的用户代理信息

  string browser_name = 201 [(gnostic.openapi.v3.property) = {description: "浏览器名称"}]; // 浏览器名称

  string browser_version = 202 [(gnostic.openapi.v3.property) = {description: "浏览器版本"}]; // 浏览器版本

  string client_id = 300 [(gnostic.openapi.v3.property) = {description: "客户端ID"}]; // 客户端ID

  string client_name = 301 [(gnostic.openapi.v3.property) = {description: "客户端名称"}]; // 客户端名称

  string os_name = 302 [(gnostic.openapi.v3.property) = {description: "操作系统名称"}]; // 操作系统名称

  string os_version = 303 [(gnostic.openapi.v3.property) = {description: "操作系统版本"}]; // 操作系统版本
}
