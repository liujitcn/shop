syntax = "proto3";

package admin.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin商城热门推荐服务
service ShopHotService {
  // 查询商城热门推荐列表
  rpc PageShopHots(PageShopHotsRequest) returns (PageShopHotsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/hot"
    };
  }

  // 查询商城热门推荐
  rpc GetShopHot(GetShopHotRequest) returns (ShopHotForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/hot/{id}"
    };
  }

  // 创建商城热门推荐
  rpc CreateShopHot(CreateShopHotRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/shop/hot"
      body: "shop_hot"
    };
  }

  // 更新商城热门推荐
  rpc UpdateShopHot(UpdateShopHotRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/hot/{id}"
      body: "shop_hot"
    };
  }

  // 删除商城热门推荐
  rpc DeleteShopHot(DeleteShopHotRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/shop/hot/{ids}"
    };
  }

  // 设置状态
  rpc SetShopHotStatus(SetShopHotStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/hot/{id}/status"
      body: "*"
    };
  }

  // 查询商城热门推荐属性列表
  rpc PageShopHotItems(PageShopHotItemsRequest) returns (PageShopHotItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/hot-item"
    };
  }

  // 查询商城热门推荐属性
  rpc GetShopHotItem(GetShopHotItemRequest) returns (ShopHotItemForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/hot-item/{id}"
    };
  }

  // 创建商城热门推荐属性
  rpc CreateShopHotItem(CreateShopHotItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/shop/hot-item"
      body: "shop_hot_item"
    };
  }

  // 更新商城热门推荐属性
  rpc UpdateShopHotItem(UpdateShopHotItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/hot-item/{id}"
      body: "shop_hot_item"
    };
  }

  // 删除商城热门推荐属性
  rpc DeleteShopHotItem(DeleteShopHotItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/shop/hot-item/{ids}"
    };
  }

  // 设置状态
  rpc SetShopHotItemStatus(SetShopHotItemStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/hot-item/{id}/status"
      body: "*"
    };
  }
}

// 热门专区列表查询条件
message PageShopHotsRequest {
  string title = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐标题"}]; // 商城热门推荐标题

  string desc = 3 [(gnostic.openapi.v3.property) = {description: "商城热门推荐描述"}]; // 商城热门推荐描述

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {
    description: "状态"
    default: {number: 0}
  }]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 热门专区列表响应
message PageShopHotsResponse {
  repeated ShopHot shop_hots = 1 [(gnostic.openapi.v3.property) = {description: "热门专区列表"}]; // 热门专区列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 热门专区详情查询条件
message GetShopHotRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID
}

// 热门专区创建条件
message CreateShopHotRequest {
  ShopHotForm shop_hot = 1 [(gnostic.openapi.v3.property) = {description: "热门专区表单"}]; // 热门专区表单
}

// 热门专区更新条件
message UpdateShopHotRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  ShopHotForm shop_hot = 2 [(gnostic.openapi.v3.property) = {description: "热门专区表单"}]; // 热门专区表单
}

// 热门专区删除条件
message DeleteShopHotRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "热门专区ID列表，多个用逗号分隔"}]; // 热门专区ID列表，多个用逗号分隔
}

// 热门专区状态设置条件
message SetShopHotStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  .common.v1.Status status = 2 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}

// 热门专区项列表查询条件
message PageShopHotItemsRequest {
  int64 hot_id = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐id"}]; // 商城热门推荐id

  string title = 3 [(gnostic.openapi.v3.property) = {description: "商城热门推荐属性标题"}]; // 商城热门推荐属性标题

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 热门专区项列表响应
message PageShopHotItemsResponse {
  repeated ShopHotItem shop_hot_items = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项列表"}]; // 热门专区项列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 热门专区项详情查询条件
message GetShopHotItemRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项ID"}]; // 热门专区项ID
}

// 热门专区项创建条件
message CreateShopHotItemRequest {
  ShopHotItemForm shop_hot_item = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项表单"}]; // 热门专区项表单
}

// 热门专区项更新条件
message UpdateShopHotItemRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项ID"}]; // 热门专区项ID

  ShopHotItemForm shop_hot_item = 2 [(gnostic.openapi.v3.property) = {description: "热门专区项表单"}]; // 热门专区项表单
}

// 热门专区项删除条件
message DeleteShopHotItemRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项ID列表，多个用逗号分隔"}]; // 热门专区项ID列表，多个用逗号分隔
}

// 热门专区项状态设置条件
message SetShopHotItemStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "热门专区项ID"}]; // 热门专区项ID

  .common.v1.Status status = 2 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}

// 热门专区
message ShopHot {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐标题"}]; // 商城热门推荐标题

  string desc = 3 [(gnostic.openapi.v3.property) = {description: "商城热门推荐描述"}]; // 商城热门推荐名称

  int32 sort = 6 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 51 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 热门专区表单
message ShopHotForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐标题"}]; // 商城热门推荐标题

  string desc = 3 [(gnostic.openapi.v3.property) = {description: "商城热门推荐描述"}]; // 商城热门推荐名称

  string banner = 4 [(gnostic.openapi.v3.property) = {description: "轮播图"}]; // 轮播图

  repeated string picture = 5 [(gnostic.openapi.v3.property) = {description: "图片"}]; // 图片

  int32 sort = 6 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  optional .common.v1.Status status = 51 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 热门专区项
message ShopHotItem {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  int64 hot_id = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  string title = 3 [(gnostic.openapi.v3.property) = {description: "标题"}]; // 商城热门推荐值

  int32 sort = 4 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 101 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 热门专区项表单
message ShopHotItemForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  int64 hot_id = 2 [(gnostic.openapi.v3.property) = {description: "商城热门推荐ID"}]; // 商城热门推荐ID

  string title = 3 [(gnostic.openapi.v3.property) = {description: "标题"}]; // 标题

  int32 sort = 4 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  repeated int64 goods_ids = 5 [(gnostic.openapi.v3.property) = {description: "商品Id"}]; // 商品

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}
