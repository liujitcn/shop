syntax = "proto3";

package admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin商品分类服务
service GoodsCategoryService {
  // 查询商品分类树形列表
  rpc TreeGoodsCategories(TreeGoodsCategoriesRequest) returns (TreeGoodsCategoriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/category/tree"
    };
  }

  // 查询商品分类树形选择
  rpc OptionGoodsCategories(OptionGoodsCategoriesRequest) returns (.common.v1.TreeOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/category/option"
    };
  }

  // 查询商品分类
  rpc GetGoodsCategory(GetGoodsCategoryRequest) returns (GoodsCategoryForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/category/{id}"
    };
  }

  // 创建商品分类
  rpc CreateGoodsCategory(CreateGoodsCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/goods/category"
      body: "goods_category"
    };
  }

  // 更新商品分类
  rpc UpdateGoodsCategory(UpdateGoodsCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/goods/category/{id}"
      body: "goods_category"
    };
  }

  // 删除商品分类
  rpc DeleteGoodsCategory(DeleteGoodsCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/goods/category/{ids}"
    };
  }

  // 设置状态
  rpc SetGoodsCategoryStatus(SetGoodsCategoryStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/goods/category/{id}/status"
      body: "*"
    };
  }
}

// 商品分类树查询条件
message TreeGoodsCategoriesRequest {}

// 商品分类树响应
message TreeGoodsCategoriesResponse {
  repeated GoodsCategory goods_categories = 1 [(gnostic.openapi.v3.property) = {description: "商品分类列表"}]; // 商品分类列表
}

// 商品分类选项查询条件
message OptionGoodsCategoriesRequest {
  optional int64 parent_id = 1 [(gnostic.openapi.v3.property) = {description: "父级商品分类ID"}]; // 父级商品分类ID
}

// 商品分类详情查询条件
message GetGoodsCategoryRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID"}]; // 商品分类ID
}

// 商品分类创建条件
message CreateGoodsCategoryRequest {
  GoodsCategoryForm goods_category = 1 [(gnostic.openapi.v3.property) = {description: "商品分类表单"}]; // 商品分类表单
}

// 商品分类更新条件
message UpdateGoodsCategoryRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID"}]; // 商品分类ID

  GoodsCategoryForm goods_category = 2 [(gnostic.openapi.v3.property) = {description: "商品分类表单"}]; // 商品分类表单
}

// 商品分类删除条件
message DeleteGoodsCategoryRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID列表，多个用逗号分隔"}]; // 商品分类ID列表，多个用逗号分隔
}

// 商品分类状态设置条件
message SetGoodsCategoryStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID"}]; // 商品分类ID

  .common.v1.Status status = 2 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}

// 商品分类
message GoodsCategory {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID"}]; // 商品分类ID

  int64 parent_id = 2 [(gnostic.openapi.v3.property) = {description: "父级商品分类ID"}]; // 父级商品分类ID

  string name = 3 [(gnostic.openapi.v3.property) = {description: "商品分类名称"}]; // 商品分类名称

  string picture = 4 [(gnostic.openapi.v3.property) = {description: "商品分类图片"}]; // 商品分类图片

  int32 sort = 5 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 50 [(gnostic.openapi.v3.property) = {description: "菜单状态"}]; // 菜单状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  repeated GoodsCategory children = 301 [(gnostic.openapi.v3.property) = {description: "子节点树"}]; // 子节点树
}

// 商品分类表单
message GoodsCategoryForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品分类ID"}]; // 商品分类ID

  optional int64 parent_id = 2 [(gnostic.openapi.v3.property) = {description: "父级商品分类ID"}]; // 父级商品分类ID

  string name = 3 [(gnostic.openapi.v3.property) = {description: "商品分类名称"}]; // 商品分类名称

  string picture = 4 [(gnostic.openapi.v3.property) = {description: "商品分类图片"}]; // 商品分类图片

  int32 sort = 5 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  optional .common.v1.Status status = 50 [(gnostic.openapi.v3.property) = {description: "菜单状态"}]; // 菜单状态
}
