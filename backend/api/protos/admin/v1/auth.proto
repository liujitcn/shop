syntax = "proto3";

package admin.v1;

import "common/v1/types.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin用户登录认证服务
service AuthService {
  // 获取已经登录的用户的数据
  rpc GetUserInfo(GetUserInfoRequest) returns (UserInfoForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/auth/user"
    };
  }

  // 查询已经登录的用户菜单树
  rpc TreeUserMenus(TreeUserMenusRequest) returns (TreeRouteResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/auth/menu/tree"
    };
  }

  // 查询已经登录的用户按钮列表
  rpc ListUserButtons(ListUserButtonsRequest) returns (.common.v1.StringValues) {
    option (google.api.http) = {
      get: "/api/v1/admin/auth/buttons"
    };
  }

  // 获取个人中心用户信息
  rpc GetUserProfile(GetUserProfileRequest) returns (UserProfileForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/auth/profile"
    };
  }

  // 修改个人中心用户信息
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/auth/profile"
      body: "user_profile"
    };
  }

  // 发送手机号验证码
  rpc SendPhoneCode(SendPhoneCodeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/auth/phone/code"
      body: "*"
    };
  }

  // 修改个人中心手机号
  rpc UpdateUserPhone(UpdateUserPhoneRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/auth/phone"
      body: "user_phone"
    };
  }

  // 修改个人中心密码
  rpc UpdateUserPassword(UpdateUserPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/auth/password"
      body: "user_password"
    };
  }
}

// 获取登录用户信息请求参数
message GetUserInfoRequest {}

// 登录用户菜单树查询参数
message TreeUserMenusRequest {}

// 登录用户按钮列表查询参数
message ListUserButtonsRequest {}

// 获取个人中心用户信息请求参数
message GetUserProfileRequest {}

// 更新个人中心用户信息请求参数
message UpdateUserProfileRequest {
  UserProfileForm user_profile = 1 [(gnostic.openapi.v3.property) = {description: "个人中心用户信息"}]; // 个人中心用户信息
}

// 更新个人中心手机号请求参数
message UpdateUserPhoneRequest {
  UserPhoneForm user_phone = 1 [(gnostic.openapi.v3.property) = {description: "个人中心手机号"}]; // 个人中心手机号
}

// 更新个人中心密码请求参数
message UpdateUserPasswordRequest {
  UserPasswordForm user_password = 1 [(gnostic.openapi.v3.property) = {description: "个人中心密码"}]; // 个人中心密码
}

// 用户信息表单
message UserInfoForm {
  string user_name = 1 [(gnostic.openapi.v3.property) = {description: "用户账号"}]; // 用户账号

  string nick_name = 2 [(gnostic.openapi.v3.property) = {description: "用户昵称"}]; // 用户昵称

  string phone = 3 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号

  string avatar = 4 [(gnostic.openapi.v3.property) = {description: "头像"}]; // 头像

  string role_code = 100 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  string role_name = 101 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string dept_name = 102 [(gnostic.openapi.v3.property) = {description: "部门名称"}]; // 部门名称
}

// Route树响应
message TreeRouteResponse {
  repeated RouteItem routes = 1 [(gnostic.openapi.v3.property) = {description: "路由列表"}]; // 路由列表
}

// Route项
message RouteItem {
  optional string path = 1 [(gnostic.openapi.v3.property) = {description: "路由路径"}]; // 路由路径

  optional string redirect = 2 [(gnostic.openapi.v3.property) = {description: "重定向地址"}]; // 重定向地址

  optional string name = 3 [(gnostic.openapi.v3.property) = {description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"}]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  optional string component = 4 [(gnostic.openapi.v3.property) = {description: "指向的组件"}]; // 指向的组件

  optional RouteMeta meta = 5 [(gnostic.openapi.v3.property) = {description: "路由元信息"}]; // 路由元信息

  repeated RouteItem children = 101 [(gnostic.openapi.v3.property) = {description: "子节点树"}]; // 子节点树
}

// Route元信息
message RouteMeta {
  optional string title = 1 [(gnostic.openapi.v3.property) = {description: "菜单标题"}]; // 菜单标题

  optional string icon = 2 [(gnostic.openapi.v3.property) = {description: "菜单图标"}]; // 菜单图标

  optional bool always_show = 4 [(gnostic.openapi.v3.property) = {description: "【目录】只有一个子路由是否始终显示"}]; // 【目录】只有一个子路由是否始终显示

  optional bool hidden = 5 [(gnostic.openapi.v3.property) = {description: "是否隐藏(true-是 false-否)"}]; // 是否隐藏(true-是 false-否)

  optional bool keep_alive = 6 [(gnostic.openapi.v3.property) = {description: "【菜单】是否开启页面缓存"}]; // 【菜单】是否开启页面缓存

  optional bool full = 7 [(gnostic.openapi.v3.property) = {description: "【菜单】是否全屏(示例：数据大屏页面)"}]; // 【菜单】是否全屏(示例：数据大屏页面)

  optional bool affix = 8 [(gnostic.openapi.v3.property) = {description: "【菜单】是否固定在标签页中(首页通常是固定项)"}]; // 【菜单】是否固定在标签页中(首页通常是固定项)

  repeated RouteParams params = 9 [(gnostic.openapi.v3.property) = {description: "参数"}]; // 参数
}

// Route参数
message RouteParams {
  optional string key = 1 [(gnostic.openapi.v3.property) = {description: "key"}]; // key

  optional string value = 2 [(gnostic.openapi.v3.property) = {description: "value"}]; // value
}

// 用户资料表单
message UserProfileForm {
  string user_name = 1 [(gnostic.openapi.v3.property) = {description: "用户名"}]; // 用户名

  string nick_name = 2 [(gnostic.openapi.v3.property) = {description: "昵称"}]; // 昵称

  string avatar = 3 [(gnostic.openapi.v3.property) = {description: "头像URL"}]; // 头像URL

  int32 gender = 4 [(gnostic.openapi.v3.property) = {description: "性别"}]; // 性别

  string phone = 5 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号

  string role_name = 10 [(gnostic.openapi.v3.property) = {description: "角色名"}]; // 角色名

  string dept_name = 11 [(gnostic.openapi.v3.property) = {description: "部门名"}]; // 部门名

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间
}

// 用户密码表单
message UserPasswordForm {
  .common.v1.PasswordCrypto old_pwd = 1 [(gnostic.openapi.v3.property) = {description: "原密码"}]; // 原密码

  .common.v1.PasswordCrypto new_pwd = 2 [(gnostic.openapi.v3.property) = {description: "新密码"}]; // 新密码
}

// 发送手机号验证码请求参数
message SendPhoneCodeRequest {
  string phone = 1 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号
}

// 用户手机号表单
message UserPhoneForm {
  string phone = 1 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号

  string code = 2 [(gnostic.openapi.v3.property) = {description: "验证码"}]; // 验证码
}
