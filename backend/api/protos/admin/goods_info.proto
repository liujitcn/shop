syntax = "proto3";

package admin;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";
import "admin/goods_prop.proto";
import "admin/goods_sku.proto";
import "admin/goods_spec.proto";

// Admin商品信息服务
service GoodsInfoService {
  // 查询商品信息列表
  rpc ListGoodsInfo (ListGoodsInfoRequest) returns (ListGoodsInfoResponse) {
    option (google.api.http) = {
      get: "/api/admin/goods/info/list"
    };
  }

  // 查询商品信息分页列表
  rpc PageGoodsInfo (PageGoodsInfoRequest) returns (PageGoodsInfoResponse) {
    option (google.api.http) = {
      get: "/api/admin/goods/info"
    };
  }

  // 查询商品信息
  rpc GetGoodsInfo (google.protobuf.Int64Value) returns (GoodsInfoForm) {
    option (google.api.http) = {
      get: "/api/admin/goods/info/{value}"
    };
  }

  // 创建商品信息
  rpc CreateGoodsInfo (GoodsInfoForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/goods/info"
      body: "*"
    };
  }

  // 更新商品信息
  rpc UpdateGoodsInfo (GoodsInfoForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/goods/info/{id}"
      body: "*"
    };
  }

  // 删除商品信息
  rpc DeleteGoodsInfo (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/goods/info/{value}"
    };
  }

  // 设置状态
  rpc SetGoodsInfoStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/goods/info/{id}/status"
      body: "*"
    };
  }
}

message ListGoodsInfoRequest{
  // 商品名称
  string name = 1 [
    (gnostic.openapi.v3.property) = {
      description: "商品名称",
    }
  ];
}

message ListGoodsInfoResponse{
  message GoodsInfo {
    int64 id = 1 [
      (gnostic.openapi.v3.property) = {description: "商品ID"}
    ];  // 商品ID

    string name = 2 [
      (gnostic.openapi.v3.property) = {description: "名称"}
    ];  // 名称

    // 当前价格(分)
    int64 price = 3 [
      (gnostic.openapi.v3.property) = { description: "当前价格(分)" }
    ];

    string categoryName = 4 [
      (gnostic.openapi.v3.property) = {description: "分类名称"}
    ];  // 分类名称
  }
  // 分页数据
  repeated GoodsInfo list = 1;
}

message PageGoodsInfoRequest{
  // 分类id
  optional int64 categoryId = 2 [
    (gnostic.openapi.v3.property) = {
      description: "分类id",
    }
  ];
  // 商品名称
  string name = 3 [
    (gnostic.openapi.v3.property) = {
      description: "商品名称",
    }
  ];

  // 状态
  optional common.GoodsStatus status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态",
    }
  ];

  // 库存预警类型：1 低库存，2 零库存
  optional int32 inventoryAlert = 103 [
    (gnostic.openapi.v3.property) = {
      description: "库存预警类型：1 低库存，2 零库存",
    }
  ];

  // 价格异常类型：1 价格配置异常
  optional int32 priceAlert = 104 [
    (gnostic.openapi.v3.property) = {
      description: "价格异常类型：1 价格配置异常",
    }
  ];

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageGoodsInfoResponse{
  // 分页数据
  repeated GoodsInfo list = 1;
  // 总数
  int32 total = 2;
}

message GoodsInfo {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID

  int64 categoryId = 2 [
    (gnostic.openapi.v3.property) = {description: "分类ID"}
  ];  // 分类ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "名称"}
  ];  // 名称

  string desc = 4 [
    (gnostic.openapi.v3.property) = {description: "描述"}
  ]; // 描述

  string picture = 5 [
    (gnostic.openapi.v3.property) = {description: "商品图片"}
  ]; // 商品图片

  // 当前价格(分)
  int64 price = 40 [
    (gnostic.openapi.v3.property) = { description: "当前价格(分)" }
  ];

  // 折扣价格（分）
  int64 discountPrice = 41 [
    (gnostic.openapi.v3.property) = { description: "折扣价格（分）" }
  ];

  // 初始销量
  int64 initSaleNum = 42 [
    (gnostic.openapi.v3.property) = { description: "初始销量" }
  ];

  // 真实销售数量
  int64 realSaleNum = 43 [
    (gnostic.openapi.v3.property) = { description: "真实销售数量" }
  ];

  // 库存数量
  int64 inventory = 44 [
    (gnostic.openapi.v3.property) = { description: "库存数量" }
  ];

  common.GoodsStatus status = 101 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间

  string categoryName = 300 [
    (gnostic.openapi.v3.property) = {description: "分类名称"}
  ];  // 分类名称
}

message GoodsInfoForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID

  optional int64 categoryId = 2 [
    (gnostic.openapi.v3.property) = {description: "分类ID"}
  ];  // 分类ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "名称"}
  ];  // 名称

  string desc = 4 [
    (gnostic.openapi.v3.property) = {description: "描述"}
  ]; // 描述

  string picture = 30 [
    (gnostic.openapi.v3.property) = {description: "商品图片"}
  ]; // 商品图片

  repeated string banner = 31 [
    (gnostic.openapi.v3.property) = {description: "轮播图"}
  ]; // 轮播图

  repeated string detail = 32 [
    (gnostic.openapi.v3.property) = {description: "商品详情"}
  ]; // 商品详情

  optional common.GoodsStatus status = 51 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态

  repeated GoodsProp propList = 100 [
    (gnostic.openapi.v3.property) = { description: "商品属性" }
  ]; // 商品属性

  repeated GoodsSku skuList = 101 [
    (gnostic.openapi.v3.property) = { description: "商品SKU" }
  ]; // 商品SKU

  repeated GoodsSpec specList = 102 [
    (gnostic.openapi.v3.property) = { description: "商品规格" }
  ]; // 商品规格

  // 分类名称
  string categoryName = 300 [
    (gnostic.openapi.v3.property) = {
      description: "分类名称",
    }
  ];
}
