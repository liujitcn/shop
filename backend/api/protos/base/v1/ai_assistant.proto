syntax = "proto3";

package base.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Base AI 助手服务
service AiAssistantService {
  // 查询 AI 助手会话列表
  rpc ListAiAssistantSessions(ListAiAssistantSessionsRequest) returns (ListAiAssistantSessionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/assistant/session"
    };
  }

  // 创建 AI 助手会话
  rpc CreateAiAssistantSession(CreateAiAssistantSessionRequest) returns (AiAssistantSession) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session"
      body: "*"
    };
  }

  // 更新 AI 助手会话
  rpc UpdateAiAssistantSession(UpdateAiAssistantSessionRequest) returns (AiAssistantSession) {
    option (google.api.http) = {
      put: "/api/v1/base/ai/assistant/session/{id}"
      body: "*"
    };
  }

  // 删除 AI 助手会话
  rpc DeleteAiAssistantSession(DeleteAiAssistantSessionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/base/ai/assistant/session/{id}"
    };
  }

  // 查询 AI 助手消息列表
  rpc ListAiAssistantMessages(ListAiAssistantMessagesRequest) returns (ListAiAssistantMessagesResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/assistant/session/{session_id}/message"
    };
  }

  // 发送 AI 助手消息
  rpc SendAiAssistantMessage(SendAiAssistantMessageRequest) returns (SendAiAssistantMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session/{session_id}/message"
      body: "*"
    };
  }
}

// AI 助手会话列表查询条件
message ListAiAssistantSessionsRequest {
  string terminal = 1 [(gnostic.openapi.v3.property) = {description: "终端类型：admin/app"}]; // 终端类型：admin/app
}

// AI 助手会话列表响应
message ListAiAssistantSessionsResponse {
  repeated AiAssistantSession sessions = 1 [(gnostic.openapi.v3.property) = {description: "会话列表"}]; // 会话列表
}

// AI 助手会话创建请求
message CreateAiAssistantSessionRequest {
  string title = 1 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题

  string scene = 2 [(gnostic.openapi.v3.property) = {description: "会话场景"}]; // 会话场景

  string terminal = 3 [(gnostic.openapi.v3.property) = {description: "终端类型：admin/app"}]; // 终端类型：admin/app
}

// AI 助手会话更新请求
message UpdateAiAssistantSessionRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题
}

// AI 助手会话删除请求
message DeleteAiAssistantSessionRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID
}

// AI 助手消息列表查询条件
message ListAiAssistantMessagesRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID
}

// AI 助手消息列表响应
message ListAiAssistantMessagesResponse {
  repeated AiAssistantMessage messages = 1 [(gnostic.openapi.v3.property) = {description: "消息列表"}]; // 消息列表
}

// AI 助手消息发送请求
message SendAiAssistantMessageRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string content = 2 [(gnostic.openapi.v3.property) = {description: "消息内容"}]; // 消息内容

  repeated AiAssistantAttachment attachments = 3 [(gnostic.openapi.v3.property) = {description: "附件列表"}]; // 附件列表
}

// AI 助手消息发送响应
message SendAiAssistantMessageResponse {
  repeated AiAssistantMessage messages = 1 [(gnostic.openapi.v3.property) = {description: "新增消息列表"}]; // 新增消息列表

  AiAssistantSession session = 2 [(gnostic.openapi.v3.property) = {description: "最新会话信息"}]; // 最新会话信息
}

// AI 助手会话
message AiAssistantSession {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题

  string scene = 3 [(gnostic.openapi.v3.property) = {description: "会话场景"}]; // 会话场景

  string summary = 4 [(gnostic.openapi.v3.property) = {description: "会话摘要"}]; // 会话摘要

  int32 tool_count = 5 [(gnostic.openapi.v3.property) = {description: "工具数量"}]; // 工具数量

  google.protobuf.Timestamp updated_at = 6 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  string terminal = 7 [(gnostic.openapi.v3.property) = {description: "终端类型：admin/app"}]; // 终端类型：admin/app
}

// AI 助手消息
message AiAssistantMessage {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "消息ID"}]; // 消息ID

  string role = 2 [(gnostic.openapi.v3.property) = {description: "消息角色"}]; // 消息角色

  string kind = 3 [(gnostic.openapi.v3.property) = {description: "消息类型"}]; // 消息类型

  string content = 4 [(gnostic.openapi.v3.property) = {description: "消息内容"}]; // 消息内容

  repeated AiAssistantAttachment attachments = 5 [(gnostic.openapi.v3.property) = {description: "附件列表"}]; // 附件列表

  repeated AiAssistantTool tools = 6 [(gnostic.openapi.v3.property) = {description: "工具列表"}]; // 工具列表

  string confirm_title = 7 [(gnostic.openapi.v3.property) = {description: "确认标题"}]; // 确认标题

  repeated string confirm_lines = 8 [(gnostic.openapi.v3.property) = {description: "确认内容"}]; // 确认内容

  google.protobuf.Timestamp created_at = 9 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间
}

// AI 助手附件
message AiAssistantAttachment {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "附件ID"}]; // 附件ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "附件名称"}]; // 附件名称

  int64 size = 3 [(gnostic.openapi.v3.property) = {description: "附件大小"}]; // 附件大小
}

// AI 助手工具调用
message AiAssistantTool {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "工具名称"}]; // 工具名称

  string elapsed = 2 [(gnostic.openapi.v3.property) = {description: "耗时"}]; // 耗时
}
