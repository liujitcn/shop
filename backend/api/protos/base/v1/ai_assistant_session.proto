syntax = "proto3";

package base.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// Base AI 助手会话服务
service AiAssistantService {
  // 查询 AI 助手会话列表
  rpc ListAiAssistantSessions(ListAiAssistantSessionsRequest) returns (ListAiAssistantSessionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/assistant/session"
    };
  }

  // 创建 AI 助手会话
  rpc CreateAiAssistantSession(CreateAiAssistantSessionRequest) returns (CreateAiAssistantSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session"
      body: "*"
    };
  }

  // 更新 AI 助手会话
  rpc UpdateAiAssistantSession(UpdateAiAssistantSessionRequest) returns (UpdateAiAssistantSessionResponse) {
    option (google.api.http) = {
      put: "/api/v1/base/ai/assistant/session/{id}"
      body: "*"
    };
  }

  // 删除 AI 助手会话
  rpc DeleteAiAssistantSession(DeleteAiAssistantSessionRequest) returns (DeleteAiAssistantSessionResponse) {
    option (google.api.http) = {
      delete: "/api/v1/base/ai/assistant/session/{id}"
    };
  }

  // 查询 AI 助手消息列表
  rpc ListAiAssistantMessages(ListAiAssistantMessagesRequest) returns (ListAiAssistantMessagesResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/assistant/session/{session_id}/message"
    };
  }

  // 从指定消息创建 AI 助手分支会话
  rpc CreateAiAssistantSessionBranch(CreateAiAssistantSessionBranchRequest) returns (CreateAiAssistantSessionBranchResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session/{source_session_id}/branch"
      body: "*"
    };
  }
}

// AI 助手会话列表查询条件
message ListAiAssistantSessionsRequest {
  .common.v1.Terminal terminal = 1 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】
}

// AI 助手会话列表响应
message ListAiAssistantSessionsResponse {
  repeated AiAssistantSession sessions = 1 [(gnostic.openapi.v3.property) = {description: "会话列表"}]; // 会话列表
}

// AI 助手会话创建请求
message CreateAiAssistantSessionRequest {
  string title = 1 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题

  .common.v1.Terminal terminal = 2 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】
}

// AI 助手会话创建响应
message CreateAiAssistantSessionResponse {
  AiAssistantSession session = 1 [(gnostic.openapi.v3.property) = {description: "会话信息"}]; // 会话信息
}

// AI 助手会话更新请求
message UpdateAiAssistantSessionRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题
}

// AI 助手会话更新响应
message UpdateAiAssistantSessionResponse {
  AiAssistantSession session = 1 [(gnostic.openapi.v3.property) = {description: "会话信息"}]; // 会话信息
}

// AI 助手会话删除请求
message DeleteAiAssistantSessionRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID
}

// AI 助手会话删除响应
message DeleteAiAssistantSessionResponse {}

// AI 助手消息列表查询条件
message ListAiAssistantMessagesRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID
}

// AI 助手消息列表响应
message ListAiAssistantMessagesResponse {
  repeated AiAssistantMessage messages = 1 [(gnostic.openapi.v3.property) = {description: "消息列表"}]; // 消息列表
}

// AI 助手分支会话创建请求
message CreateAiAssistantSessionBranchRequest {
  string source_session_id = 1 [(gnostic.openapi.v3.property) = {description: "来源会话ID"}]; // 来源会话ID

  string anchor_message_id = 2 [(gnostic.openapi.v3.property) = {description: "分支锚点消息ID"}]; // 分支锚点消息ID

  string title = 3 [(gnostic.openapi.v3.property) = {description: "分支会话标题"}]; // 分支会话标题

  .common.v1.Terminal terminal = 4 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】
}

// AI 助手分支会话创建响应
message CreateAiAssistantSessionBranchResponse {
  AiAssistantSession session = 1 [(gnostic.openapi.v3.property) = {description: "新会话信息"}]; // 新会话信息

  repeated AiAssistantMessage messages = 2 [(gnostic.openapi.v3.property) = {description: "新会话消息列表"}]; // 新会话消息列表
}

// AI 助手会话
message AiAssistantSession {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string title = 2 [(gnostic.openapi.v3.property) = {description: "会话标题"}]; // 会话标题

  string summary = 3 [(gnostic.openapi.v3.property) = {description: "会话摘要"}]; // 会话摘要

  int32 tool_count = 4 [(gnostic.openapi.v3.property) = {description: "工具数量"}]; // 工具数量

  google.protobuf.Timestamp updated_at = 5 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  .common.v1.Terminal terminal = 6 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】
}

// AI 助手消息
message AiAssistantMessage {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "消息ID"}]; // 消息ID

  string role = 2 [(gnostic.openapi.v3.property) = {description: "消息角色"}]; // 消息角色

  string kind = 3 [(gnostic.openapi.v3.property) = {description: "消息类型"}]; // 消息类型

  string content = 4 [(gnostic.openapi.v3.property) = {description: "消息内容"}]; // 消息内容

  repeated AiAssistantAttachment attachments = 5 [(gnostic.openapi.v3.property) = {description: "附件列表"}]; // 附件列表

  google.protobuf.Timestamp created_at = 6 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string reply_source = 7 [(gnostic.openapi.v3.property) = {description: "回复来源：llm/fallback"}]; // 回复来源：llm/fallback

  string model = 8 [(gnostic.openapi.v3.property) = {description: "回复使用的模型名称"}]; // 回复使用的模型名称

  bool fallback = 9 [(gnostic.openapi.v3.property) = {description: "是否为降级回复"}]; // 是否为降级回复

  string fallback_reason = 10 [(gnostic.openapi.v3.property) = {description: "降级原因"}]; // 降级原因

  .common.v1.AiAssistantMessageStatus status = 11 [(gnostic.openapi.v3.property) = {description: "消息生成状态：枚举【AiAssistantMessageStatus】"}]; // 消息生成状态：枚举【AiAssistantMessageStatus】

  int32 token_usage = 12 [(gnostic.openapi.v3.property) = {description: "本次消息 token 消耗"}]; // 本次消息 token 消耗

  repeated AiAssistantTool tools = 13 [(gnostic.openapi.v3.property) = {description: "本次消息使用的工具列表"}]; // 本次消息使用的工具列表
}

// AI 助手附件
message AiAssistantAttachment {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "附件ID"}]; // 附件ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "附件名称"}]; // 附件名称

  int64 size = 3 [(gnostic.openapi.v3.property) = {description: "附件大小"}]; // 附件大小

  string url = 4 [(gnostic.openapi.v3.property) = {description: "附件地址"}]; // 附件地址

  string mime_type = 5 [(gnostic.openapi.v3.property) = {description: "附件 MIME 类型"}]; // 附件 MIME 类型
}

// AI 助手工具调用记录
message AiAssistantTool {
  string type = 1 [(gnostic.openapi.v3.property) = {description: "工具类型：function/server"}]; // 工具类型：function/server

  string name = 2 [(gnostic.openapi.v3.property) = {description: "工具名称"}]; // 工具名称

  string title = 3 [(gnostic.openapi.v3.property) = {description: "工具展示名称"}]; // 工具展示名称

  string status = 4 [(gnostic.openapi.v3.property) = {description: "工具状态"}]; // 工具状态
}
