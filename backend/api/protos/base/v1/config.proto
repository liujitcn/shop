syntax = "proto3";

package base.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Base系统配置公共服务
service ConfigService {
  // 获取系统配置
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/config"
    };
  }
}

// 获取系统配置条件
message GetConfigRequest {
  .common.v1.BaseConfigSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}]; // 位置：枚举【BaseConfigSite】
}

// 系统配置项
message ConfigItem {
  string key = 1 [(gnostic.openapi.v3.property) = {description: "配置key"}]; // 配置key

  string value = 2 [(gnostic.openapi.v3.property) = {description: "配置value"}]; // 配置value
}

// 系统配置查询结果
message GetConfigResponse {
  repeated ConfigItem configs = 1 [(gnostic.openapi.v3.property) = {description: "系统配置列表"}]; // 系统配置列表
}
