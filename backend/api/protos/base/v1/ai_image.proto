syntax = "proto3";

package base.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// Base AI 图片服务
service AiImageService {
  // 分页查询 AI 图片
  rpc PageAiImageTasks(PageAiImageTasksRequest) returns (PageAiImageTasksResponse) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/image/task"
    };
  }

  // 查询 AI 图片
  rpc GetAiImageTask(GetAiImageTaskRequest) returns (AiImageTask) {
    option (google.api.http) = {
      get: "/api/v1/base/ai/image/task/{id}"
    };
  }

  // 创建 AI 图片
  rpc CreateAiImageTask(CreateAiImageTaskRequest) returns (AiImageTask) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/image/task"
      body: "*"
    };
  }

  // 重试 AI 图片生成
  rpc RetryAiImageTask(RetryAiImageTaskRequest) returns (AiImageTask) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/image/task/{id}/retry"
      body: "*"
    };
  }

  // 润色 AI 图片提示词
  rpc PolishAiImagePrompt(PolishAiImagePromptRequest) returns (PolishAiImagePromptResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/image/prompt/polish"
      body: "*"
    };
  }
}

// AI 图片分页查询条件
message PageAiImageTasksRequest {
  optional int32 status = 1 [(gnostic.openapi.v3.property) = {description: "生成状态：1待处理，2生成中，3成功，4失败，5超时"}]; // 生成状态：1待处理，2生成中，3成功，4失败，5超时

  string keyword = 2 [(gnostic.openapi.v3.property) = {description: "关键词，匹配提示词或批次编号"}]; // 关键词，匹配提示词或批次编号

  .common.v1.Terminal terminal = 3 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// AI 图片分页响应
message PageAiImageTasksResponse {
  repeated AiImageTask tasks = 1 [(gnostic.openapi.v3.property) = {description: "AI 图片列表"}]; // AI 图片列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// AI 图片详情查询条件
message GetAiImageTaskRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "图片ID"}]; // 图片ID
}

// AI 图片创建请求
message CreateAiImageTaskRequest {
  string prompt = 1 [(gnostic.openapi.v3.property) = {description: "图片生成提示词"}]; // 图片生成提示词

  string model = 2 [(gnostic.openapi.v3.property) = {description: "图片模型名称"}]; // 图片模型名称

  string size = 3 [(gnostic.openapi.v3.property) = {description: "图片尺寸"}]; // 图片尺寸

  string quality = 4 [(gnostic.openapi.v3.property) = {description: "图片质量"}]; // 图片质量

  string style = 5 [(gnostic.openapi.v3.property) = {description: "图片风格"}]; // 图片风格

  string background = 6 [(gnostic.openapi.v3.property) = {description: "背景模式"}]; // 背景模式

  string output_format = 7 [(gnostic.openapi.v3.property) = {description: "输出格式"}]; // 输出格式

  string response_format = 8 [(gnostic.openapi.v3.property) = {description: "响应格式"}]; // 响应格式

  int64 n = 9 [(gnostic.openapi.v3.property) = {description: "生成数量"}]; // 生成数量

  bool save_output = 10 [(gnostic.openapi.v3.property) = {description: "是否保存生成图片到对象存储"}]; // 是否保存生成图片到对象存储

  bool polish_prompt = 11 [(gnostic.openapi.v3.property) = {description: "是否先润色提示词再生成"}]; // 是否先润色提示词再生成

  .common.v1.Terminal terminal = 12 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】
}

// AI 图片重试请求
message RetryAiImageTaskRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "图片ID"}]; // 图片ID
}

// AI 图片提示词润色请求
message PolishAiImagePromptRequest {
  string prompt = 1 [(gnostic.openapi.v3.property) = {description: "原始图片提示词"}]; // 原始图片提示词

  string scene = 2 [(gnostic.openapi.v3.property) = {description: "图片使用场景"}]; // 图片使用场景
}

// AI 图片提示词润色响应
message PolishAiImagePromptResponse {
  string prompt = 1 [(gnostic.openapi.v3.property) = {description: "润色后的图片提示词"}]; // 润色后的图片提示词

  string original_prompt = 2 [(gnostic.openapi.v3.property) = {description: "原始图片提示词"}]; // 原始图片提示词

  string model = 3 [(gnostic.openapi.v3.property) = {description: "润色模型名称"}]; // 润色模型名称
}

// AI 图片生成记录
message AiImageTask {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "图片ID"}]; // 图片ID

  string prompt = 2 [(gnostic.openapi.v3.property) = {description: "图片生成提示词"}]; // 图片生成提示词

  string original_prompt = 3 [(gnostic.openapi.v3.property) = {description: "原始图片提示词"}]; // 原始图片提示词

  string model = 4 [(gnostic.openapi.v3.property) = {description: "图片模型名称"}]; // 图片模型名称

  string size = 5 [(gnostic.openapi.v3.property) = {description: "图片尺寸"}]; // 图片尺寸

  string quality = 6 [(gnostic.openapi.v3.property) = {description: "图片质量"}]; // 图片质量

  string style = 7 [(gnostic.openapi.v3.property) = {description: "图片风格"}]; // 图片风格

  string background = 8 [(gnostic.openapi.v3.property) = {description: "背景模式"}]; // 背景模式

  string output_format = 9 [(gnostic.openapi.v3.property) = {description: "输出格式"}]; // 输出格式

  string response_format = 10 [(gnostic.openapi.v3.property) = {description: "响应格式"}]; // 响应格式

  int64 n = 11 [(gnostic.openapi.v3.property) = {description: "生成数量"}]; // 生成数量

  bool save_output = 12 [(gnostic.openapi.v3.property) = {description: "是否保存生成图片到对象存储"}]; // 是否保存生成图片到对象存储

  bool polish_prompt = 13 [(gnostic.openapi.v3.property) = {description: "是否先润色提示词再生成"}]; // 是否先润色提示词再生成

  int32 status = 14 [(gnostic.openapi.v3.property) = {description: "生成状态：1待处理，2生成中，3成功，4失败，5超时"}]; // 生成状态：1待处理，2生成中，3成功，4失败，5超时

  repeated AiImage images = 15 [(gnostic.openapi.v3.property) = {description: "图片列表"}]; // 图片列表

  string error_message = 16 [(gnostic.openapi.v3.property) = {description: "失败或超时原因"}]; // 失败或超时原因

  int32 retry_count = 17 [(gnostic.openapi.v3.property) = {description: "已重试次数"}]; // 已重试次数

  string request_id = 18 [(gnostic.openapi.v3.property) = {description: "生成批次编号"}]; // 生成批次编号

  int64 created = 19 [(gnostic.openapi.v3.property) = {description: "模型生成时间戳"}]; // 模型生成时间戳

  .common.v1.Terminal terminal = 20 [(gnostic.openapi.v3.property) = {description: "终端类型：枚举【Terminal】"}]; // 终端类型：枚举【Terminal】

  google.protobuf.Timestamp started_at = 21 [(gnostic.openapi.v3.property) = {description: "开始生成时间"}]; // 开始生成时间

  google.protobuf.Timestamp finished_at = 22 [(gnostic.openapi.v3.property) = {description: "生成结束时间"}]; // 生成结束时间

  google.protobuf.Timestamp created_at = 23 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  google.protobuf.Timestamp updated_at = 24 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// AI 图片结果
message AiImage {
  string name = 1 [(gnostic.openapi.v3.property) = {description: "图片名称"}]; // 图片名称

  string url = 2 [(gnostic.openapi.v3.property) = {description: "图片地址"}]; // 图片地址

  string mime_type = 3 [(gnostic.openapi.v3.property) = {description: "图片 MIME 类型"}]; // 图片 MIME 类型

  int64 size = 4 [(gnostic.openapi.v3.property) = {description: "图片字节大小"}]; // 图片字节大小

  string revised_prompt = 5 [(gnostic.openapi.v3.property) = {description: "模型修订后的提示词"}]; // 模型修订后的提示词

  bool saved = 6 [(gnostic.openapi.v3.property) = {description: "是否已保存到对象存储"}]; // 是否已保存到对象存储

  string storage_path = 7 [(gnostic.openapi.v3.property) = {description: "对象存储目录"}]; // 对象存储目录

  string request_id = 8 [(gnostic.openapi.v3.property) = {description: "生成批次编号"}]; // 生成批次编号
}
