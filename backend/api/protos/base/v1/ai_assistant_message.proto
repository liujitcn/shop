syntax = "proto3";

package base.v1;

import "base/v1/ai_assistant_session.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Base AI 助手消息服务
service AiAssistantMessageService {
  // 发送 AI 助手消息
  rpc SendAiAssistantMessage(SendAiAssistantMessageRequest) returns (SendAiAssistantMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session/{session_id}/message"
      body: "*"
    };
  }

  // 删除 AI 助手消息
  rpc DeleteAiAssistantMessage(DeleteAiAssistantMessageRequest) returns (DeleteAiAssistantMessageResponse) {
    option (google.api.http) = {
      delete: "/api/v1/base/ai/assistant/session/{session_id}/message/{message_id}"
    };
  }

  // 重试失败的 AI 助手消息
  rpc RetryAiAssistantUserMessage(RetryAiAssistantUserMessageRequest) returns (SendAiAssistantMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session/{session_id}/message/{message_id}/retry"
      body: "*"
    };
  }

  // 重新生成 AI 助手输出
  rpc RegenerateAiAssistantMessage(RegenerateAiAssistantMessageRequest) returns (SendAiAssistantMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/base/ai/assistant/session/{session_id}/message/{message_id}/regeneration"
      body: "*"
    };
  }
}

// AI 助手消息发送请求
message SendAiAssistantMessageRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string content = 2 [(gnostic.openapi.v3.property) = {description: "消息内容"}]; // 消息内容

  repeated AiAssistantAttachment attachments = 3 [(gnostic.openapi.v3.property) = {description: "附件列表"}]; // 附件列表
}

// AI 助手消息发送响应
message SendAiAssistantMessageResponse {
  repeated AiAssistantMessage messages = 1 [(gnostic.openapi.v3.property) = {description: "新增消息列表"}]; // 新增消息列表

  AiAssistantSession session = 2 [(gnostic.openapi.v3.property) = {description: "最新会话信息"}]; // 最新会话信息
}

// AI 助手消息删除请求
message DeleteAiAssistantMessageRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string message_id = 2 [(gnostic.openapi.v3.property) = {description: "消息ID"}]; // 消息ID
}

// AI 助手消息删除响应
message DeleteAiAssistantMessageResponse {}

// AI 助手失败消息重试请求
message RetryAiAssistantUserMessageRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string message_id = 2 [(gnostic.openapi.v3.property) = {description: "失败消息ID"}]; // 失败消息ID
}

// AI 助手输出重新生成请求
message RegenerateAiAssistantMessageRequest {
  string session_id = 1 [(gnostic.openapi.v3.property) = {description: "会话ID"}]; // 会话ID

  string message_id = 2 [(gnostic.openapi.v3.property) = {description: "消息ID"}]; // 消息ID
}
