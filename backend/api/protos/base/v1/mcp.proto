syntax = "proto3";

package base.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Base MCP服务
service McpService {
  // 处理MCP Streamable HTTP请求
  rpc HandleMcp(HandleMcpRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/mcp/{terminal}"
      body: "*"
      additional_bindings {
        get: "/mcp/{terminal}"
      }
      additional_bindings {
        delete: "/mcp/{terminal}"
      }
    };
  }
}

// MCP请求参数
message HandleMcpRequest {
  string terminal = 1 [(gnostic.openapi.v3.property) = {description: "服务筛选关键字，必填，支持 app、admin 或任意服务关键字"}]; // 服务筛选关键字，必填，支持 app、admin 或任意服务关键字
}
