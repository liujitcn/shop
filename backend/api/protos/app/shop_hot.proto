syntax = "proto3";

package app;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

import "app/goods_info.proto";

// App热门推荐服务
service ShopHotService {
  // 查询热门推荐列表
  rpc ListShopHot (google.protobuf.Empty) returns (ListShopHotResponse) {
    option (google.api.http) = {
      get: "/api/app/shop/hot"
    };
  }
  // 查询热门推荐选项
  rpc ListShopHotItem (google.protobuf.Int64Value) returns (ListShopHotItemResponse) {
    option (google.api.http) = {
      get: "/api/app/shop/hot/item"
    };
  }

  // 查询热门推荐商品
  rpc PageShopHotGoods (PageShopHotGoodsRequest) returns (PageShopHotGoodsResponse) {
    option (google.api.http) = {
      get: "/api/app/shop/hot/goods"
    };
  }
}

// 热门专区列表响应
message ListShopHotResponse{
  repeated ShopHot list = 1 [
    (gnostic.openapi.v3.property) = {description: "分页数据"}
  ]; // 分页数据
}

// 热门专区商品分页查询条件
message PageShopHotGoodsRequest{
  int64 hotItemId = 1 [
    (gnostic.openapi.v3.property) = {
      description: "选项id",
    }
  ]; // 选项id

  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ]; // 当前页码

  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ]; // 每一页的行数
}

// 热门专区商品分页响应
message PageShopHotGoodsResponse{
  repeated app.GoodsInfo list = 1 [
    (gnostic.openapi.v3.property) = {description: "分页数据"}
  ]; // 分页数据
  int32 total = 2 [
    (gnostic.openapi.v3.property) = {description: "总数"}
  ]; // 总数
}

// 热门专区
message ShopHot {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ]; // 主键id
  // 主键id
  string title = 2 [
    (gnostic.openapi.v3.property) = {
      description: "标题",
    }
  ]; // 标题
  string desc = 3 [
    (gnostic.openapi.v3.property) = {
      description: "描述",
    }
  ]; // 描述
  repeated string picture = 4 [
    (gnostic.openapi.v3.property) = {
      description: "图片链接",
    }
  ]; // 图片链接
}

// 热门专区项列表响应
message ListShopHotItemResponse {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ]; // 主键id
  // 主键id
  string title = 2 [
    (gnostic.openapi.v3.property) = {
      description: "标题",
    }
  ]; // 标题
  string banner = 3 [
    (gnostic.openapi.v3.property) = {
      description: "轮播图",
    }
  ]; // 轮播图
  repeated ShopHotItem list = 4 [
    (gnostic.openapi.v3.property) = {
      description: "选项",
    }
  ]; // 选项
}

// 热门专区项
message ShopHotItem {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ]; // 主键id
  // 主键id
  string title = 2 [
    (gnostic.openapi.v3.property) = {
      description: "标题",
    }
  ]; // 标题
}
