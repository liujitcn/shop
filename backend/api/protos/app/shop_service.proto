syntax = "proto3";

package app;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

import "common/enum.proto";

// App商城服务
service ShopServiceService {
  // 查询商城服务列表
  rpc ListShopService (google.protobuf.Empty) returns (ListShopServiceResponse) {
    option (google.api.http) = {
      get: "/api/app/shop/service"
    };
  }
}

// 商城服务列表响应
message ListShopServiceResponse{
  repeated ShopService list = 1 [
    (gnostic.openapi.v3.property) = {description: "列表数据"}
  ]; // 列表数据
}

// 商城服务
message ShopService {

  string label = 2 [
    (gnostic.openapi.v3.property) = {
      description: "标签",
    }
  ]; // 标签
  string value = 3 [
    (gnostic.openapi.v3.property) = {
      description: "值",
    }
  ]; // 值
} 
