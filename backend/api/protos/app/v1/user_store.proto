syntax = "proto3";

package app.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// App用户门店管理服务
service UserStoreService {
  // 查询用户门店
  rpc GetUserStore(GetUserStoreRequest) returns (UserStore) {
    option (google.api.http) = {
      get: "/api/v1/app/user/store"
    };
  }

  // 创建用户门店
  rpc CreateUserStore(CreateUserStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/app/user/store"
      body: "user_store"
    };
  }

  // 更新用户门店
  rpc UpdateUserStore(UpdateUserStoreRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/app/user/store/{id}"
      body: "user_store"
    };
  }
}

// 查询用户门店请求参数
message GetUserStoreRequest {}

// 创建用户门店请求参数
message CreateUserStoreRequest {
  UserStoreForm user_store = 1 [(gnostic.openapi.v3.property) = {description: "用户门店"}]; // 用户门店
}

// 更新用户门店请求参数
message UpdateUserStoreRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户门店ID"}]; // 用户门店ID

  UserStoreForm user_store = 2 [(gnostic.openapi.v3.property) = {description: "用户门店"}]; // 用户门店
}

// 用户门店
message UserStore {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户门店ID"}]; // 用户门店ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称

  repeated string address = 3 [(gnostic.openapi.v3.property) = {description: "省市区"}]; // 省市区

  string detail = 4 [(gnostic.openapi.v3.property) = {description: "详细地址"}]; // 详细地址

  repeated string picture = 5 [(gnostic.openapi.v3.property) = {description: "门店照片"}]; // 门店照片

  repeated string business_license = 6 [(gnostic.openapi.v3.property) = {description: "营业执照"}]; // 营业执照

  repeated string address_name = 10 [(gnostic.openapi.v3.property) = {description: "省市区"}]; // 省市区

  common.v1.UserStoreStatus status = 51 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 52 [(gnostic.openapi.v3.property) = {description: "备注名"}]; // 备注名
}

// 用户门店表单
message UserStoreForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户门店ID"}]; // 用户门店ID

  string name = 2 [(gnostic.openapi.v3.property) = {description: "门店名称"}]; // 门店名称

  repeated string address = 3 [(gnostic.openapi.v3.property) = {description: "省市区"}]; // 省市区

  string detail = 4 [(gnostic.openapi.v3.property) = {description: "详细地址"}]; // 详细地址

  repeated string picture = 5 [(gnostic.openapi.v3.property) = {description: "门店照片"}]; // 门店照片

  repeated string business_license = 6 [(gnostic.openapi.v3.property) = {description: "营业执照"}]; // 营业执照

  repeated string address_name = 10 [(gnostic.openapi.v3.property) = {description: "省市区"}]; // 省市区
}
