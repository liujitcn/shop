syntax = "proto3";

package app.v1;

import "common/v1/common.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// App行政区域服务
service BaseAreaService {
  // 查询行政区域树形列表
  rpc TreeBaseAreas(TreeBaseAreasRequest) returns (TreeBaseAreasResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/base/area/tree"
    };
  }
}

// 行政区域树形查询条件
message TreeBaseAreasRequest {}

// 行政区域树形响应
message TreeBaseAreasResponse {
  repeated .common.v1.AppTreeOptionResponse.Option areas = 1 [(gnostic.openapi.v3.property) = {description: "行政区域树形选项"}]; // 行政区域树形选项
}
