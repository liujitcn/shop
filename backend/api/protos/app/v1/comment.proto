syntax = "proto3";

package app.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// App评价服务
service CommentService {
  // 查询商品评价摘要
  rpc GoodsCommentOverview(GoodsCommentOverviewRequest) returns (GoodsCommentOverviewResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/comment/goods/{goods_id}/overview"
    };
  }

  // 查询商品评价分页列表
  rpc PageGoodsComment(PageGoodsCommentRequest) returns (PageGoodsCommentResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/comment/goods/{goods_id}"
    };
  }

  // 查询评价讨论分页列表
  rpc PageCommentDiscussion(PageCommentDiscussionRequest) returns (PageCommentDiscussionResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/comment/{comment_id}/discussion"
    };
  }

  // 发布评价讨论
  rpc CreateCommentDiscussion(CreateCommentDiscussionRequest) returns (CreateCommentDiscussionResponse) {
    option (google.api.http) = {
      post: "/api/v1/app/comment/{comment_id}/discussion"
      body: "*"
    };
  }

  // 保存评价互动状态
  rpc SaveCommentReaction(SaveCommentReactionRequest) returns (SaveCommentReactionResponse) {
    option (google.api.http) = {
      put: "/api/v1/app/comment/reaction"
      body: "*"
    };
  }

  // 查询待评价商品分页列表
  rpc PagePendingCommentGoods(PagePendingCommentGoodsRequest) returns (PagePendingCommentGoodsResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/comment/pending"
    };
  }

  // 发布商品评价
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse) {
    option (google.api.http) = {
      post: "/api/v1/app/comment"
      body: "*"
    };
  }

  // 删除商品评价
  rpc DeleteComment(DeleteCommentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/app/comment/{id}"
    };
  }

  // 查询我的评价分页列表
  rpc PageMyComment(PageMyCommentRequest) returns (PageMyCommentResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/comment/my"
    };
  }
}

// 删除商品评价条件
message DeleteCommentRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "评价ID"}]; // 评价ID
}

// 文本片段
message CommentTextSegment {
  string text = 1 [(gnostic.openapi.v3.property) = {description: "文本内容"}]; // 文本内容

  bool highlight = 2 [(gnostic.openapi.v3.property) = {description: "是否高亮"}]; // 是否高亮
}

// 评价用户展示信息
message CommentUserView {
  string user_name = 1 [(gnostic.openapi.v3.property) = {description: "展示昵称，匿名时返回匿名用户"}]; // 展示昵称，匿名时返回匿名用户

  string avatar = 2 [(gnostic.openapi.v3.property) = {description: "展示头像，匿名时返回默认头像"}]; // 展示头像，匿名时返回默认头像

  string user_tag_text = 3 [(gnostic.openapi.v3.property) = {description: "用户展示标签，匿名时为空"}]; // 用户展示标签，匿名时为空

  bool anonymous = 4 [(gnostic.openapi.v3.property) = {description: "是否匿名展示"}]; // 是否匿名展示
}

// 评价筛选项
message CommentFilterItem {
  .common.v1.CommentFilterType filter_type = 1 [(gnostic.openapi.v3.property) = {description: "筛选类型"}]; // 筛选类型

  int64 tag_id = 2 [(gnostic.openapi.v3.property) = {description: "内容标签ID，系统筛选项固定为0"}]; // 内容标签ID，系统筛选项固定为0

  string label = 3 [(gnostic.openapi.v3.property) = {description: "展示名称"}]; // 展示名称

  string value = 4 [(gnostic.openapi.v3.property) = {description: "展示值，可为空"}]; // 展示值，可为空
}

// 评价展示项
message CommentItem {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "评价ID"}]; // 评价ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  string goods_name = 3 [(gnostic.openapi.v3.property) = {description: "商品名称快照"}]; // 商品名称快照

  string goods_picture = 4 [(gnostic.openapi.v3.property) = {description: "商品主图快照"}]; // 商品主图快照

  string sku_code = 5 [(gnostic.openapi.v3.property) = {description: "SKU编码"}]; // SKU编码

  string sku_desc = 6 [(gnostic.openapi.v3.property) = {description: "规格展示文案"}]; // 规格展示文案

  CommentUserView user = 7 [(gnostic.openapi.v3.property) = {description: "评价用户展示信息"}]; // 评价用户展示信息

  string date_text = 8 [(gnostic.openapi.v3.property) = {description: "前端展示日期"}]; // 前端展示日期

  repeated CommentTextSegment content_segments = 9 [(gnostic.openapi.v3.property) = {description: "评价正文片段"}]; // 评价正文片段

  repeated string img = 10 [(gnostic.openapi.v3.property) = {description: "评价图片数组"}]; // 评价图片数组

  int32 image_count = 11 [(gnostic.openapi.v3.property) = {description: "图片数量"}]; // 图片数量

  int32 discussion_count = 12 [(gnostic.openapi.v3.property) = {description: "讨论数"}]; // 讨论数

  bool anonymous_for_owner = 13 [(gnostic.openapi.v3.property) = {description: "仅本人列表展示是否已匿名"}]; // 仅本人列表展示是否已匿名

  int32 goods_score = 14 [(gnostic.openapi.v3.property) = {description: "商品评分"}]; // 商品评分

  .common.v1.CommentStatus status = 15 [(gnostic.openapi.v3.property) = {description: "评价审核状态：枚举【CommentStatus】"}]; // 评价审核状态：枚举【CommentStatus】

  int32 like_count = 16 [(gnostic.openapi.v3.property) = {description: "点赞数"}]; // 点赞数

  int32 dislike_count = 17 [(gnostic.openapi.v3.property) = {description: "点踩数"}]; // 点踩数

  .common.v1.CommentReactionType reaction_type = 18 [(gnostic.openapi.v3.property) = {description: "当前用户互动类型：枚举【CommentReactionType】"}]; // 当前用户互动类型：枚举【CommentReactionType】
}

// AI摘要
message CommentAi {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "AI摘要ID"}]; // AI摘要ID

  repeated .common.v1.CommentAiContentItem content = 2 [(gnostic.openapi.v3.property) = {description: "AI摘要内容列表"}]; // AI摘要内容列表

  int32 like_count = 3 [(gnostic.openapi.v3.property) = {description: "点赞数"}]; // 点赞数

  int32 dislike_count = 4 [(gnostic.openapi.v3.property) = {description: "点踩数"}]; // 点踩数

  .common.v1.CommentReactionType reaction_type = 5 [(gnostic.openapi.v3.property) = {description: "当前用户互动类型：枚举【CommentReactionType】"}]; // 当前用户互动类型：枚举【CommentReactionType】
}

// 评价讨论展示项
message CommentDiscussionItem {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "讨论ID"}]; // 讨论ID

  int64 comment_id = 2 [(gnostic.openapi.v3.property) = {description: "评价ID"}]; // 评价ID

  CommentUserView user = 3 [(gnostic.openapi.v3.property) = {description: "讨论用户展示信息"}]; // 讨论用户展示信息

  string content = 4 [(gnostic.openapi.v3.property) = {description: "讨论内容"}]; // 讨论内容

  string reply_to_display_name = 5 [(gnostic.openapi.v3.property) = {description: "被回复人的展示名称"}]; // 被回复人的展示名称

  string date_text = 6 [(gnostic.openapi.v3.property) = {description: "前端展示日期"}]; // 前端展示日期

  int32 like_count = 7 [(gnostic.openapi.v3.property) = {description: "点赞数"}]; // 点赞数

  .common.v1.CommentReactionType reaction_type = 8 [(gnostic.openapi.v3.property) = {description: "当前用户互动类型：枚举【CommentReactionType】"}]; // 当前用户互动类型：枚举【CommentReactionType】
}

// 待评价商品展示项
message PendingCommentGoodsItem {
  int64 order_id = 1 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  string goods_name = 3 [(gnostic.openapi.v3.property) = {description: "商品名称"}]; // 商品名称

  string goods_picture = 4 [(gnostic.openapi.v3.property) = {description: "商品主图"}]; // 商品主图

  string sku_code = 5 [(gnostic.openapi.v3.property) = {description: "SKU编码"}]; // SKU编码

  string sku_desc = 6 [(gnostic.openapi.v3.property) = {description: "规格展示文案"}]; // 规格展示文案

  string desc = 7 [(gnostic.openapi.v3.property) = {description: "待评价卡片提示文案"}]; // 待评价卡片提示文案
}

// 商品评价摘要查询条件
message GoodsCommentOverviewRequest {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  int32 preview_limit = 2 [(gnostic.openapi.v3.property) = {
    description: "评价预览数量"
    default: {number: 2}
  }]; // 评价预览数量
}

// 商品评价摘要响应
message GoodsCommentOverviewResponse {
  int32 total_count = 1 [(gnostic.openapi.v3.property) = {description: "评价总数"}]; // 评价总数

  int32 recent_days = 2 [(gnostic.openapi.v3.property) = {description: "好评率统计天数"}]; // 好评率统计天数

  int32 recent_good_rate = 3 [(gnostic.openapi.v3.property) = {description: "近N天好评率百分比整数"}]; // 近N天好评率百分比整数

  CommentAi ai_summary = 4 [(gnostic.openapi.v3.property) = {description: "商品详情AI摘要"}]; // 商品详情AI摘要

  repeated CommentFilterItem comment_filters = 5 [(gnostic.openapi.v3.property) = {description: "高频标签列表"}]; // 高频标签列表

  repeated CommentItem preview_comments = 6 [(gnostic.openapi.v3.property) = {description: "评价预览列表"}]; // 评价预览列表
}

// 商品评价分页查询条件
message PageGoodsCommentRequest {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  string sku_code = 2 [(gnostic.openapi.v3.property) = {description: "SKU编码，仅当前商品筛选时使用"}]; // SKU编码，仅当前商品筛选时使用

  .common.v1.CommentFilterType filter_type = 3 [(gnostic.openapi.v3.property) = {
    description: "筛选类型"
    default: {string: "COMMENT_FILTER_ALL"}
  }]; // 筛选类型

  int64 tag_id = 4 [(gnostic.openapi.v3.property) = {description: "内容标签ID，筛选标签时使用"}]; // 内容标签ID，筛选标签时使用

  bool current_goods_only = 5 [(gnostic.openapi.v3.property) = {description: "是否只看当前SKU商品"}]; // 是否只看当前SKU商品

  .common.v1.CommentSortType sort_type = 6 [(gnostic.openapi.v3.property) = {
    description: "排序类型"
    default: {string: "COMMENT_SORT_DEFAULT"}
  }]; // 排序类型

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每页数量"
    default: {number: 10}
  }]; // 每页数量
}

// 商品评价分页响应
message PageGoodsCommentResponse {
  repeated CommentFilterItem comment_filters = 1 [(gnostic.openapi.v3.property) = {description: "顶部筛选项列表"}]; // 顶部筛选项列表

  CommentAi ai_summary = 2 [(gnostic.openapi.v3.property) = {description: "评价列表AI摘要"}]; // 评价列表AI摘要

  repeated CommentItem comments = 3 [(gnostic.openapi.v3.property) = {description: "评价分页数据"}]; // 评价分页数据

  int32 total = 4 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数

  int64 page_num = 5 [(gnostic.openapi.v3.property) = {description: "当前页码"}]; // 当前页码

  int64 page_size = 6 [(gnostic.openapi.v3.property) = {description: "每页数量"}]; // 每页数量

  bool has_more = 7 [(gnostic.openapi.v3.property) = {description: "是否还有下一页"}]; // 是否还有下一页
}

// 评价讨论分页查询条件
message PageCommentDiscussionRequest {
  int64 comment_id = 1 [(gnostic.openapi.v3.property) = {description: "评价ID"}]; // 评价ID

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每页数量"
    default: {number: 20}
  }]; // 每页数量
}

// 评价讨论分页响应
message PageCommentDiscussionResponse {
  int64 comment_id = 1 [(gnostic.openapi.v3.property) = {description: "评价ID"}]; // 评价ID

  repeated CommentDiscussionItem comment_discussions = 2 [(gnostic.openapi.v3.property) = {description: "讨论分页数据"}]; // 讨论分页数据

  int32 total = 3 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数

  int64 page_num = 4 [(gnostic.openapi.v3.property) = {description: "当前页码"}]; // 当前页码

  int64 page_size = 5 [(gnostic.openapi.v3.property) = {description: "每页数量"}]; // 每页数量

  bool has_more = 6 [(gnostic.openapi.v3.property) = {description: "是否还有下一页"}]; // 是否还有下一页
}

// 发布评价讨论请求参数
message CreateCommentDiscussionRequest {
  int64 comment_id = 1 [(gnostic.openapi.v3.property) = {description: "所属评价ID"}]; // 所属评价ID

  string content = 2 [(gnostic.openapi.v3.property) = {description: "讨论内容"}]; // 讨论内容

  int64 parent_id = 3 [(gnostic.openapi.v3.property) = {description: "父级讨论ID，可为空"}]; // 父级讨论ID，可为空

  int64 reply_to_discussion_id = 4 [(gnostic.openapi.v3.property) = {description: "被回复讨论ID，可为空"}]; // 被回复讨论ID，可为空

  bool is_anonymous = 5 [(gnostic.openapi.v3.property) = {description: "是否匿名讨论"}]; // 是否匿名讨论
}

// 发布评价讨论响应
message CreateCommentDiscussionResponse {
  CommentDiscussionItem item = 1 [(gnostic.openapi.v3.property) = {description: "新创建的讨论"}]; // 新创建的讨论

  int32 discussion_count = 2 [(gnostic.openapi.v3.property) = {description: "发布后的讨论总数"}]; // 发布后的讨论总数
}

// 保存评价互动状态请求参数
message SaveCommentReactionRequest {
  .common.v1.CommentReactionTargetType target_type = 1 [(gnostic.openapi.v3.property) = {description: "互动目标类型：枚举【CommentReactionTargetType】"}]; // 互动目标类型：枚举【CommentReactionTargetType】

  int64 target_id = 2 [(gnostic.openapi.v3.property) = {description: "互动目标ID"}]; // 互动目标ID

  .common.v1.CommentReactionType reaction_type = 3 [(gnostic.openapi.v3.property) = {description: "互动类型：枚举【CommentReactionType】"}]; // 互动类型：枚举【CommentReactionType】

  bool active = 4 [(gnostic.openapi.v3.property) = {description: "是否设置当前互动状态"}]; // 是否设置当前互动状态
}

// 保存评价互动状态响应
message SaveCommentReactionResponse {
  .common.v1.CommentReactionTargetType target_type = 1 [(gnostic.openapi.v3.property) = {description: "互动目标类型：枚举【CommentReactionTargetType】"}]; // 互动目标类型：枚举【CommentReactionTargetType】

  int64 target_id = 2 [(gnostic.openapi.v3.property) = {description: "互动目标ID"}]; // 互动目标ID

  .common.v1.CommentReactionType reaction_type = 3 [(gnostic.openapi.v3.property) = {description: "当前用户互动类型：枚举【CommentReactionType】"}]; // 当前用户互动类型：枚举【CommentReactionType】

  int32 like_count = 4 [(gnostic.openapi.v3.property) = {description: "点赞数"}]; // 点赞数

  int32 dislike_count = 5 [(gnostic.openapi.v3.property) = {description: "点踩数"}]; // 点踩数
}

// 待评价商品分页查询条件
message PagePendingCommentGoodsRequest {
  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每页数量"
    default: {number: 10}
  }]; // 每页数量
}

// 待评价商品分页响应
message PagePendingCommentGoodsResponse {
  repeated PendingCommentGoodsItem pending_comment_goods = 1 [(gnostic.openapi.v3.property) = {description: "待评价商品列表"}]; // 待评价商品列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数

  int64 page_num = 3 [(gnostic.openapi.v3.property) = {description: "当前页码"}]; // 当前页码

  int64 page_size = 4 [(gnostic.openapi.v3.property) = {description: "每页数量"}]; // 每页数量

  bool has_more = 5 [(gnostic.openapi.v3.property) = {description: "是否还有下一页"}]; // 是否还有下一页
}

// 发布商品评价请求参数
message CreateCommentRequest {
  int64 order_id = 1 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  string sku_code = 3 [(gnostic.openapi.v3.property) = {description: "SKU编码"}]; // SKU编码

  string content = 4 [(gnostic.openapi.v3.property) = {description: "评价正文"}]; // 评价正文

  repeated string img = 5 [(gnostic.openapi.v3.property) = {description: "评价图片数组"}]; // 评价图片数组

  bool is_anonymous = 6 [(gnostic.openapi.v3.property) = {description: "是否匿名展示"}]; // 是否匿名展示

  int32 goods_score = 7 [(gnostic.openapi.v3.property) = {description: "商品评价评分，范围1到5"}]; // 商品评价评分，范围1到5

  int32 package_score = 8 [(gnostic.openapi.v3.property) = {description: "包装评价评分，范围1到5"}]; // 包装评价评分，范围1到5

  int32 delivery_score = 9 [(gnostic.openapi.v3.property) = {description: "送货评价评分，范围1到5"}]; // 送货评价评分，范围1到5
}

// 发布商品评价响应
message CreateCommentResponse {
  int64 comment_id = 1 [(gnostic.openapi.v3.property) = {description: "新建评价ID"}]; // 新建评价ID

  int64 order_id = 2 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID

  bool order_completed = 3 [(gnostic.openapi.v3.property) = {description: "订单是否已因全部评价完成而流转为已完成"}]; // 订单是否已因全部评价完成而流转为已完成
}

// 我的评价分页查询条件
message PageMyCommentRequest {
  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每页数量"
    default: {number: 10}
  }]; // 每页数量
}

// 我的评价分页响应
message PageMyCommentResponse {
  repeated CommentItem comments = 1 [(gnostic.openapi.v3.property) = {description: "我的评价列表"}]; // 我的评价列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数

  int64 page_num = 3 [(gnostic.openapi.v3.property) = {description: "当前页码"}]; // 当前页码

  int64 page_size = 4 [(gnostic.openapi.v3.property) = {description: "每页数量"}]; // 每页数量

  bool has_more = 5 [(gnostic.openapi.v3.property) = {description: "是否还有下一页"}]; // 是否还有下一页
}
