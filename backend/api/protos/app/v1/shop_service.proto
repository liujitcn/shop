syntax = "proto3";

package app.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// App商城服务说明服务
service ShopServiceService {
  // 查询商城服务列表
  rpc ListShopServices(ListShopServicesRequest) returns (ListShopServicesResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/shop/service"
    };
  }
}

// 商城服务列表查询条件
message ListShopServicesRequest {}

// 商城服务列表响应
message ListShopServicesResponse {
  repeated ShopService shop_services = 1 [(gnostic.openapi.v3.property) = {description: "商城服务列表"}]; // 商城服务列表
}

// 商城服务
message ShopService {
  string label = 2 [(gnostic.openapi.v3.property) = {description: "标签"}]; // 标签

  string value = 3 [(gnostic.openapi.v3.property) = {description: "值"}]; // 值
}
