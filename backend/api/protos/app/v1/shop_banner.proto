syntax = "proto3";

package app.v1;

import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// App商城轮播图服务
service ShopBannerService {
  // 查询商城轮播图列表
  rpc ListShopBanners(ListShopBannersRequest) returns (ListShopBannersResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/shop/banner"
    };
  }
}

// 轮播图列表查询条件
message ListShopBannersRequest {
  common.v1.ShopBannerSite site = 1 [(gnostic.openapi.v3.property) = {description: "位置：枚举【ShopBannerSite】"}]; // 位置：枚举【ShopBannerSite】
}

// 轮播图列表响应
message ListShopBannersResponse {
  repeated ShopBanner shop_banners = 1 [(gnostic.openapi.v3.property) = {description: "商城轮播图列表"}]; // 商城轮播图列表
}

// 轮播图
message ShopBanner {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键ID"}]; // 主键ID

  common.v1.ShopBannerSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【ShopBannerSite】"}]; // 位置：枚举【ShopBannerSite】

  string picture = 3 [(gnostic.openapi.v3.property) = {description: "图片链接"}]; // 图片链接

  common.v1.ShopBannerType type = 4 [(gnostic.openapi.v3.property) = {description: "跳转类型：枚举【ShopBannerType】"}]; // 跳转类型：枚举【ShopBannerType】

  string href = 5 [(gnostic.openapi.v3.property) = {description: "跳转地址"}]; // 跳转地址
}
