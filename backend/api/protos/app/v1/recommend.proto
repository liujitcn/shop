syntax = "proto3";

package app.v1;

import "app/v1/goods_info.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// App推荐服务
service RecommendService {
  // 获取匿名推荐主体
  rpc RecommendAnonymousActor(RecommendAnonymousActorRequest) returns (RecommendAnonymousActorResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/recommend/actor/anonymous"
    };
  }

  // 绑定匿名推荐主体到当前登录用户
  rpc BindRecommendAnonymousActor(BindRecommendAnonymousActorRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/app/recommend/actor/binding"
      body: "*"
    };
  }

  // 查询推荐商品列表
  rpc RecommendGoods(RecommendGoodsRequest) returns (RecommendGoodsResponse) {
    option (google.api.http) = {
      get: "/api/v1/app/recommend/goods"
    };
  }

  // 上报推荐事件
  rpc RecommendEventReport(RecommendEventReportRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/app/recommend/event"
      body: "*"
    };
  }
}

// 匿名推荐主体查询条件
message RecommendAnonymousActorRequest {}

// 匿名推荐主体响应
message RecommendAnonymousActorResponse {
  int64 anonymous_id = 1 [(gnostic.openapi.v3.property) = {description: "匿名推荐主体ID"}]; // 匿名推荐主体ID
}

// 匿名推荐主体绑定条件
message BindRecommendAnonymousActorRequest {}

// 推荐商品请求参数
message RecommendGoodsRequest {
  .common.v1.RecommendScene scene = 1 [(gnostic.openapi.v3.property) = {description: "推荐场景"}]; // 推荐场景

  int64 order_id = 2 [(gnostic.openapi.v3.property) = {description: "订单ID"}]; // 订单ID

  int64 goods_id = 3 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  int64 request_id = 4 [(gnostic.openapi.v3.property) = {description: "推荐请求ID"}]; // 推荐请求ID

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每页数量"
    default: {number: 10}
  }]; // 每页数量
}

// 推荐商品响应
message RecommendGoodsResponse {
  repeated GoodsInfo goods_infos = 1 [(gnostic.openapi.v3.property) = {description: "推荐商品列表"}]; // 推荐商品列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数

  int64 request_id = 3 [(gnostic.openapi.v3.property) = {description: "推荐请求ID"}]; // 推荐请求ID
}

// 推荐上下文
message RecommendContext {
  .common.v1.RecommendScene scene = 1 [(gnostic.openapi.v3.property) = {description: "推荐场景"}]; // 推荐场景

  int64 request_id = 2 [(gnostic.openapi.v3.property) = {description: "推荐请求ID"}]; // 推荐请求ID

  int32 position = 3 [(gnostic.openapi.v3.property) = {description: "推荐位序号"}]; // 推荐位序号
}

// 推荐事件归因上下文
message RecommendEventContext {
  .common.v1.RecommendScene scene = 1 [(gnostic.openapi.v3.property) = {description: "推荐场景"}]; // 推荐场景

  int64 request_id = 2 [(gnostic.openapi.v3.property) = {description: "推荐请求ID"}]; // 推荐请求ID
}

// 推荐事件商品项
message RecommendEventItem {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品ID"}]; // 商品ID

  int64 goods_num = 2 [(gnostic.openapi.v3.property) = {description: "商品数量"}]; // 商品数量

  int32 position = 3 [(gnostic.openapi.v3.property) = {description: "推荐位序号"}]; // 推荐位序号
}

// 推荐事件上报请求参数
message RecommendEventReportRequest {
  .common.v1.RecommendEventType event_type = 1 [(gnostic.openapi.v3.property) = {description: "推荐事件类型"}]; // 推荐事件类型

  RecommendEventContext recommend_context = 2 [(gnostic.openapi.v3.property) = {description: "推荐归因上下文"}]; // 推荐归因上下文

  repeated RecommendEventItem items = 3 [(gnostic.openapi.v3.property) = {description: "推荐事件商品项"}]; // 推荐事件商品项
}
