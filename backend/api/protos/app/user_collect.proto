syntax = "proto3";

package app;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "app/recommend.proto";

// App用户收藏管理服务
service UserCollectService {
  // 查询用户收藏列表
  rpc PageUserCollect (PageUserCollectRequest) returns (PageUserCollectResponse) {
    option (google.api.http) = {
      get: "/api/app/user/collect"
    };
  }

  // 查询用户是否收藏
  rpc GetIsCollect (IsCollectRequest) returns (google.protobuf.BoolValue) {
    option (google.api.http) = {
      get: "/api/app/user/collect/status"
    };
  }

  // 创建用户收藏
  rpc CreateUserCollect (UserCollectForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/app/user/collect"
      body: "*"
    };
  }

  // 删除用户收藏
  rpc DeleteUserCollect (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/app/user/collect/{value}"
    };
  }
}

// 收藏状态请求参数
message IsCollectRequest{
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID
}

// 用户收藏分页查询条件
message PageUserCollectRequest{

  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ]; // 当前页码

  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ]; // 每一页的行数
}

// 用户收藏分页响应
message PageUserCollectResponse {
  repeated UserCollect list = 1 [
    (gnostic.openapi.v3.property) = {description: "数据"}
  ]; // 数据
  int32 total = 2 [
    (gnostic.openapi.v3.property) = {description: "总数"}
  ]; // 总数
}

// UserCollect表单
message UserCollectForm {
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品id"}
  ];  // 商品id

  RecommendContext recommendContext = 2 [
    (gnostic.openapi.v3.property) = {description: "推荐上下文"}
  ];  // 推荐上下文
}

// UserCollect
message UserCollect {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户收藏ID"}
  ];  // 用户收藏ID

  int64 goodsId = 2 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "名称"}
  ];  // 名称

  string desc = 4 [
    (gnostic.openapi.v3.property) = {description: "描述"}
  ]; // 描述

  string picture = 30 [
    (gnostic.openapi.v3.property) = {description: "商品图片"}
  ]; // 商品图片

  int64 saleNum = 40 [
    (gnostic.openapi.v3.property) = { description: "初始销量" }
  ]; // 销量

  int64 price = 41 [
    (gnostic.openapi.v3.property) = { description: "价格" }
  ]; // 价格

  int64 joinPrice = 50 [
    (gnostic.openapi.v3.property) = { description: "加入时价格" }
  ]; // 加入时价格
}
