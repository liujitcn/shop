syntax = "proto3";

package app;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "app/user_address.proto";
import "app/recommend.proto";

import "common/enum.proto";

// App订单信息服务
service OrderInfoService {

  // 确认订单信息
  rpc ConfirmOrderInfo (google.protobuf.Empty) returns (ConfirmOrderInfoResponse) {
    option (google.api.http) = {
      post: "/api/app/order/confirm"
      body: "*"
    };
  }

  // 立即购买订单信息
  rpc BuyNowOrderInfo (BuyNowOrderInfoRequest) returns (BuyNowOrderInfoResponse) {
    option (google.api.http) = {
      post: "/api/app/order/confirm/buy-now"
      body: "*"
    };
  }

  // 再次购买订单信息
  rpc RepurchaseOrderInfo (RepurchaseOrderInfoRequest) returns (RepurchaseOrderInfoResponse) {
    option (google.api.http) = {
      post: "/api/app/order/confirm/repurchase"
      body: "*"
    };
  }

  // 查询订单信息数量汇总
  rpc CountOrderInfo (google.protobuf.Empty) returns (CountOrderInfoResponse) {
    option (google.api.http) = {
      get: "/api/app/order/info/count"
    };
  }

  // 查询订单信息分页列表
  rpc PageOrderInfo (PageOrderInfoRequest) returns (PageOrderInfoResponse) {
    option (google.api.http) = {
      get: "/api/app/order/info"
    };
  }

  // 根据订单信息编号查询订单信息id
  rpc GetOrderInfoIdByOrderNo (google.protobuf.StringValue) returns (google.protobuf.Int64Value) {
    option (google.api.http) = {
      get: "/api/app/order/info/no/{value}"
    };
  }

  // 根据订单信息id查询订单信息
  rpc GetOrderInfoById (google.protobuf.Int64Value) returns (OrderInfoResponse) {
    option (google.api.http) = {
      get: "/api/app/order/info/{value}"
    };
  }

  // 创建订单信息
  rpc CreateOrderInfo (CreateOrderInfoRequest) returns (CreateOrderInfoResponse) {
    option (google.api.http) = {
      post: "/api/app/order/info"
      body: "*"
    };
  }

  // 删除订单信息
  rpc DeleteOrderInfo (google.protobuf.Int64Value) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/app/order/info/{value}"
    };
  }

  // 取消订单信息
  rpc CancelOrderInfo (CancelOrderInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/app/order/info/{order_id}/cancellation"
      body: "*"
    };
  }

  // 订单信息退款
  rpc RefundOrderInfo (RefundOrderInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/app/order/info/{order_id}/refund"
      body: "*"
    };
  }

  // 确认收货
  rpc ReceiveOrderInfo (ReceiveOrderInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/app/order/info/{order_id}/receipt"
      body: "*"
    };
  }
}

// 立即购买订单请求参数
message BuyNowOrderInfoRequest {
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品id"}
  ];  // 商品id
  string skuCode = 2 [
    (gnostic.openapi.v3.property) = {description: "规格编号"}
  ];  // 规格编号
  int64 num = 3 [
    (gnostic.openapi.v3.property) = {description: "数量"}
  ]; // 数量

  RecommendContext recommendContext = 4 [
    (gnostic.openapi.v3.property) = {description: "推荐上下文"}
  ];  // 推荐上下文
}

// 下单商品
message CreateOrderInfoGoods {
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品id"}
  ];  // 商品id
  string skuCode = 2 [
    (gnostic.openapi.v3.property) = {description: "规格编号"}
  ];  // 规格编号
  int64 num = 3 [
    (gnostic.openapi.v3.property) = {description: "数量"}
  ]; // 数量

  RecommendContext recommendContext = 4 [
    (gnostic.openapi.v3.property) = {description: "推荐上下文"}
  ];  // 推荐上下文
}

// 确认订单响应
message ConfirmOrderInfoResponse {
  repeated OrderGoods goods = 1 [
    (gnostic.openapi.v3.property) = {description: "商品信息"}
  ]; // 商品信息
  OrderSummary summary = 2 [
    (gnostic.openapi.v3.property) = {description: "汇总信息"}
  ]; // 汇总信息

  bool clearCart = 3 [
    (gnostic.openapi.v3.property) = {description: "是否清空购物车"}
  ]; // 是否清空购物车
}

// 立即购买订单响应
message BuyNowOrderInfoResponse {
  repeated OrderGoods goods = 1 [
    (gnostic.openapi.v3.property) = {description: "商品信息"}
  ]; // 商品信息
  OrderSummary summary = 2 [
    (gnostic.openapi.v3.property) = {description: "汇总信息"}
  ]; // 汇总信息

  bool clearCart = 3 [
    (gnostic.openapi.v3.property) = {description: "是否清空购物车"}
  ]; // 是否清空购物车
}

// 再次购买订单请求参数
message RepurchaseOrderInfoRequest {
  int64 orderId = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id
}

// 再次购买订单响应
message RepurchaseOrderInfoResponse {
  repeated OrderGoods goods = 1 [
    (gnostic.openapi.v3.property) = {description: "商品信息"}
  ]; // 商品信息
  OrderSummary summary = 2 [
    (gnostic.openapi.v3.property) = {description: "汇总信息"}
  ]; // 汇总信息

  bool clearCart = 3 [
    (gnostic.openapi.v3.property) = {description: "是否清空购物车"}
  ]; // 是否清空购物车
}

// 订单数量汇总响应
message CountOrderInfoResponse {
  // 订单数量统计项
  message Count {
    common.OrderStatus status = 1 [
      (gnostic.openapi.v3.property) = {
        description: "订单状态",
      }
    ]; // 订单状态
    int32 num = 2 [
      (gnostic.openapi.v3.property) = {
        description: "订单数量",
      }
    ]; // 订单数量
  }

  repeated Count count = 1 [
    (gnostic.openapi.v3.property) = {description: "总数"}
  ]; // 总数
}

// 订单分页查询条件
message PageOrderInfoRequest{
  common.OrderStatus status = 1 [
    (gnostic.openapi.v3.property) = {
      description: "订单状态",
    }
  ]; // 订单状态

  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ]; // 当前页码

  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ]; // 每一页的行数
}

// 订单分页响应
message PageOrderInfoResponse{
  repeated OrderInfo list = 1 [
    (gnostic.openapi.v3.property) = {description: "分页数据"}
  ]; // 分页数据
  int32 total = 2 [
    (gnostic.openapi.v3.property) = {description: "总数"}
  ]; // 总数
}

// 订单详情响应
message OrderInfoResponse {
  // 收货地址
  message Address {
    string receiver = 1 [
      (gnostic.openapi.v3.property) = {description: "联系人"}
    ];  // 联系人
    string contact = 2 [
      (gnostic.openapi.v3.property) = {description: "联系方式"}
    ];  // 联系方式
    repeated string address = 3 [
      (gnostic.openapi.v3.property) = {description: "省市区全部"}
    ];  // 省市区全部
    string detail = 4 [
      (gnostic.openapi.v3.property) = {description: "详细地址"}
    ];  // 详细地址
  }

  // 物流信息
  message Logistics {
    // Detail
    message Detail {
      string time = 1 [
        (gnostic.openapi.v3.property) = {description: "时间"}
      ];  // 时间
      string text = 2 [
        (gnostic.openapi.v3.property) = {description: "动态"}
      ];  // 动态
    }

    string name = 1 [
      (gnostic.openapi.v3.property) = {description: "物流公司名"}
    ];  // 物流公司名
    string no = 2 [
      (gnostic.openapi.v3.property) = {description: "单号"}
    ];  // 单号
    string contact = 3 [
      (gnostic.openapi.v3.property) = {description: "联系方式"}
    ];  // 联系方式
    repeated Detail detail = 4 [
      (gnostic.openapi.v3.property) = {description: "物流详情"}
    ];  // 物流详情
  }
  OrderInfo order = 1 [
    (gnostic.openapi.v3.property) = {description: "订单信息"}
  ];  // 订单信息
  Address address = 2 [
    (gnostic.openapi.v3.property) = {description: "地址信息"}
  ];  // 地址信息
  Logistics logistics = 3 [
    (gnostic.openapi.v3.property) = {description: "物流信息"}
  ];  // 物流信息

  float countdown = 4 [
    (gnostic.openapi.v3.property) = {description: "支付倒计时"}
  ];  // 支付倒计时
}
// 创建订单请求参数
message CreateOrderInfoRequest {
  int64 addressId = 1 [
    (gnostic.openapi.v3.property) = {description: "地址id"}
  ];  // 地址id

  bool clearCart = 3 [
    (gnostic.openapi.v3.property) = {description: "是否清空购物车"}
  ]; // 是否清空购物车

  common.OrderPayType payType = 8 [
    (gnostic.openapi.v3.property) = { description: "支付方式：枚举【OrderPayType】" }
  ];  // 支付方式：枚举【OrderPayType】

  common.OrderPayChannel payChannel = 9 [
    (gnostic.openapi.v3.property) = { description: "支付渠道：枚举【OrderPayChannel】" }
  ];  // 支付渠道：枚举【OrderPayChannel】

  common.OrderDeliveryTime deliveryTime = 10 [
    (gnostic.openapi.v3.property) = { description: "配送时间：枚举【OrderDeliveryTime】" }
  ];  // 配送时间：枚举【OrderDeliveryTime】

  string remark = 20 [
    (gnostic.openapi.v3.property) = {description: "订单备注"}
  ]; // 订单备注

  repeated CreateOrderInfoGoods goods = 40 [
    (gnostic.openapi.v3.property) = {description: "商品信息"}
  ]; // 商品信息
}

// 创建订单响应
message CreateOrderInfoResponse {
  int64 orderId = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id
}

// 取消订单请求参数
message CancelOrderInfoRequest {
  int64 order_id = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id
  common.OrderCancelReason reason = 2 [
    (gnostic.openapi.v3.property) = {description: "取消原因"}
  ]; // 取消原因
}

// 订单退款请求参数
message RefundOrderInfoRequest {
  int64 order_id = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id
  common.OrderRefundReason reason = 2 [
    (gnostic.openapi.v3.property) = {description: "退款原因"}
  ]; // 退款原因
}

// 确认收货请求参数
message ReceiveOrderInfoRequest {
  int64 order_id = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id
}


// 订单商品
message OrderGoods {
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID

  string skuCode = 2 [
    (gnostic.openapi.v3.property) = {description: "规格编号"}
  ];  // 规格编号

  repeated string specItem = 3 [
    (gnostic.openapi.v3.property) = {description: "规格描述"}
  ]; // 规格描述

  string picture = 4 [
    (gnostic.openapi.v3.property) = {description: "商品图片"}
  ];  // 商品图片

  string name = 5 [
    (gnostic.openapi.v3.property) = {description: "名称"}
  ];  // 名称

  int64 num = 6 [
    (gnostic.openapi.v3.property) = {description: "数量"}
  ]; // 数量

  int64 price = 41 [
    (gnostic.openapi.v3.property) = { description: "价格" }
  ]; // 价格

  int64 payPrice = 40 [
    (gnostic.openapi.v3.property) = { description: "支付价格" }
  ]; // 支付价格

  int64 totalPrice = 42 [
    (gnostic.openapi.v3.property) = { description: "当前金额汇总" }
  ]; // 当前金额汇总

  int64 totalPayPrice = 43 [
    (gnostic.openapi.v3.property) = { description: "支付金额汇总" }
  ]; // 支付金额汇总

  common.RecommendScene scene = 45 [
    (gnostic.openapi.v3.property) = {description: "推荐场景"}
  ]; // 推荐场景

  string requestId = 46 [
    (gnostic.openapi.v3.property) = {description: "推荐请求ID"}
  ]; // 推荐请求ID

  int32 position = 47 [
    (gnostic.openapi.v3.property) = {description: "推荐位序号"}
  ]; // 推荐位序号
}

// Order信息
message OrderInfo {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "订单id"}
  ];  // 订单id

  string orderNo = 2 [
    (gnostic.openapi.v3.property) = {description: "订单编号"}
  ];  // 订单编号

  int64 payMoney = 4 [
    (gnostic.openapi.v3.property) = {description: "实际支付金额"}
  ];  // 实际支付金额

  int64 totalMoney = 5 [
    (gnostic.openapi.v3.property) = {description: "总价"}
  ];  // 总价

  int64 postFee = 6 [
    (gnostic.openapi.v3.property) = {description: "优惠金额"}
  ];  // 优惠金额

  int64 goodsNum = 7 [
    (gnostic.openapi.v3.property) = {description: "商品总数"}
  ];  // 商品总数

  common.OrderPayType payType = 8 [
    (gnostic.openapi.v3.property) = { description: "支付方式：枚举【OrderPayType】" }
  ];  // 支付方式：枚举【OrderPayType】

  common.OrderPayChannel payChannel = 9 [
    (gnostic.openapi.v3.property) = { description: "支付渠道：枚举【OrderPayChannel】" }
  ];  // 支付渠道：枚举【OrderPayChannel】

  common.OrderDeliveryTime DeliveryTime = 10 [
    (gnostic.openapi.v3.property) = { description: "配送时间：枚举【OrderDeliveryTime】" }
  ];  // 配送时间：枚举【OrderDeliveryTime】

  common.OrderStatus status = 11 [
    (gnostic.openapi.v3.property) = { description: "状态：枚举【OrderStatus】" }
  ];  // 状态：枚举【OrderStatus】

  string remark = 12 [
    (gnostic.openapi.v3.property) = { description: "订单备注" }
  ];  // 订单备注

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ]; // 创建时间

  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间


  string paymentTime = 301 [
    (gnostic.openapi.v3.property) = {description: "支付时间"}
  ]; // 支付时间

  string cancelTime = 302 [
    (gnostic.openapi.v3.property) = {description: "取消时间"}
  ]; // 取消时间

  string refundTime = 303 [
    (gnostic.openapi.v3.property) = {description: "退款时间"}
  ]; // 退款时间

  repeated OrderGoods goods = 400 [
    (gnostic.openapi.v3.property) = {description: "商品信息"}
  ]; // 商品信息
}

// Order汇总
message OrderSummary {
  int64 payMoney = 1 [
    (gnostic.openapi.v3.property) = {description: "实际支付金额"}
  ];  // 实际支付金额

  int64 totalMoney = 2 [
    (gnostic.openapi.v3.property) = {description: "总价"}
  ];  // 总价

  int64 postFee = 3 [
    (gnostic.openapi.v3.property) = {description: "优惠金额"}
  ];  // 优惠金额

  int64 goodsNum = 4 [
    (gnostic.openapi.v3.property) = {description: "商品总数"}
  ];  // 商品总数
}
