syntax = "proto3";

package app;

import "app/goods_info.proto";
import "common/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

// App推荐服务
service RecommendService {
  // 获取匿名推荐主体
  rpc RecommendAnonymousActor (google.protobuf.Empty) returns (google.protobuf.Int64Value) {
    option (google.api.http) = {
      get: "/api/app/recommend/actor/anonymous"
    };
  }

  // 绑定匿名推荐主体到当前登录用户
  rpc BindRecommendAnonymousActor (google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/app/recommend/actor/binding"
      body: "*"
    };
  }

  // 查询推荐商品列表
  rpc RecommendGoods (RecommendGoodsRequest) returns (RecommendGoodsResponse) {
    option (google.api.http) = {
      get: "/api/app/recommend/goods"
    };
  }

  // 上报推荐事件
  rpc RecommendEventReport (RecommendEventReportRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/app/recommend/event"
      body: "*"
    };
  }
}

// 推荐商品请求参数
message RecommendGoodsRequest {
  common.RecommendScene scene = 1 [
    (gnostic.openapi.v3.property) = {
      description: "推荐场景",
    }
  ];  // 推荐场景

  int64 orderId = 2 [
    (gnostic.openapi.v3.property) = {
      description: "订单ID",
    }
  ];  // 订单ID

  int64 goodsId = 3 [
    (gnostic.openapi.v3.property) = {
      description: "商品ID",
    }
  ];  // 商品ID

  int64 requestId = 4 [
    (gnostic.openapi.v3.property) = {
      description: "推荐请求ID",
    }
  ];  // 推荐请求ID

  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];  // 当前页码

  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每页数量",
      default: {number: 10}
    }
  ];  // 每页数量
}

// 推荐商品响应
message RecommendGoodsResponse {
  repeated app.GoodsInfo list = 1 [
    (gnostic.openapi.v3.property) = {description: "推荐商品列表"}
  ]; // 推荐商品列表

  int32 total = 2 [
    (gnostic.openapi.v3.property) = {
      description: "总数",
    }
  ];  // 总数

  int64 requestId = 3 [
    (gnostic.openapi.v3.property) = {
      description: "推荐请求ID",
    }
  ];  // 推荐请求ID
}

// 推荐请求上下文
message RecommendRequestContext {
  reserved 4;
  reserved "context_source";

  int64 goods_id = 1 [
    json_name = "goods_id",
    (gnostic.openapi.v3.property) = {description: "当前推荐请求的锚点商品编号"}
  ];  // 当前推荐请求的锚点商品编号

  int64 order_id = 2 [
    json_name = "order_id",
    (gnostic.openapi.v3.property) = {description: "当前推荐请求关联的订单编号"}
  ];  // 当前推荐请求关联的订单编号

  repeated int64 context_goods_ids = 3 [
    json_name = "context_goods_ids",
    (gnostic.openapi.v3.property) = {description: "当前推荐计算使用的上下文商品编号列表"}
  ];  // 当前推荐计算使用的上下文商品编号列表

  common.RecommendRequestStrategyType strategy_type = 5 [
    json_name = "strategy_type",
    (gnostic.openapi.v3.property) = {description: "当前命中的本地兜底策略"}
  ];  // 当前命中的本地兜底策略

  common.RecommendRequestSource source = 6 [
    (gnostic.openapi.v3.property) = {description: "当前结果来源"}
  ];  // 当前结果来源

  common.RecommendRequestStatus status = 7 [
    (gnostic.openapi.v3.property) = {description: "当前请求执行状态"}
  ];  // 当前请求执行状态
}

// 推荐上下文
message RecommendContext {
  common.RecommendScene scene = 1 [
    (gnostic.openapi.v3.property) = {description: "推荐场景"}
  ];  // 推荐场景

  int64 requestId = 2 [
    (gnostic.openapi.v3.property) = {description: "推荐请求ID"}
  ];  // 推荐请求ID

  int32 position = 3 [
    (gnostic.openapi.v3.property) = {description: "推荐位序号"}
  ];  // 推荐位序号
}

// 推荐事件归因上下文
message RecommendEventContext {
  common.RecommendScene scene = 1 [
    (gnostic.openapi.v3.property) = {description: "推荐场景"}
  ];  // 推荐场景

  int64 requestId = 2 [
    (gnostic.openapi.v3.property) = {description: "推荐请求ID"}
  ];  // 推荐请求ID
}

// 推荐事件商品项
message RecommendEventItem {
  int64 goodsId = 1 [
    (gnostic.openapi.v3.property) = {description: "商品ID"}
  ];  // 商品ID

  int64 goodsNum = 2 [
    (gnostic.openapi.v3.property) = {description: "商品数量"}
  ];  // 商品数量

  int32 position = 3 [
    (gnostic.openapi.v3.property) = {description: "推荐位序号"}
  ];  // 推荐位序号
}

// 推荐事件上报请求参数
message RecommendEventReportRequest {
  common.RecommendEventType eventType = 1 [
    (gnostic.openapi.v3.property) = {description: "推荐事件类型"}
  ];  // 推荐事件类型

  RecommendEventContext recommendContext = 2 [
    (gnostic.openapi.v3.property) = {description: "推荐归因上下文"}
  ];  // 推荐归因上下文

  repeated RecommendEventItem items = 3 [
    (gnostic.openapi.v3.property) = {description: "推荐事件商品项"}
  ];  // 推荐事件商品项
}

// 推荐主体信息
message RecommendActor {
  common.RecommendActorType ActorType = 1 [
    (gnostic.openapi.v3.property) = {description: "推荐主体类型"}
  ];  // 推荐主体类型
  int64 ActorId = 2 [
    (gnostic.openapi.v3.property) = {description: "推荐主体类型"}
  ];  // 推荐主体ID
}
