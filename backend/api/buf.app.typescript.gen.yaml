# 配置 app 端 protoc 生成规则
version: v2

clean: true

managed:
  enabled: true

  disable:
    - module: 'buf.build/googleapis/googleapis'
    - module: 'buf.build/envoyproxy/protoc-gen-validate'
    - module: 'buf.build/kratos/apis'
    - module: 'buf.build/gnostic/gnostic'
    - module: 'buf.build/gogo/protobuf'

plugins:
  - local: protoc-gen-ts_proto
    out: ../../frontend/app/src/rpc
    opt:
      - outputSchema=false
      - outputTypeRegistry=false
      - outputTypeAnnotations=false
      - outputServices=default
      - outputJsonMethods=false
      - outputEncodeMethods=false
      - outputPartialMethods=false
      - outputClientImpl=false
      - useExactTypes=true
      - usePrototypeForDefaults=true
      - useJsonName=false
      - snakeToCamel=false
      - useNullAsOptional=false
      - useDate=false
      - useOptionals=none
      - useMapType=true
      - useReadonlyTypes=false
      - nestJs=false
      - onlyTypes=false
      - fileSuffix=
      - enumsAsLiterals=false
      - comments=true
      - exportCommonSymbols=false
      - esModuleInterop=true
      - oneof=unions
      - stringEnums=false
      - useJsonWireFormat=false
      - unrecognizedEnum=false
      - outputIndex=false
      - paths=source_relative
