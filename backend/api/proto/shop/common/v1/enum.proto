syntax = "proto3";

package shop.common.v1;

// 商城工作台 SSE 刷新目标枚举
enum SseRefreshTarget {
  SSE_REFRESH_TARGET_UNSPECIFIED = 0; // 未指定 SSE 刷新目标
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_METRICS = 1; // 管理后台工作台顶部指标区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_TODO = 2; // 管理后台工作台待处理事项区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_RISK = 3; // 管理后台工作台风险提醒区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_REPUTATION = 4; // 管理后台工作台口碑洞察区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_PENDING_COMMENTS = 5; // 管理后台工作台待审核评价区域
}

// 商城工作台 SSE 刷新原因枚举
enum SseRefreshReason {
  SSE_REFRESH_REASON_UNSPECIFIED = 0; // 未指定 SSE 刷新原因
  SSE_REFRESH_REASON_ORDER_CHANGED = 1; // 订单状态或金额口径发生变化
  SSE_REFRESH_REASON_GOODS_CHANGED = 2; // 商品、SKU、库存或价格口径发生变化
  SSE_REFRESH_REASON_COMMENT_CHANGED = 3; // 评价或评价讨论口径发生变化
  SSE_REFRESH_REASON_PAY_BILL_CHECKED = 4; // 支付账单对账结果发生变化
}

// Gorse 推荐高级调试数据类型
enum AdvanceDataType {
  UNKNOWN_RRADT = 0; // 未知数据类型
  USER_RRADT = 1; // 用户数据
  ITEM_RRADT = 2; // 商品数据
  FEEDBACK_RRADT = 3; // 反馈数据
}

// 用户门店审核状态
enum UserStoreStatus {
  UNKNOWN_USS = 0;
  PENDING_REVIEW = 1; // 待审核
  FAILED_REVIEW = 2; // 审核失败
  APPROVED = 3; // 审核通过
}

// 租户门店审核状态
enum TenantStoreStatus {
  UNKNOWN_TSS = 0;
  PENDING_REVIEW_TSS = 1; // 待审核
  FAILED_REVIEW_TSS = 2; // 审核失败
  APPROVED_TSS = 3; // 审核通过
}

// 商品状态
enum GoodsStatus {
  UNKNOWN_GS = 0;
  PUT_ON = 1; // 已上架
  PULL_OFF = 2; // 已下架
  DISABLED_BY_STORE = 3; // 门店禁用
}

// 商品库存预警类型
enum GoodsInventoryAlert {
  UNKNOWN_GIA = 0;
  LOW_STOCK = 1; // 低库存
  ZERO_STOCK = 2; // 零库存
}

// 商品价格异常类型
enum GoodsPriceAlert {
  UNKNOWN_GPA = 0;
  PRICE_CONFIG_ABNORMAL = 1; // 价格配置异常
}

// 交易支付状态
enum OrderTradeStatus {
  UNKNOWN_OTS = 0;
  PENDING_PAYMENT_OTS = 1; // 待支付
  PAYING_OTS = 2; // 支付中
  PAID_OTS = 3; // 已支付
  CASH_ON_DELIVERY_OTS = 4; // 货到付款
  CLOSED_OTS = 5; // 已关闭
  PARTIAL_REFUND_OTS = 6; // 部分退款
  FULL_REFUND_OTS = 7; // 全额退款
}

// 订单履约状态
enum OrderInfoStatus {
  UNKNOWN_OIS = 0;
  NOT_STARTED_OIS = 1; // 未进入履约
  WAIT_SHIPMENT_OIS = 2; // 待发货
  SHIPPED_OIS = 3; // 已发货
  WAIT_REVIEW_OIS = 4; // 待评价
  COMPLETED_OIS = 5; // 已完成
  CANCELED_OIS = 6; // 已取消
}

// 订单退款状态
enum OrderRefundStatus {
  UNKNOWN_ORS = 0;
  NONE_ORS = 1; // 无退款
  PROCESSING_ORS = 2; // 处理中
  PARTIAL_REFUND_ORS = 3; // 部分退款
  REFUNDED_ORS = 4; // 已退款
  CLOSED_OR_FAILED_ORS = 5; // 已关闭/失败
}

// 订单支付方式
enum OrderPayType {
  UNKNOWN_OPT = 0;
  ONLINE_PAY = 1; // 在线支付
  CASH_ON_DELIVERY = 2; // 货到付款
}

// 订单支付渠道
enum OrderPayChannel {
  UNKNOWN_OPC = 0;
  WX_PAY = 1; // 微信支付
  UNION_PAY = 2; // 银联支付
}

// 订单配送时间
enum OrderDeliveryTime {
  UNKNOWN_ODT = 0;
  ALL_TIME = 1; // 时间不限 (周一至周日)
  WEEKDAY = 2; // 工作日送 (周一至周五)
  WEEKEND = 3; // 周末配送 (周六至周日)
}

// 订单取消原因
enum OrderCancelReason {
  UNKNOWN_OCR = 0;
  CANCEL_GOODS_NO_STOCK = 1; // 商品无货
  CANCEL_SELF = 2; // 不想要了
  CANCEL_GOODS_ERROR = 3; // 商品信息填错了
  CANCEL_ADDRESS_ERROR = 4; // 地址信息填写错误
  CANCEL_GOODS_DISCOUNT = 5; // 商品降价
  CANCEL_OTHER = 6; // 其它
}

// 订单对帐状态
enum OrderBillStatus {
  UNKNOWN_OBS = 0;
  NO_CHECK = 1; // 未对账
  CHECK_SUCCESS = 2; // 对账成功
  CHECK_FAIL = 3; // 对账失败
}

// 订单退款原因
enum OrderRefundReason {
  UNKNOWN_ORR = 0;
  REFUND_GOODS_NO_STOCK = 1; // 商品无货
  REFUND_SELF = 2; // 不想要了
  REFUND_GOODS_ERROR = 3; // 商品信息填错了
  REFUND_ADDRESS_ERROR = 4; // 地址信息填写错误
  REFUND_GOODS_DISCOUNT = 5; // 商品降价
  REFUND_OTHER = 6; // 其它
}

// 轮播图位置
enum ShopBannerSite {
  UNKNOWN_SBS = 0;
  INDEX = 1; // 首页
  CATEGORY = 2; // 分类页
}

// 轮播图类型
enum ShopBannerType {
  UNKNOWN_SBT = 0;
  BANNER_GOODS_DETAIL = 1; // 商品详情
  CATEGORY_DETAIL = 2; // 分类详情
  WEB_VIEW = 3; // H5链接
  MINI = 4; // 其他小程序
}

// 支付对账单状态
enum PayBillStatus {
  UNKNOWN_PBS = 0;
  NO_COMPARE = 1; // 未比对
  NO_ERROR = 2; // 无误差
  HAS_ERROR = 3; // 有误差
}

// 推荐场景枚举
enum RecommendScene {
  UNKNOWN_RS = 0; // 未指定推荐场景
  HOME = 1; // 首页推荐场景
  GOODS_DETAIL = 2; // 商品详情推荐场景
  CART = 3; // 购物车推荐场景
  PROFILE = 4; // 个人中心推荐场景
  ORDER_DETAIL = 5; // 订单详情推荐场景
  ORDER_PAID = 6; // 支付成功推荐场景
}

// 推荐主体类型枚举
enum RecommendActorType {
  UNKNOWN_RAT = 0; // 未指定推荐主体类型
  ANONYMOUS_ACTOR = 1; // 匿名推荐主体
  USER_ACTOR = 2; // 登录用户推荐主体
}

// 推荐策略枚举
enum RecommendStrategy {
  UNKNOWN_RST = 0; // 未指定推荐策略
  REMOTE_STRATEGY = 1; // Gorse 推荐策略
  LOCAL_STRATEGY = 2; // 本地同类目推荐策略
}

// 推荐事件类型枚举
enum RecommendEventType {
  UNKNOWN_RET = 0; // 未指定推荐事件类型
  EXPOSURE = 1; // 推荐曝光事件
  CLICK = 2; // 推荐点击事件
  VIEW = 3; // 商品浏览事件
  COLLECT = 4; // 商品收藏事件
  ADD_CART = 5; // 商品加购事件
  ORDER_CREATE = 6; // 下单事件
  ORDER_PAY = 7; // 支付事件
}

// 评价审核状态
enum CommentStatus {
  UNKNOWN_CS = 0; // 未知评价审核状态
  PENDING_REVIEW_CS = 1; // 待审核
  APPROVED_CS = 2; // 审核通过
  REJECTED_CS = 3; // 审核不通过
}

// 评价审核记录目标类型
enum CommentReviewTargetType {
  COMMENT_REVIEW_TARGET_TYPE_UNSPECIFIED = 0; // 未知审核目标类型
  COMMENT_REVIEW_TARGET_TYPE_COMMENT = 1; // 评论
  COMMENT_REVIEW_TARGET_TYPE_DISCUSSION = 2; // 讨论
}

// 评价审核记录审核类型
enum CommentReviewType {
  COMMENT_REVIEW_TYPE_UNSPECIFIED = 0; // 未知审核类型
  COMMENT_REVIEW_TYPE_AI = 1; // AI审核
  COMMENT_REVIEW_TYPE_MANUAL = 2; // 人工审核
}

// 评价审核记录结果
enum CommentReviewStatus {
  COMMENT_REVIEW_STATUS_UNSPECIFIED = 0; // 未知审核结果
  COMMENT_REVIEW_STATUS_APPROVED = 1; // 通过
  COMMENT_REVIEW_STATUS_REJECTED = 2; // 不通过
  COMMENT_REVIEW_STATUS_EXCEPTION = 3; // 异常
}

// 评价摘要场景
enum CommentSummaryScene {
  COMMENT_SUMMARY_SCENE_UNSPECIFIED = 0; // 未知评价摘要场景
  OVERVIEW = 1; // 商品详情摘要
  LIST = 2; // 评价列表摘要
}

// 评价互动目标类型
enum CommentReactionTargetType {
  UNKNOWN_CRTT = 0; // 未知目标
  COMMENT = 1; // 评论
  DISCUSSION = 2; // 讨论
  SUMMARY = 3; // 评价摘要
}

// 评价互动类型
enum CommentReactionType {
  UNKNOWN_CRT = 0; // 未知互动
  LIKE = 1; // 点赞
  DISLIKE = 2; // 点踩
}

// 评价筛选类型
enum CommentFilterType {
  COMMENT_FILTER_ALL = 0; // 全部
  COMMENT_FILTER_MEDIA = 1; // 有图
  COMMENT_FILTER_GOOD = 2; // 好评
  COMMENT_FILTER_MIDDLE = 3; // 中评
  COMMENT_FILTER_BAD = 4; // 差评
  COMMENT_FILTER_TAG = 5; // 内容标签
}

// 评价排序类型
enum CommentSortType {
  COMMENT_SORT_DEFAULT = 0; // 默认推荐排序
  COMMENT_SORT_LATEST = 1; // 最新排序
}
