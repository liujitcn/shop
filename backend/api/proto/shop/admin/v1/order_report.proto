syntax = "proto3";

package shop.admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";

// Admin订单报表服务
service OrderReportService {
  // 查询订单日报明细
  rpc ListOrderDayReport(ListOrderDayReportRequest) returns (ListOrderDayReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/order/day"
    };
  }

  // 查询订单月报明细
  rpc ListOrderMonthReport(ListOrderMonthReportRequest) returns (ListOrderMonthReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/order/month"
    };
  }

  // 查询订单月报汇总
  rpc SummaryOrderMonthReport(SummaryOrderMonthReportRequest) returns (SummaryOrderMonthReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/order/month/summary"
    };
  }

  // 查询订单日报汇总
  rpc SummaryOrderDayReport(SummaryOrderDayReportRequest) returns (SummaryOrderDayReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/report/order/day/summary"
    };
  }
}

// 订单日报列表请求参数
message ListOrderDayReportRequest {
  option (buf.validate.message).cel = {id: "list_order_day_report.date.range" message: "结束日期不能早于开始日期" expression: "this.end_date >= this.start_date"};

  optional int64 tenant_id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
  optional int64 tenant_store_id = 2 [(gnostic.openapi.v3.property) = {description: "租户门店ID"}]; // 租户门店ID
  string start_date = 3 [
    (gnostic.openapi.v3.property) = {description: "开始日期，格式：YYYY-MM-DD"},
    (buf.validate.field).cel = {id: "list_order_day_report.start_date.format" message: "开始日期格式错误" expression: "this.matches('^[0-9]{4}-[0-9]{2}-[0-9]{2}$')"}
  ]; // 开始日期，格式：YYYY-MM-DD
  string end_date = 4 [
    (gnostic.openapi.v3.property) = {description: "结束日期，格式：YYYY-MM-DD"},
    (buf.validate.field).cel = {id: "list_order_day_report.end_date.format" message: "结束日期格式错误" expression: "this.matches('^[0-9]{4}-[0-9]{2}-[0-9]{2}$')"}
  ]; // 结束日期，格式：YYYY-MM-DD
  int32 pay_type = 5 [
    (gnostic.openapi.v3.property) = {description: "支付方式：枚举【OrderPayType】，0 表示全部"}
  ]; // 支付方式：枚举【OrderPayType】，0 表示全部
  int32 pay_channel = 6 [
    (gnostic.openapi.v3.property) = {description: "支付渠道：枚举【OrderPayChannel】，0 表示全部"}
  ]; // 支付渠道：枚举【OrderPayChannel】，0 表示全部
}

// 订单日报列表响应
message ListOrderDayReportResponse {
  repeated OrderDayReportItem order_day_reports = 1 [(gnostic.openapi.v3.property) = {description: "日报明细"}]; // 日报明细
}

// 订单月报列表请求参数
