// 订单月报汇总响应
message SummaryOrderMonthReportResponse {
  int64 paid_order_count = 1 [
    (gnostic.openapi.v3.property) = {description: "支付成功订单数"}
  ]; // 支付成功订单数
  int64 paid_order_amount = 2 [
    (gnostic.openapi.v3.property) = {description: "支付成功金额，单位分"}
  ]; // 支付成功金额，单位分
  int64 refund_order_count = 3 [
    (gnostic.openapi.v3.property) = {description: "退款成功订单数"}
  ]; // 退款成功订单数
  int64 refund_order_amount = 4 [
    (gnostic.openapi.v3.property) = {description: "退款成功金额，单位分"}
  ]; // 退款成功金额，单位分
  int64 net_order_amount = 5 [
    (gnostic.openapi.v3.property) = {description: "净销售额，单位分"}
  ]; // 净销售额，单位分
  int64 paid_user_count = 6 [
    (gnostic.openapi.v3.property) = {description: "支付用户数"}
  ]; // 支付用户数
  int64 goods_count = 7 [
    (gnostic.openapi.v3.property) = {description: "商品件数"}
  ]; // 商品件数
  int64 customer_unit_price = 8 [
    (gnostic.openapi.v3.property) = {description: "客单价，单位分"}
  ]; // 客单价，单位分
}

