  ]; // 结束月份，格式：YYYY-MM
  int32 pay_type = 5 [
    (gnostic.openapi.v3.property) = {description: "支付方式：枚举【OrderPayType】，0 表示全部"}
  ]; // 支付方式：枚举【OrderPayType】，0 表示全部
  int32 pay_channel = 6 [
    (gnostic.openapi.v3.property) = {description: "支付渠道：枚举【OrderPayChannel】，0 表示全部"}
  ]; // 支付渠道：枚举【OrderPayChannel】，0 表示全部
}

// 订单月报列表响应
message ListOrderMonthReportResponse {
  repeated OrderMonthReportItem order_month_reports = 1 [(gnostic.openapi.v3.property) = {description: "月报明细"}]; // 月报明细
