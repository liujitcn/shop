syntax = "proto3";

package shop.admin.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "buf/validate/validate.proto";

// Admin商品规格服务
service GoodsSpecService {
  // 查询商品规格列表
  rpc ListGoodsSpec(ListGoodsSpecRequest) returns (ListGoodsSpecResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/goods/spec"
    };
  }
}

// 商品规格列表查询条件
message ListGoodsSpecRequest {
  int64 goods_id = 1 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id
}

// 商品规格列表响应
message ListGoodsSpecResponse {
  repeated GoodsSpec goods_specs = 1 [(gnostic.openapi.v3.property) = {description: "商品规格列表"}]; // 商品规格列表
}

// 商品规格
message GoodsSpec {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "商品规格ID"}]; // 商品规格ID

  int64 goods_id = 2 [(gnostic.openapi.v3.property) = {description: "商品id"}]; // 商品id

  string name = 3 [(gnostic.openapi.v3.property) = {description: "商品规格名称"}, (buf.validate.field).cel = {id: "goods_spec.name.length" message: "商品规格名称不能为空且不超过 255 个字符" expression: "this.size() > 0 && this.size() <= 255"}]; // 商品规格名称

  repeated string item = 4 [(gnostic.openapi.v3.property) = {description: "商品规格内容"}, (buf.validate.field).cel = {id: "goods_spec.item.required" message: "商品规格内容不能为空" expression: "this.size() > 0"}]; // 商品规格内容

  int32 sort = 5 [(gnostic.openapi.v3.property) = {description: "排序"}, (buf.validate.field).cel = {id: "goods_spec.sort.required" message: "排序必须大于 0" expression: "this > 0"}]; // 排序
}
