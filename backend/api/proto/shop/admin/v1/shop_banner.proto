syntax = "proto3";

package shop.admin.v1;

import "common/v1/enum.proto";
import "buf/validate/validate.proto";
import "shop/common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin商城轮播图服务
service ShopBannerService {
  // 查询商城轮播图列表
  rpc PageShopBanner(PageShopBannerRequest) returns (PageShopBannerResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/banner"
    };
  }

  // 查询商城轮播图
  rpc GetShopBanner(GetShopBannerRequest) returns (ShopBannerForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/shop/banner/{id}"
    };
  }

  // 创建商城轮播图
  rpc CreateShopBanner(CreateShopBannerRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/shop/banner"
      body: "shop_banner"
    };
  }

  // 更新商城轮播图
  rpc UpdateShopBanner(UpdateShopBannerRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/banner/{id}"
      body: "shop_banner"
    };
  }

  // 删除商城轮播图
  rpc DeleteShopBanner(DeleteShopBannerRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/shop/banner/{ids}"
    };
  }

  // 设置状态
  rpc SetShopBannerStatus(SetShopBannerStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/shop/banner/{id}/status"
      body: "*"
    };
  }
}

// 轮播图列表查询条件
message PageShopBannerRequest {
  optional .shop.common.v1.ShopBannerSite site = 1 [(gnostic.openapi.v3.property) = {description: "位置：枚举【ShopBannerSite】"}]; // 位置：枚举【ShopBannerSite】

  optional .shop.common.v1.ShopBannerType type = 2 [(gnostic.openapi.v3.property) = {description: "跳转类型：枚举【ShopBannerType】"}]; // 跳转类型：枚举【ShopBannerType】

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 轮播图列表响应
message PageShopBannerResponse {
  repeated ShopBanner shop_banners = 1 [(gnostic.openapi.v3.property) = {description: "轮播图列表"}]; // 轮播图列表

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 轮播图详情查询条件
message GetShopBannerRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id
}

// 轮播图创建条件
message CreateShopBannerRequest {
  ShopBannerForm shop_banner = 1 [(gnostic.openapi.v3.property) = {description: "轮播图表单"}, (buf.validate.field).required = true]; // 轮播图表单
}

// 轮播图更新条件
message UpdateShopBannerRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id

  ShopBannerForm shop_banner = 2 [(gnostic.openapi.v3.property) = {description: "轮播图表单"}, (buf.validate.field).required = true]; // 轮播图表单
}

// 轮播图删除条件
message DeleteShopBannerRequest {
  string ids = 1 [(gnostic.openapi.v3.property) = {description: "轮播图ID列表，多个用逗号分隔"}]; // 轮播图ID列表，多个用逗号分隔
}

// 轮播图状态设置条件
message SetShopBannerStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id

  .common.v1.Status status = 2 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}]; // 状态：枚举【Status】
}

// 轮播图
message ShopBanner {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id

  .shop.common.v1.ShopBannerSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【ShopBannerSite】"}]; // 位置：枚举【ShopBannerSite】

  string picture = 3 [(gnostic.openapi.v3.property) = {description: "图片链接"}]; // 图片链接

  .shop.common.v1.ShopBannerType type = 4 [(gnostic.openapi.v3.property) = {description: "跳转类型：枚举【ShopBannerType】"}]; // 跳转类型：枚举【ShopBannerType】

  string href = 5 [(gnostic.openapi.v3.property) = {description: "跳转地址"}]; // 跳转地址

  int32 sort = 6 [(gnostic.openapi.v3.property) = {description: "排序"}]; // 排序

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间
}

// 轮播图表单
message ShopBannerForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "主键id"}]; // 主键id

  .shop.common.v1.ShopBannerSite site = 2 [(gnostic.openapi.v3.property) = {description: "位置：枚举【ShopBannerSite】"}, (buf.validate.field).enum = {defined_only: true}]; // 位置：枚举【ShopBannerSite】

  string picture = 3 [(gnostic.openapi.v3.property) = {description: "图片链接"}, (buf.validate.field).cel = {id: "shop_banner.picture.length" message: "图片链接不能为空且不超过 1024 个字符" expression: "this.size() > 0 && this.size() <= 1024"}]; // 图片链接

  .shop.common.v1.ShopBannerType type = 4 [(gnostic.openapi.v3.property) = {description: "跳转类型：枚举【ShopBannerType】"}, (buf.validate.field).enum = {defined_only: true}]; // 跳转类型：枚举【ShopBannerType】

  string href = 5 [(gnostic.openapi.v3.property) = {description: "跳转地址"}, (buf.validate.field).cel = {id: "shop_banner.href.length" message: "跳转地址不能为空且不超过 1024 个字符" expression: "this.size() > 0 && this.size() <= 1024"}]; // 跳转地址

  int32 sort = 6 [(gnostic.openapi.v3.property) = {description: "排序"}, (buf.validate.field).cel = {id: "shop_banner.sort.required" message: "排序必须大于 0" expression: "this > 0"}]; // 排序

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态：枚举【Status】"}, (buf.validate.field).enum = {defined_only: true}]; // 状态：枚举【Status】
}
