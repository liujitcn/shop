syntax = "proto3";

package system.admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin租户管理服务
service BaseTenantService {
  // 查询租户下拉选择
  rpc OptionBaseTenant(OptionBaseTenantRequest) returns (.common.v1.SelectOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/tenant/option"
    };
  }

  // 查询租户分页列表
  rpc PageBaseTenant(PageBaseTenantRequest) returns (PageBaseTenantResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/tenant"
    };
  }

  // 查询租户
  rpc GetBaseTenant(GetBaseTenantRequest) returns (BaseTenantForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/tenant/{id}"
    };
  }

  // 创建租户
  rpc CreateBaseTenant(CreateBaseTenantRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/tenant"
      body: "base_tenant"
    };
  }

  // 更新租户
  rpc UpdateBaseTenant(UpdateBaseTenantRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/tenant/{base_tenant.id}"
      body: "base_tenant"
    };
  }

  // 删除租户
  rpc DeleteBaseTenant(DeleteBaseTenantRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/tenant/{id}"
    };
  }

  // 设置状态
  rpc SetBaseTenantStatus(SetBaseTenantStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/tenant/{id}/status"
      body: "*"
    };
  }
}

// 租户选项查询条件
message OptionBaseTenantRequest {
  string keyword = 1 [(gnostic.openapi.v3.property) = {description: "关键字"}]; // 关键字
}

// 租户分页查询条件
message PageBaseTenantRequest {
  string code = 2 [(gnostic.openapi.v3.property) = {description: "租户编号"}]; // 租户编号

  string name = 3 [(gnostic.openapi.v3.property) = {description: "租户名称"}]; // 租户名称

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 租户分页响应
message PageBaseTenantResponse {
  repeated BaseTenant base_tenants = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询租户请求参数
message GetBaseTenantRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
}

// 创建租户请求参数
message CreateBaseTenantRequest {
  BaseTenantForm base_tenant = 1 [(gnostic.openapi.v3.property) = {description: "租户表单"}]; // 租户表单
}

// 更新租户请求参数
message UpdateBaseTenantRequest {
  BaseTenantForm base_tenant = 1 [(gnostic.openapi.v3.property) = {description: "租户表单"}]; // 租户表单
}

// 删除租户请求参数
message DeleteBaseTenantRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID列表"}]; // 租户ID列表
}

// 设置租户状态请求参数
message SetBaseTenantStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 租户
message BaseTenant {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  string code = 2 [(gnostic.openapi.v3.property) = {description: "租户编号"}]; // 租户编号

  string name = 3 [(gnostic.openapi.v3.property) = {description: "租户名称"}]; // 租户名称

  string contact_name = 4 [(gnostic.openapi.v3.property) = {description: "联系人"}]; // 联系人

  string contact_phone = 5 [(gnostic.openapi.v3.property) = {description: "联系电话"}]; // 联系电话

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  bool is_protected = 300 [(gnostic.openapi.v3.property) = {description: "是否禁止通过租户管理操作"}]; // 是否禁止通过租户管理操作
}

// 租户表单
message BaseTenantForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  string code = 2 [(gnostic.openapi.v3.property) = {description: "租户编号"}]; // 租户编号

  string name = 3 [(gnostic.openapi.v3.property) = {description: "租户名称"}]; // 租户名称

  string contact_name = 4 [(gnostic.openapi.v3.property) = {description: "联系人"}]; // 联系人

  string contact_phone = 5 [(gnostic.openapi.v3.property) = {description: "联系电话"}]; // 联系电话

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注
}
