syntax = "proto3";

package system.admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "buf/validate/validate.proto";
import "system/common/v1/enum.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Admin角色管理服务
service BaseRoleService {
  // 查询角色下拉选择
  rpc OptionBaseRole(OptionBaseRoleRequest) returns (.common.v1.SelectOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role/option"
    };
  }

  // 查询角色分页列表
  rpc PageBaseRole(PageBaseRoleRequest) returns (PageBaseRoleResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role"
    };
  }

  // 查询角色
  rpc GetBaseRole(GetBaseRoleRequest) returns (BaseRoleForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/role/{id}"
    };
  }

  // 创建角色
  rpc CreateBaseRole(CreateBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/role"
      body: "base_role"
    };
  }

  // 更新角色
  rpc UpdateBaseRole(UpdateBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{base_role.id}"
      body: "base_role"
    };
  }

  // 删除角色
  rpc DeleteBaseRole(DeleteBaseRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/role/{id}"
    };
  }

  // 设置状态
  rpc SetBaseRoleStatus(SetBaseRoleStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{id}/status"
      body: "*"
    };
  }

  // 设置角色菜单权限
  rpc SetBaseRoleMenu(SetBaseRoleMenuRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/role/{id}/menu"
      body: "*"
    };
  }
}

// 角色选项查询条件
message OptionBaseRoleRequest {
  optional int64 tenant_id = 1 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
}

// 角色分页查询条件
message PageBaseRoleRequest {
  string name = 2 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string code = 3 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  optional int64 tenant_id = 4 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 角色分页响应
message PageBaseRoleResponse {
  repeated BaseRole base_roles = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询角色请求参数
message GetBaseRoleRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID
}

// 创建角色请求参数
message CreateBaseRoleRequest {
  BaseRoleForm base_role = 1 [(gnostic.openapi.v3.property) = {description: "角色表单"}, (buf.validate.field).required = true]; // 角色表单
}

// 更新角色请求参数
message UpdateBaseRoleRequest {
  BaseRoleForm base_role = 1 [(gnostic.openapi.v3.property) = {description: "角色表单"}, (buf.validate.field).required = true]; // 角色表单
}

// 删除角色请求参数
message DeleteBaseRoleRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID列表"}]; // 角色ID列表
}

// 设置角色状态请求参数
message SetBaseRoleStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 角色
message BaseRole {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}, (buf.validate.field).cel = {id: "base_role.tenant_id.required" message: "所属租户不能为空" expression: "this > 0"}]; // 租户ID

  string name = 3 [(gnostic.openapi.v3.property) = {description: "角色名称"}]; // 角色名称

  string code = 4 [(gnostic.openapi.v3.property) = {description: "角色编号"}]; // 角色编号

  .system.common.v1.BaseRoleDataScope data_scope = 5 [(gnostic.openapi.v3.property) = {description: "数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据"}]; // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 6 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}]; // 分配的菜单列表

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}]; // 备注

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  bool is_protected = 300 [(gnostic.openapi.v3.property) = {description: "是否禁止通过角色管理操作"}]; // 是否禁止通过角色管理操作
}

// 角色表单
message BaseRoleForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  string name = 3 [(gnostic.openapi.v3.property) = {description: "角色名称"}, (buf.validate.field).cel = {id: "base_role.name.length" message: "角色名称不能为空且不超过 30 个字符" expression: "this.size() > 0 && this.size() <= 30"}]; // 角色名称

  string code = 4 [(gnostic.openapi.v3.property) = {description: "角色编号"}, (buf.validate.field).cel = {id: "base_role.code.length" message: "角色编号不能为空且不超过 100 个字符" expression: "this.size() > 0 && this.size() <= 100"}]; // 角色编号

  .system.common.v1.BaseRoleDataScope data_scope = 5 [(gnostic.openapi.v3.property) = {description: "数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据"}, (buf.validate.field).enum = {defined_only: true}]; // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 6 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}, (buf.validate.field).repeated = {unique: true}]; // 分配的菜单列表

  .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}, (buf.validate.field).enum = {defined_only: true}]; // 状态

  string remark = 101 [(gnostic.openapi.v3.property) = {description: "备注"}, (buf.validate.field).cel = {id: "base_role.remark.max_len" message: "备注不能超过 500 个字符" expression: "this.size() <= 500"}]; // 备注
}

// 设置角色菜单权限请求参数
message SetBaseRoleMenuRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  repeated int64 menus = 2 [(gnostic.openapi.v3.property) = {description: "分配的菜单列表"}]; // 分配的菜单列表
}
