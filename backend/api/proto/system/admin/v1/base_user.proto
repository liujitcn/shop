syntax = "proto3";

package system.admin.v1;

import "common/v1/common.proto";
import "common/v1/enum.proto";
import "system/common/v1/enum.proto";
import "common/v1/types.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "buf/validate/validate.proto";

// Admin用户管理服务
service BaseUserService {
  // 查询用户下拉选择
  rpc OptionBaseUser(OptionBaseUserRequest) returns (.common.v1.SelectOptionResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/user/option"
    };
  }

  // 查询用户分页列表
  rpc PageBaseUser(PageBaseUserRequest) returns (PageBaseUserResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/user"
    };
  }

  // 查询用户
  rpc GetBaseUser(GetBaseUserRequest) returns (BaseUserForm) {
    option (google.api.http) = {
      get: "/api/v1/admin/base/user/{id}"
    };
  }

  // 创建用户
  rpc CreateBaseUser(CreateBaseUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/admin/base/user"
      body: "base_user"
    };
  }

  // 更新用户
  rpc UpdateBaseUser(UpdateBaseUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/user/{base_user.id}"
      body: "base_user"
    };
  }

  // 删除用户
  rpc DeleteBaseUser(DeleteBaseUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/admin/base/user/{id}"
    };
  }

  // 设置状态
  rpc SetBaseUserStatus(SetBaseUserStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/user/{id}/status"
      body: "*"
    };
  }

  // 重置密码
  rpc ResetBaseUserPassword(ResetBaseUserPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/admin/base/user/{id}/password"
      body: "*"
    };
  }
}

// 用户选项查询条件
message OptionBaseUserRequest {
  string keyword = 1 [(gnostic.openapi.v3.property) = {description: "关键字"}]; // 关键字

  optional int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID
}

// 用户分页查询条件
message PageBaseUserRequest {
  string user_name = 2 [(gnostic.openapi.v3.property) = {description: "用户账号"}]; // 用户账号

  string nick_name = 3 [(gnostic.openapi.v3.property) = {description: "用户昵称"}]; // 用户昵称

  optional int64 tenant_id = 4 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  optional int64 dept_id = 5 [(gnostic.openapi.v3.property) = {description: "部门ID"}]; // 部门ID

  string phone = 6 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号

  optional .system.common.v1.BaseUserGender gender = 7 [(gnostic.openapi.v3.property) = {description: "性别"}]; // 性别

  optional .common.v1.Status status = 100 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态

  int64 page_num = 101 [(gnostic.openapi.v3.property) = {
    description: "当前页码"
    default: {number: 1}
  }]; // 当前页码

  int64 page_size = 102 [(gnostic.openapi.v3.property) = {
    description: "每一页的行数"
    default: {number: 10}
  }]; // 每一页的行数
}

// 用户分页响应
message PageBaseUserResponse {
  repeated BaseUser base_users = 1 [(gnostic.openapi.v3.property) = {description: "分页数据"}]; // 分页数据

  int32 total = 2 [(gnostic.openapi.v3.property) = {description: "总数"}]; // 总数
}

// 查询用户请求参数
message GetBaseUserRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID"}]; // 用户ID
}

// 创建用户请求参数
message CreateBaseUserRequest {
  BaseUserForm base_user = 1 [(gnostic.openapi.v3.property) = {description: "用户表单"}, (buf.validate.field).required = true]; // 用户表单
}

// 更新用户请求参数
message UpdateBaseUserRequest {
  BaseUserForm base_user = 1 [(gnostic.openapi.v3.property) = {description: "用户表单"}, (buf.validate.field).required = true]; // 用户表单
}

// 删除用户请求参数
message DeleteBaseUserRequest {
  string id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID列表"}]; // 用户ID列表
}

// 设置用户状态请求参数
message SetBaseUserStatusRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID"}]; // 用户ID

  int32 status = 2 [(gnostic.openapi.v3.property) = {description: "状态"}]; // 状态
}

// 用户
message BaseUser {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID"}]; // 用户ID

  int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}]; // 租户ID

  string user_name = 3 [(gnostic.openapi.v3.property) = {description: "用户账号"}]; // 用户账号

  string nick_name = 4 [(gnostic.openapi.v3.property) = {description: "用户昵称"}]; // 用户昵称

  int64 role_id = 5 [(gnostic.openapi.v3.property) = {description: "角色ID"}]; // 角色ID

  int64 dept_id = 6 [(gnostic.openapi.v3.property) = {description: "部门ID"}]; // 部门ID

  string phone = 7 [(gnostic.openapi.v3.property) = {description: "手机号"}]; // 手机号

  .system.common.v1.BaseUserGender gender = 8 [(gnostic.openapi.v3.property) = {description: "性别"}]; // 性别

  string avatar = 9 [(gnostic.openapi.v3.property) = {description: "头像"}]; // 头像

  .common.v1.Status status = 101 [(gnostic.openapi.v3.property) = {description: "用户状态"}]; // 用户状态

  string remark = 102 [(gnostic.openapi.v3.property) = {description: "备注名"}]; // 备注名

  string created_at = 200 [(gnostic.openapi.v3.property) = {description: "创建时间"}]; // 创建时间

  string updated_at = 201 [(gnostic.openapi.v3.property) = {description: "更新时间"}]; // 更新时间

  bool is_protected = 300 [(gnostic.openapi.v3.property) = {description: "是否禁止通过用户管理操作"}]; // 是否禁止通过用户管理操作
}

// 用户表单
message BaseUserForm {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID"}]; // 用户ID

  int64 tenant_id = 2 [(gnostic.openapi.v3.property) = {description: "租户ID"}, (buf.validate.field).cel = {id: "base_user.tenant_id.required" message: "所属租户不能为空" expression: "this > 0"}]; // 租户ID

  string user_name = 3 [(gnostic.openapi.v3.property) = {description: "用户账号"}, (buf.validate.field).cel = {id: "base_user.user_name.length" message: "用户账号不能为空且不超过 50 个字符" expression: "this.size() > 0 && this.size() <= 50"}]; // 用户账号

  string nick_name = 4 [(gnostic.openapi.v3.property) = {description: "用户昵称"}, (buf.validate.field).cel = {id: "base_user.nick_name.max_len" message: "用户昵称不能超过 30 个字符" expression: "this.size() <= 30"}]; // 用户昵称

  int64 role_id = 5 [(gnostic.openapi.v3.property) = {description: "角色ID"}, (buf.validate.field).cel = {id: "base_user.role_id.required" message: "角色不能为空" expression: "this > 0"}]; // 角色ID

  int64 dept_id = 6 [(gnostic.openapi.v3.property) = {description: "部门ID"}, (buf.validate.field).cel = {id: "base_user.dept_id.required" message: "部门不能为空" expression: "this > 0"}]; // 部门ID

  string phone = 7 [(gnostic.openapi.v3.property) = {description: "手机号"}, (buf.validate.field).cel = {id: "base_user.phone.max_len" message: "手机号不能超过 20 个字符" expression: "this.size() <= 20"}]; // 手机号

  string avatar = 8 [(gnostic.openapi.v3.property) = {description: "头像"}, (buf.validate.field).cel = {id: "base_user.avatar.max_len" message: "头像不能超过 1024 个字符" expression: "this.size() <= 1024"}]; // 头像

  .system.common.v1.BaseUserGender gender = 9 [(gnostic.openapi.v3.property) = {description: "性别"}, (buf.validate.field).enum = {defined_only: true}]; // 性别

  .common.v1.PasswordCrypto pwd = 300 [(gnostic.openapi.v3.property) = {description: "密码"}]; // 密码

  .common.v1.Status status = 101 [(gnostic.openapi.v3.property) = {description: "用户状态"}, (buf.validate.field).enum = {defined_only: true}]; // 用户状态

  string remark = 102 [(gnostic.openapi.v3.property) = {description: "备注名"}, (buf.validate.field).cel = {id: "base_user.remark.max_len" message: "备注不能超过 500 个字符" expression: "this.size() <= 500"}]; // 备注名
}

// 重置用户密码请求参数
message ResetBaseUserPasswordRequest {
  int64 id = 1 [(gnostic.openapi.v3.property) = {description: "用户ID"}]; // 用户ID

  .common.v1.PasswordCrypto pwd = 2 [(gnostic.openapi.v3.property) = {description: "密码"}]; // 密码
}
