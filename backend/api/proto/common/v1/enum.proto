syntax = "proto3";

package common.v1;

// 状态
enum Status {
  UNKNOWN = 0;
  ENABLE = 1; // 启用
  DISABLE = 2; // 禁用
}

// 系统配置位置
enum BaseConfigSite {
  UNKNOWN_BCS = 0;
  SYSTEM = 1; // 系统内使用
  ADMIN = 2; // 管理端
  APP = 3; // 移动端
}

// 密码加密场景枚举
enum PasswordCryptoScene {
  UNKNOWN_PCS = 0; // 未指定密码加密场景
  LOGIN = 1; // 登录密码加密场景
  CREATE_BASE_USER = 2; // 新增后台用户密码加密场景
  RESET_BASE_USER_PASSWORD = 3; // 重置后台用户密码加密场景
  UPDATE_USER_PASSWORD = 4; // 个人修改密码加密场景
}

// AI 助手消息状态
enum AiMessageStatus {
  UNKNOWN_AAMS = 0; // 未知AI助手消息状态
  GENERATING_AAMS = 1; // 生成中
  SUCCESS_AAMS = 2; // 成功
  FAILED_AAMS = 3; // 失败
}

// 终端类型
enum Terminal {
  TERMINAL_UNSPECIFIED = 0; // 未知终端
  TERMINAL_APP = 1; // 移动端
  TERMINAL_ADMIN = 2; // 管理端
}
