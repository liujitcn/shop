syntax = "proto3";

package common.v1;

// 状态
enum Status {
  UNKNOWN = 0;
  ENABLE = 1; // 启用
  DISABLE = 2; // 禁用
}

// 系统配置位置
enum BaseConfigSite {
  UNKNOWN_BCS = 0;
  SYSTEM = 1; // 系统内使用
  ADMIN = 2; // 管理端
  APP = 3; // 移动端
}

// 密码加密场景枚举
enum PasswordCryptoScene {
  UNKNOWN_PCS = 0; // 未指定密码加密场景
  LOGIN = 1; // 登录密码加密场景
  CREATE_BASE_USER = 2; // 新增后台用户密码加密场景
  RESET_BASE_USER_PASSWORD = 3; // 重置后台用户密码加密场景
  UPDATE_USER_PASSWORD = 4; // 个人修改密码加密场景
}

// SSE 流枚举
enum SseStream {
  SSE_STREAM_UNSPECIFIED = 0; // 未指定 SSE 流
  SSE_STREAM_ADMIN_WORKSPACE = 1; // 管理后台工作台 SSE 流
  SSE_STREAM_ADMIN_CODE_GEN = 2; // 管理后台代码生成任务 SSE 流
}

// SSE 事件枚举
enum SseEvent {
  SSE_EVENT_UNSPECIFIED = 0; // 未指定 SSE 事件
  SSE_EVENT_PAGE_REFRESH = 1; // 页面局部刷新事件
  SSE_EVENT_CODE_GEN_PROGRESS = 2; // 代码生成任务进度事件
}

// SSE 刷新目标枚举
enum SseRefreshTarget {
  SSE_REFRESH_TARGET_UNSPECIFIED = 0; // 未指定 SSE 刷新目标
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_METRICS = 1; // 管理后台工作台顶部指标区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_TODO = 2; // 管理后台工作台待处理事项区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_RISK = 3; // 管理后台工作台风险提醒区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_REPUTATION = 4; // 管理后台工作台口碑洞察区域
  SSE_REFRESH_TARGET_ADMIN_WORKSPACE_PENDING_COMMENTS = 5; // 管理后台工作台待审核评价区域
}

// SSE 刷新原因枚举
enum SseRefreshReason {
  SSE_REFRESH_REASON_UNSPECIFIED = 0; // 未指定 SSE 刷新原因
  SSE_REFRESH_REASON_ORDER_CHANGED = 1; // 订单状态或金额口径发生变化
  SSE_REFRESH_REASON_GOODS_CHANGED = 2; // 商品、SKU、库存或价格口径发生变化
  SSE_REFRESH_REASON_COMMENT_CHANGED = 3; // 评价或评价讨论口径发生变化
  SSE_REFRESH_REASON_PAY_BILL_CHECKED = 4; // 支付账单对账结果发生变化
}

// Gorse 推荐高级调试数据类型
enum AdvanceDataType {
  UNKNOWN_RRADT = 0; // 未知数据类型
  USER_RRADT = 1; // 用户数据
  ITEM_RRADT = 2; // 商品数据
  FEEDBACK_RRADT = 3; // 反馈数据
}

// AI 助手消息状态
enum AiMessageStatus {
  UNKNOWN_AAMS = 0; // 未知AI助手消息状态
  GENERATING_AAMS = 1; // 生成中
  SUCCESS_AAMS = 2; // 成功
  FAILED_AAMS = 3; // 失败
}

// 支付通知资源类型
enum ResourceType {
  TRANSACTION = 0; // 支付
  REFUND = 1; // 退款
}

// 终端类型
enum Terminal {
  TERMINAL_UNSPECIFIED = 0; // 未知终端
  TERMINAL_APP = 1; // 移动端
  TERMINAL_ADMIN = 2; // 管理端
}
