syntax = "proto3";

package base.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// Base SSE服务
service SseService {
  // 订阅SSE事件流
  rpc SubscribeSse(SubscribeSseRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      get: "/events/{stream}"
    };
  }
}

// SSE订阅请求参数
message SubscribeSseRequest {
  string stream = 1 [(gnostic.openapi.v3.property) = {description: "SSE流标识"}]; // SSE流标识

  optional string channel_id = 2 [(gnostic.openapi.v3.property) = {description: "SSE通道ID"}]; // SSE通道ID
}
